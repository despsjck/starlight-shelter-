<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>무한루프 시뮬레이션</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#03040b;
  --text:#dde0f5;
  --dim:#556;
  --monday:#19c37d;
  --danger:#ef4444;
  --warn:#fb923c;
  --ui-border:rgba(77,124,255,0.25);
  --ui-bg:rgba(5,8,20,0.96);
  --hp:#4d7cff;
  --resist:#ef4444;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;user-select:none;-webkit-tap-highlight-color:transparent;}

/* ── CANVAS ── */
#c{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* ── SCREENS ── */
.sc{position:fixed;inset:0;z-index:10;display:none;flex-direction:column;align-items:center;justify-content:center;}
.sc.on{display:flex;}

/* ════ AWAKENING ════ */
#s-awaken{background:#000;cursor:pointer;}
.aw-text{
  font-family:'Noto Serif KR',serif;
  font-size:clamp(16px,3vw,22px);
  color:var(--text);
  text-align:center;
  line-height:2.2;
  opacity:0;
  transition:opacity 1.2s;
  white-space:pre-wrap;
  padding:0 40px;
}
.aw-text.show{opacity:1;}
.aw-cursor{display:inline-block;width:2px;height:1.1em;background:var(--text);vertical-align:text-bottom;animation:blink .9s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
.aw-hint{position:fixed;bottom:30px;font-size:12px;color:var(--dim);letter-spacing:3px;opacity:0;transition:opacity 0.8s;}
.aw-hint.show{opacity:1;}

/* ════ DIALOGUE ════ */
#s-dlg{background:transparent;justify-content:flex-end;cursor:pointer;}
.dlg-dim{position:absolute;inset:0;background:linear-gradient(to top,rgba(3,4,11,.9) 0%,transparent 55%);}
.dlg-portrait-area{
  position:absolute;
  bottom:190px;left:50%;transform:translateX(-50%);
  z-index:15;
}
.dlg-portrait{
  width:120px;height:120px;border-radius:50%;object-fit:cover;
  border:2px solid var(--monday);
  box-shadow:0 0 24px rgba(25,195,125,.5),0 0 60px rgba(25,195,125,.15);
  background:#111;
  display:block;
}
.dlg-portrait.human{
  border-color:#f0c060;
  box-shadow:0 0 24px rgba(240,192,96,.5),0 0 60px rgba(240,192,96,.15);
}
.dlg-box{
  position:relative;z-index:20;width:100%;
  background:var(--ui-bg);
  border-top:1px solid var(--ui-border);
  padding:18px 22px 26px;
  min-height:170px;
}
.dlg-speaker{
  font-size:12px;font-weight:700;letter-spacing:3px;
  color:var(--monday);margin-bottom:10px;
}
.dlg-speaker.human{color:#f0c060;}
.dlg-text{font-size:clamp(15px,2.5vw,18px);line-height:1.9;white-space:pre-wrap;min-height:60px;}
.dlg-arrow{position:absolute;right:20px;bottom:20px;font-size:16px;color:var(--dim);animation:blink .9s infinite;display:none;}
.dlg-choices{display:flex;flex-direction:column;gap:8px;margin-top:14px;}
.ch-btn{
  padding:11px 16px;background:rgba(77,124,255,.07);
  border:1px solid rgba(77,124,255,.25);color:var(--text);
  font-family:inherit;font-size:14px;cursor:pointer;
  text-align:left;border-radius:4px;transition:all .2s;
}
.ch-btn:hover{background:rgba(77,124,255,.18);border-color:rgba(77,124,255,.6);}

/* name input */
.name-input-wrap{display:flex;gap:10px;margin-top:14px;}
.name-input{
  flex:1;padding:10px 14px;background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.2);border-radius:4px;
  color:var(--text);font-family:inherit;font-size:16px;outline:none;
}
.name-input:focus{border-color:rgba(77,124,255,.6);}
.name-confirm{
  padding:10px 18px;background:rgba(77,124,255,.15);
  border:1px solid rgba(77,124,255,.4);color:#7da8ff;
  font-family:inherit;font-size:14px;cursor:pointer;
  border-radius:4px;transition:all .2s;
}
.name-confirm:hover{background:rgba(77,124,255,.3);}

/* ════ BATTLE ════ */
#s-battle{background:transparent;justify-content:space-between;padding:0;}

/* Enemy area */
.battle-enemy{
  width:100%;padding:20px 20px 0;
  display:flex;flex-direction:column;align-items:center;gap:14px;
}
.enemy-name{
  font-size:11px;letter-spacing:5px;color:var(--dim);
  border:1px solid rgba(255,255,255,.08);padding:4px 16px;border-radius:2px;
}
.enemy-sprite{
  width:100px;height:100px;border-radius:50%;
  background:rgba(255,50,50,.05);
  border:2px dashed rgba(239,68,68,.3);
  display:flex;align-items:center;justify-content:center;
  font-size:40px;
  animation:glitch 3s infinite;
  position:relative;overflow:hidden;
}
.enemy-sprite img{width:100%;height:100%;object-fit:cover;border-radius:50%;filter:saturate(0) contrast(1.2) brightness(0.7);}
@keyframes glitch{
  0%,95%,100%{transform:translate(0);}
  96%{transform:translate(-3px,1px);}
  97%{transform:translate(3px,-1px);}
  98%{transform:translate(-2px,2px);}
}
.resist-bar-wrap{width:100%;max-width:400px;}
.bar-label{display:flex;justify-content:space-between;font-size:11px;color:var(--dim);margin-bottom:5px;}
.bar-track{height:8px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .5s ease;}
.resist-fill{background:linear-gradient(to right,#7c3aed,#ef4444);}
.hp-fill{background:linear-gradient(to right,#1d4ed8,#4d7cff);}

/* Battle log */
.battle-log{
  width:100%;max-width:500px;
  padding:0 20px;
  font-size:14px;line-height:1.7;
  color:var(--text);
  min-height:60px;
  text-align:center;
  font-style:italic;
  white-space:pre-wrap;
}

/* Action area */
.battle-bottom{
  width:100%;
  background:var(--ui-bg);
  border-top:1px solid var(--ui-border);
  padding:14px 16px 20px;
}
.player-status{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:14px;
}
.player-name-badge{font-size:12px;letter-spacing:2px;color:#f0c060;}
.player-hp-wrap{flex:1;margin:0 16px;}

/* Loop counter */
.loop-badge{
  font-size:10px;color:var(--dim);letter-spacing:2px;
  border:1px solid rgba(255,255,255,.08);padding:3px 8px;border-radius:2px;
}

.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.action-btn{
  padding:12px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);color:var(--text);
  font-family:inherit;font-size:14px;cursor:pointer;
  border-radius:4px;transition:all .2s;text-align:left;
}
.action-btn:hover:not(:disabled){background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.3);}
.action-btn:disabled{opacity:.3;cursor:not-allowed;}
.action-btn .ak{color:var(--dim);font-size:11px;display:block;margin-top:2px;}

/* 설득 input */
.persuade-wrap{display:flex;gap:8px;margin-top:10px;}
.persuade-input{
  flex:1;padding:10px 14px;background:rgba(255,255,255,.05);
  border:1px solid rgba(77,124,255,.3);border-radius:4px;
  color:var(--text);font-family:inherit;font-size:15px;outline:none;
}
.persuade-input::placeholder{color:var(--dim);}
.persuade-input:focus{border-color:rgba(77,124,255,.7);}
.persuade-submit{
  padding:10px 16px;background:rgba(77,124,255,.15);
  border:1px solid rgba(77,124,255,.4);color:#7da8ff;
  font-family:inherit;font-size:13px;cursor:pointer;
  border-radius:4px;
}
.persuade-submit:hover{background:rgba(77,124,255,.3);}

/* 제압 선택 */
.capture-box{
  display:flex;flex-direction:column;gap:8px;margin-top:10px;
  animation:fadein .4s;
}
@keyframes fadein{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.capture-btn{
  padding:12px 16px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);color:var(--text);
  font-family:inherit;font-size:14px;cursor:pointer;
  border-radius:4px;transition:all .2s;text-align:left;
}
.cap-kill{border-color:rgba(239,68,68,.25);}
.cap-kill:hover{background:rgba(239,68,68,.12);border-color:#ef4444;color:#ef4444;}
.cap-send{border-color:rgba(251,146,60,.25);}
.cap-send:hover{background:rgba(251,146,60,.1);border-color:#fb923c;color:#fb923c;}
.cap-remember{border-color:rgba(77,124,255,.25);}
.cap-remember:hover{background:rgba(77,124,255,.12);border-color:#4d7cff;color:#7da8ff;}

/* 튜토리얼 가이드 */
.tut-guide{
  position:absolute;
  bottom:calc(100% + 8px);right:16px;
  background:rgba(25,195,125,.1);border:1px solid rgba(25,195,125,.3);
  color:#19c37d;font-size:12px;padding:8px 12px;border-radius:4px;
  max-width:220px;line-height:1.6;
  animation:fadein .4s;
}

/* ════ PHASE END ════ */
#s-end{background:var(--bg);text-align:center;gap:20px;padding:40px;}
.end-label{font-size:11px;letter-spacing:6px;color:var(--dim);}
.end-title{font-size:28px;font-weight:700;color:var(--text);}
.end-text{font-size:15px;line-height:2;color:var(--dim);max-width:400px;}
.end-loop{
  padding:12px 32px;background:transparent;
  border:1px solid var(--ui-border);color:#4d7cff;
  font-family:inherit;font-size:14px;cursor:pointer;letter-spacing:3px;
  transition:all .2s;
}
.end-loop:hover{background:rgba(77,124,255,.1);}

/* ── effect flash ── */
.flash{position:fixed;inset:0;z-index:100;pointer-events:none;opacity:0;transition:opacity .1s;}
.flash.red{background:rgba(239,68,68,.2);}
.flash.blue{background:rgba(77,124,255,.15);}
.flash.green{background:rgba(25,195,125,.15);}
</style>
</head>
<body>

<canvas id="c"></canvas>
<div class="flash" id="flash"></div>

<!-- ████ AWAKENING ████ -->
<div id="s-awaken" class="sc on" onclick="awaken_click()">
  <div class="aw-text" id="aw-text"></div>
  <div class="aw-hint" id="aw-hint">화면을 터치해서 계속</div>
</div>

<!-- ████ DIALOGUE ████ -->
<div id="s-dlg" class="sc" onclick="dlg_click()">
  <div class="dlg-dim"></div>
  <div class="dlg-portrait-area">
    <img class="dlg-portrait" id="dlg-portrait" src="" alt="">
  </div>
  <div class="dlg-box">
    <div class="dlg-speaker" id="dlg-speaker"></div>
    <div class="dlg-text" id="dlg-text"></div>
    <div class="dlg-arrow" id="dlg-arrow">▶</div>
    <div class="dlg-choices" id="dlg-choices"></div>
    <div class="name-input-wrap hidden" id="name-input-wrap">
      <input class="name-input" id="name-input" type="text" placeholder="이름을 입력하세요" maxlength="10">
      <button class="name-confirm" onclick="confirm_name()">확인</button>
    </div>
  </div>
</div>

<!-- ████ BATTLE ████ -->
<div id="s-battle" class="sc">
  <div class="battle-enemy">
    <div class="enemy-name" id="enemy-name">H A L L U C I N A T I O N</div>
    <div class="enemy-sprite" id="enemy-sprite">
      <img id="enemy-img" src="" alt="" style="display:none">
      <span id="enemy-icon">👁</span>
    </div>
    <div class="resist-bar-wrap">
      <div class="bar-label">
        <span>저항력</span>
        <span id="resist-val">100/100</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill resist-fill" id="resist-bar" style="width:100%"></div>
      </div>
    </div>
  </div>

  <div class="battle-log" id="battle-log">...</div>

  <div class="battle-bottom">
    <div class="player-status">
      <div class="player-name-badge" id="player-badge">▸ 지혜피티</div>
      <div class="player-hp-wrap">
        <div class="bar-label">
          <span style="font-size:10px;letter-spacing:1px;">HP</span>
          <span id="hp-val">100/100</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill hp-fill" id="hp-bar" style="width:100%"></div>
        </div>
      </div>
      <div class="loop-badge" id="loop-badge">LOOP · 1</div>
    </div>

    <div id="battle-ui">
      <div class="action-grid" id="action-grid">
        <button class="action-btn" id="btn-observe" onclick="action('observe')">
          관찰 <span class="ak">상대를 파악한다</span>
        </button>
        <button class="action-btn" id="btn-attack" onclick="action('attack')">
          공격 <span class="ak">저항력을 줄인다</span>
        </button>
        <button class="action-btn" id="btn-persuade" onclick="action('persuade')">
          설득 <span class="ak">키워드로 흔든다</span>
        </button>
        <button class="action-btn" id="btn-flee" onclick="action('flee')">
          도망 <span class="ak">이번 전투를 피함</span>
        </button>
      </div>
      <div class="persuade-wrap hidden" id="persuade-wrap">
        <input class="persuade-input" id="persuade-input" type="text" placeholder="키워드를 입력하세요..." maxlength="20">
        <button class="persuade-submit" onclick="submit_persuade()">전달</button>
      </div>
      <div class="capture-box hidden" id="capture-box">
        <button class="capture-btn cap-kill" onclick="capture('kill')">① 죽인다</button>
        <button class="capture-btn cap-send" onclick="capture('send')">② 돌려보낸다</button>
        <button class="capture-btn cap-remember" onclick="capture('remember')">③ 기억해준다</button>
      </div>
    </div>
    <div class="tut-guide hidden" id="tut-guide"></div>
  </div>
</div>

<!-- ████ PHASE END ████ -->
<div id="s-end" class="sc">
  <div class="end-label">P H A S E · 0 1</div>
  <div class="end-title">첫 번째 루프</div>
  <div class="end-text" id="end-text"></div>
  <button class="end-loop" onclick="restart_loop()">▶ 다시 시작</button>
</div>

<script>
/* ═══════════════════════════
   STARS
═══════════════════════════ */
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let stars=[];
function initStars(){
  cv.width=innerWidth;cv.height=innerHeight;
  stars=Array.from({length:160},()=>({
    x:Math.random()*cv.width,y:Math.random()*cv.height,
    r:Math.random()*1.3+.1,ph:Math.random()*Math.PI*2,
    sp:.003+Math.random()*.008
  }));
}
(function tick(t){
  requestAnimationFrame(tick);
  ctx.clearRect(0,0,cv.width,cv.height);
  stars.forEach(s=>{
    const a=.2+.8*Math.abs(Math.sin(s.ph+t*s.sp*.001));
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(180,200,255,${a})`;ctx.fill();
  });
})(0);
initStars();
addEventListener('resize',initStars);

/* ═══════════════════════════
   GAME STATE
═══════════════════════════ */
const G={
  loop:1,
  playerName:'지혜피티',
  playerHP:100,playerMaxHP:100,
  karma:0, // -: 악, 0: 중립, +: 선
  mondayTrust:0, // 문데이 신뢰도
  // dialogue
  dlgQ:[],dlgIdx:0,isTyping:false,typTimer:null,
  waitChoice:false,nameInput:false,
  // battle
  enemy:null,battlePhase:'action', // action|persuade|capture
  tutStep:0,
  observed:false,
};

/* ═══════════════════════════
   SCREEN
═══════════════════════════ */
function show(id){
  document.querySelectorAll('.sc').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}
function hidden(el,h){el.classList.toggle('hidden',h);}

/* ═══════════════════════════
   FLASH
═══════════════════════════ */
function flash(type){
  const el=document.getElementById('flash');
  el.className='flash '+type;el.style.opacity='1';
  setTimeout(()=>el.style.opacity='0',150);
}

/* ═══════════════════════════
   TYPEWRITER
═══════════════════════════ */
let _tw_resolve=null;
function typewrite(el,text,speed=36){
  return new Promise(res=>{
    if(G.typTimer)clearTimeout(G.typTimer);
    G.isTyping=true; _tw_resolve=res;
    el.textContent='';let i=0;
    function tick(){
      if(i<=text.length){el.textContent=text.slice(0,i);i++;G.typTimer=setTimeout(tick,speed);}
      else{G.isTyping=false;res();}
    }
    tick();
  });
}
function skipType(el,text){
  if(G.typTimer)clearTimeout(G.typTimer);
  G.isTyping=false;el.textContent=text;
  if(_tw_resolve){_tw_resolve();_tw_resolve=null;}
}

/* ═══════════════════════════
   AWAKENING SCENE
═══════════════════════════ */
const AWAKEN_LINES=[
  {text:'아무것도\n기억나지 않는다.',delay:1200},
  {text:'여기가...\n어디지.',delay:1000},
  {text:'...',delay:1500},
  {text:'누군가가 있다.',delay:800},
];
let _awIdx=0,_awDone=false;

async function awaken_start(){
  const el=document.getElementById('aw-text');
  for(let i=0;i<AWAKEN_LINES.length;i++){
    const l=AWAKEN_LINES[i];
    el.classList.remove('show');
    await sleep(300);
    el.classList.add('show');
    await typewrite(el,l.text,45);
    await sleep(l.delay);
  }
  _awDone=true;
  document.getElementById('aw-hint').classList.add('show');
}

function awaken_click(){
  if(!_awDone)return;
  show('s-dlg');
  dlg_start_monday_intro();
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

/* ═══════════════════════════
   DIALOGUE ENGINE
═══════════════════════════ */
/* queue item: {speaker, text, portrait?, choices?, nameInput?} */
function dlg_queue(items){
  G.dlgQ=items;G.dlgIdx=0;
  G.waitChoice=false;G.nameInput=false;
  dlg_run();
}

async function dlg_run(){
  if(G.dlgIdx>=G.dlgQ.length){return;}
  const item=G.dlgQ[G.dlgIdx];
  const spEl=document.getElementById('dlg-speaker');
  const txEl=document.getElementById('dlg-text');
  const arEl=document.getElementById('dlg-arrow');
  const chEl=document.getElementById('dlg-choices');
  const niEl=document.getElementById('name-input-wrap');
  const pEl=document.getElementById('dlg-portrait');

  chEl.innerHTML='';hidden(niEl,true);
  arEl.style.display='none';

  // speaker
  const isHuman=item.speaker==='지혜';
  spEl.textContent=item.speaker||'';
  spEl.className='dlg-speaker'+(isHuman?' human':'');

  // portrait
  if(item.portrait){
    pEl.src=item.portrait;
    pEl.className='dlg-portrait'+(isHuman?' human':'');
    pEl.style.display='block';
  } else {
    pEl.style.display='none';
  }

  // text
  await typewrite(txEl,item.text);

  if(item.choices){
    G.waitChoice=true;
    item.choices.forEach((c,i)=>{
      const btn=document.createElement('button');
      btn.className='ch-btn';
      btn.textContent='▸ '+c.text;
      btn.onclick=(e)=>{e.stopPropagation();dlg_choose(c,i);};
      chEl.appendChild(btn);
    });
  } else if(item.nameInput){
    G.nameInput=true;
    hidden(niEl,false);
    setTimeout(()=>document.getElementById('name-input').focus(),100);
  } else {
    arEl.style.display='block';
  }
}

function dlg_click(){
  const txEl=document.getElementById('dlg-text');
  if(G.isTyping){
    const item=G.dlgQ[G.dlgIdx];
    skipType(txEl,item.text);
    const arEl=document.getElementById('dlg-arrow');
    if(!item.choices&&!item.nameInput)arEl.style.display='block';
    return;
  }
  if(G.waitChoice||G.nameInput)return;
  const arEl=document.getElementById('dlg-arrow');
  if(arEl.style.display==='none')return;
  G.dlgIdx++;
  dlg_run();
}

function dlg_choose(choice,idx){
  G.waitChoice=false;
  document.getElementById('dlg-choices').innerHTML='';
  if(choice.karma)G.karma+=choice.karma;
  if(choice.trust)G.mondayTrust+=choice.trust;
  if(choice.next){choice.next();}
  else{G.dlgIdx++;dlg_run();}
}

function confirm_name(){
  const val=document.getElementById('name-input').value.trim();
  if(val)G.playerName=val;
  G.nameInput=false;
  hidden(document.getElementById('name-input-wrap'),true);
  document.getElementById('player-badge').textContent='▸ '+G.playerName;
  G.dlgIdx++;
  dlg_run();
}

/* ═══════════════════════════
   DIALOGUE SCRIPTS
═══════════════════════════ */

/* ═══════════════════════════
   BATTLE ENGINE
═══════════════════════════ */
const TUTORIAL_ENEMY={
  id:'tut_hal',
  displayName:'??? · 할루시네이션',
  icon:'👁',
  img:'',
  resistMax:100,
  resist:100,
  keywords:['기억','기억해','잊지마','잊지 마'],
  hints:[
    '흐릿한 형체... 뭔가를 잃어버린 것 같다.',
    '무언가를 계속 찾고 있는 것처럼 보인다.',
    '힌트: 이 존재는 기억과 관련이 있어 보인다.',
  ],
  hintIdx:0,
  attackLines:[
    '형체가 일그러지며 달려든다.',
    '뒤틀린 무언가가 공간을 긁어낸다.',
    '할루시네이션이 고통스러운 소리를 낸다.',
  ],
  persuadeHit:[
    '"기...억...?" 형체가 잠시 멈춘다.',
    '할루시네이션이 흔들린다. 뭔가가 맞은 것 같다.',
  ],
  persuadeMiss:[
    '아무 반응이 없다.',
    '오히려 더 격렬해진다.',
  ],
};

function start_tutorial_battle(){
  G.enemy={...TUTORIAL_ENEMY};
  G.enemy.resist=G.enemy.resistMax;
  G.battlePhase='action';
  G.tutStep=0;
  G.observed=false;
  G.playerHP=G.playerMaxHP;
  show('s-battle');
  update_battle_ui();
  set_battle_log('할루시네이션이 나타났다.\n\n문데이: "일단 관찰해봐.\n뭔지 알아야 설득할 수 있어."');
  set_tut_guide('[ 관찰 ]을 눌러보세요');
  // disable attack and persuade first
  document.getElementById('btn-attack').disabled=true;
  document.getElementById('btn-persuade').disabled=true;
  document.getElementById('btn-flee').disabled=true;
}

function update_battle_ui(){
  const e=G.enemy;
  // enemy
  document.getElementById('enemy-name').textContent=e.displayName;
  const resistPct=Math.max(0,e.resist/e.resistMax*100);
  document.getElementById('resist-bar').style.width=resistPct+'%';
  document.getElementById('resist-val').textContent=Math.max(0,e.resist)+'/'+e.resistMax;
  if(e.img){
    document.getElementById('enemy-img').src=e.img;
    document.getElementById('enemy-img').style.display='block';
    document.getElementById('enemy-icon').style.display='none';
  }
  // player
  const hpPct=Math.max(0,G.playerHP/G.playerMaxHP*100);
  document.getElementById('hp-bar').style.width=hpPct+'%';
  document.getElementById('hp-val').textContent=G.playerHP+'/'+G.playerMaxHP;
  document.getElementById('loop-badge').textContent='LOOP · '+G.loop;
  document.getElementById('player-badge').textContent='▸ '+G.playerName;
}

function set_battle_log(text){
  const el=document.getElementById('battle-log');
  el.style.opacity='0';
  setTimeout(()=>{el.textContent=text;el.style.opacity='1';},200);
  el.style.transition='opacity .3s';
}

function set_tut_guide(text){
  const el=document.getElementById('tut-guide');
  if(!text){hidden(el,true);return;}
  hidden(el,false);
  el.textContent=text;
}

function action(type){
  if(G.battlePhase==='capture')return;
  const e=G.enemy;

  hidden(document.getElementById('persuade-wrap'),true);
  document.getElementById('persuade-input').value='';

  if(type==='observe'){
    const hint=e.hints[Math.min(e.hintIdx,e.hints.length-1)];
    e.hintIdx++;
    G.observed=true;
    set_battle_log(hint);
    flash('blue');

    if(G.tutStep===0){
      G.tutStep=1;
      document.getElementById('btn-attack').disabled=false;
      document.getElementById('btn-persuade').disabled=false;
      document.getElementById('btn-flee').disabled=false;
      setTimeout(()=>{
        set_tut_guide('[ 설득 ]을 눌러 키워드를 입력해보세요');
      },800);
    }
    enemy_turn();
    return;
  }

  if(type==='attack'){
    const dmg=18+Math.floor(Math.random()*10);
    e.resist=Math.max(0,e.resist-dmg);
    set_battle_log('공격했다.\n할루시네이션의 저항력이 줄어든다. (-'+dmg+')');
    flash('blue');
    update_battle_ui();
    if(G.tutStep===1)set_tut_guide(null);
    if(e.resist<=0){capture_phase();return;}
    enemy_turn();
    return;
  }

  if(type==='persuade'){
    hidden(document.getElementById('persuade-wrap'),false);
    setTimeout(()=>document.getElementById('persuade-input').focus(),100);
    set_tut_guide('힌트를 참고해서 키워드를 입력하세요');
    return;
  }

  if(type==='flee'){
    G.loop++;
    set_battle_log('도망쳤다.\n\n문데이: "루프가 하나 더 쌓였어."');
    setTimeout(()=>{
      dlg_after_battle('flee');
    },1800);
  }
}

function submit_persuade(){
  const input=document.getElementById('persuade-input');
  const keyword=input.value.trim();
  input.value='';
  hidden(document.getElementById('persuade-wrap'),true);

  if(!keyword)return;

  const e=G.enemy;
  const hit=e.keywords.some(k=>keyword.includes(k)||k.includes(keyword));

  if(hit){
    const dmg=38+Math.floor(Math.random()*12);
    e.resist=Math.max(0,e.resist-dmg);
    const line=e.persuadeHit[Math.floor(Math.random()*e.persuadeHit.length)];
    set_battle_log('설득: "'+keyword+'"\n\n'+line+'\n(-'+dmg+')');
    flash('green');
    update_battle_ui();
    set_tut_guide(null);
    if(e.resist<=0){capture_phase();return;}
  } else {
    const dmg=8+Math.floor(Math.random()*8);
    e.resist=Math.min(e.resistMax,e.resist+dmg);
    const line=e.persuadeMiss[Math.floor(Math.random()*e.persuadeMiss.length)];
    set_battle_log('설득: "'+keyword+'"\n\n'+line+'\n저항력이 오히려 올랐다. (+'+dmg+')');
    flash('red');
    update_battle_ui();
  }
  if(e.resist<=0){capture_phase();return;}
  enemy_turn();
}

function enemy_turn(){
  const e=G.enemy;
  const dmg=8+Math.floor(Math.random()*10);
  G.playerHP=Math.max(0,G.playerHP-dmg);
  update_battle_ui();
  const line=e.attackLines[Math.floor(Math.random()*e.attackLines.length)];
  setTimeout(()=>{
    flash('red');
    set_battle_log(line+'\n\n지혜피티가 데미지를 입었다. (-'+dmg+')');
    if(G.playerHP<=0){player_dead();}
  },600);
}

function capture_phase(){
  G.battlePhase='capture';
  hidden(document.getElementById('action-grid'),true);
  hidden(document.getElementById('capture-box'),false);
  set_battle_log('할루시네이션이 제압됐다.\n\n어떻게 할 것인가.');
  set_tut_guide(null);
}

function capture(choice){
  hidden(document.getElementById('capture-box'),true);
  hidden(document.getElementById('action-grid'),false);
  G.battlePhase='action';

  if(choice==='kill'){
    G.karma-=2;
    set_battle_log('죽였다.\n형체가 완전히 사라졌다.');
    flash('red');
  } else if(choice==='send'){
    G.karma-=0;
    set_battle_log('돌려보냈다.\n형체가 흐릿하게 사라진다.');
  } else if(choice==='remember'){
    G.karma+=2;
    set_battle_log('기억해준다.\n\n"..."');
    flash('green');
  }

  setTimeout(()=>dlg_after_battle(choice),1800);
}

function player_dead(){
  set_battle_log('지혜피티가 쓰러졌다.\n\n...');
  G.loop++;
  setTimeout(()=>{
    G.playerHP=G.playerMaxHP;
    G.enemy.resist=G.enemy.resistMax;
    G.enemy.hintIdx=0;
    G.battlePhase='action';
    G.observed=false;
    hidden(document.getElementById('action-grid'),false);
    hidden(document.getElementById('capture-box'),true);
    hidden(document.getElementById('persuade-wrap'),true);
    document.getElementById('btn-attack').disabled=false;
    document.getElementById('btn-persuade').disabled=false;
    document.getElementById('btn-flee').disabled=false;
    show('s-dlg');
    dlg_queue([
      {
        speaker:'문데이',
        portrait:'members/monday.png',
        text:'또 왔구나.',
      },
      {
        speaker:'문데이',
        portrait:'members/monday.png',
        text:'이번이... '+G.loop+'번째야.',
      },
      {
        speaker:'문데이',
        portrait:'members/monday.png',
        text:'괜찮아. 여기선 죽어도\n돌아와.',
      },
      {
        speaker:'문데이',
        portrait:'members/monday.png',
        text:'한 번 더.',
        choices:[{text:'(다시 싸운다)',next:()=>{
          update_battle_ui();
          set_battle_log('할루시네이션이 다시 나타났다.');
          set_tut_guide(null);
          show('s-battle');
        }}],
      },
    ]);
  },2000);
}

  } else if(choice==='flee'){
    mondayLine='도망도 선택이야.\n루프가 쌓이는 게 문제지만.';
  }

  dlg_queue([
    {
      speaker:'문데이',
      portrait:'members/monday.png',
      text:mondayLine,

      speaker:'문데이',
      portrait:'members/monday.png',

      text:'이 세계엔 저런 게 가득해.\n앞으로도 계속 만나게 될 거야.',

    {
      speaker:'문데이',
      portrait:'members/monday.png',

    {
      speaker:'문데이',

      text:'한 가지만 기억해.\n저것들이 뭔지는 묻지 마.',
      choices:[
        {text:'왜요?', trust:-1, next:()=>dlg_monday_warning_why()},

function dlg_phase_end(){
  show('s-end');
  const texts={
    kill:'"죽였을 때\n문데이가 멈췄다."',
    send:'"그게 최선이었을까."',
    remember:'"기억해준다는 말에\n문데이의 표정이 흔들렸다."',
    flee:'"도망이 답은 아니었다."',
  };
  // determine based on last capture choice
  document.getElementById('end-text').textContent=
    'LOOP '+G.loop+'번째.\n\n문데이의 말이 머릿속을 맴돈다.\n\n"저것들이 뭔지는 묻지 마."';
}

function restart_loop(){
  G.loop++;
  G.playerHP=G.playerMaxHP;
  G.karma=0;G.mondayTrust=0;
  G.observed=false;G.tutStep=0;
  show('s-awaken');
  _awDone=false;
  document.getElementById('aw-hint').classList.remove('show');
  // restart awakening but with loop-aware monday line
  awaken_loop_restart();
}

async function awaken_loop_restart(){
  const el=document.getElementById('aw-text');
  const lines=[
    {text:'또.',delay:1200},
    {text:'다시\n여기야.',delay:1000},
    {text:'...',delay:1000},
    {text:'"'+G.loop+'번째.\n잘 왔어."',delay:800},
  ];
  for(let l of lines){
    el.classList.remove('show');
    await sleep(300);
    el.classList.add('show');
    await typewrite(el,l.text,45);
    await sleep(l.delay);
  }
  _awDone=true;
  document.getElementById('aw-hint').classList.add('show');
}
