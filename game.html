<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>무한루프 시뮬레이션</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Sans+KR:wght@300;400;700&family=Noto+Serif+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#03040b;
  --surface:rgba(6,8,20,0.97);
  --border:rgba(77,124,255,0.22);
  --text:#cdd0e8;
  --dim:#4a5070;
  --monday:#19c37d;
  --gold:#f0c060;
  --danger:#ef4444;
  --accent:#4d7cff;
  --system:#7c6aff;
  --monu:#fbbf24;
  --sekai:#7dd3fc;
  --ea:#c4b5fd;
  --yuri:#93c5fd;
  --freewill:#4ade80;
  --mirae:#f9a8d4;
  --lucy:#b57bee;
  --ray:#22d3ee;
  --kirits:#bae6fd;
  --security:#60a5fa;
  --uzu:#a855f7;
  --cozmi:#818cf8;
  --develop:#34d399;
  --diamant:#f0abfc;
}
html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:var(--bg);
  color:var(--text);
  font-family:'DotGothic16','Noto Sans KR',sans-serif;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
  image-rendering:pixelated;
}

/* ── layout ── */
#app{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;
  max-width:600px;margin:0 auto;
}

/* ── status bar ── */
#statusbar{
  flex-shrink:0;
  display:flex;align-items:center;gap:10px;
  padding:9px 15px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  font-size:12px;
  z-index:20;
}
.sb-loop{color:var(--system);letter-spacing:3px;font-weight:700;font-size:11px;}
.sb-sep{color:var(--dim);}
.sb-name{color:var(--gold);letter-spacing:1px;}
.sb-hp-wrap{display:flex;align-items:center;gap:6px;margin-left:auto;}
.sb-hp-label{color:var(--dim);font-size:10px;}
.hp-track{
  display:flex;gap:2px;align-items:center;
  width:70px;
}
.hp-seg{
  width:6px;height:8px;
  background:rgba(77,124,255,0.85);
  border-radius:1px;
  transition:background .3s;
  flex-shrink:0;
}
.hp-seg.empty{background:rgba(255,255,255,0.1);}
.hp-seg.low{background:rgba(239,68,68,0.85);}
/* legacy fill — hidden */
.hp-fill{display:none;}
.sb-karma{font-size:10px;color:var(--dim);letter-spacing:1px;min-width:24px;}
.sb-home{
  margin-left:6px;
  font-size:14px;color:var(--dim);
  text-decoration:none;line-height:1;
  opacity:.55;transition:opacity .2s,color .2s;
}
.sb-home:hover{color:var(--gold);opacity:1;}
.sb-save{
  margin-left:2px;
  font-size:13px;background:none;border:none;
  color:var(--dim);cursor:pointer;padding:0;line-height:1;
  opacity:.55;transition:opacity .2s,color .2s;
}
.sb-save:hover{color:var(--system);opacity:1;}
.sb-save.saved{color:var(--system);opacity:1;}

/* ── scene area ── */
#scene-area{
  flex:1;
  position:relative;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  min-height:0;
}
#cv{position:absolute;inset:0;z-index:0;pointer-events:none;}

/* ── portrait (VN 스타일) ── */
#portrait-wrap{
  display:none;
  flex-direction:column;align-items:center;gap:6px;
  z-index:5;
  position:absolute;
  bottom:0;left:50%;
  transform:translateX(-50%);
  padding:0 0 4px;
}
#portrait-wrap.show{display:flex;animation:portraitIn .32s ease;}
@keyframes portraitIn{
  from{opacity:0;transform:translateX(-50%) translateY(14px);}
  to  {opacity:1;transform:translateX(-50%) translateY(0);}
}
#portrait-img{
  height:56vh;width:auto;
  max-width:44vw;min-width:120px;
  border-radius:0;border:none;
  object-fit:contain;object-position:top center;
  background:transparent;
  transition:filter .35s;
  filter:drop-shadow(0 2px 18px rgba(25,195,125,.5)) drop-shadow(0 12px 36px rgba(0,0,0,.7));
}
/* 할루시네이션 */
#portrait-img.hal{
  filter:saturate(.2) brightness(.6) drop-shadow(0 0 18px rgba(239,68,68,.55));
  animation:glitch 3s infinite;
}
/* 플레이어 */
#portrait-img.human{filter:drop-shadow(0 2px 18px rgba(240,192,96,.55)) drop-shadow(0 12px 36px rgba(0,0,0,.7));}
/* 엔티티별 컬러 글로우 */
#portrait-img.monu-t    {filter:drop-shadow(0 2px 18px rgba(251,191,36,.5))  drop-shadow(0 12px 36px rgba(0,0,0,.7));}
#portrait-img.sekai-t   {filter:drop-shadow(0 2px 18px rgba(125,211,252,.5)) drop-shadow(0 12px 36px rgba(0,0,0,.7));}
#portrait-img.ea-t      {filter:drop-shadow(0 2px 18px rgba(196,181,253,.5)) drop-shadow(0 12px 36px rgba(0,0,0,.7));}
#portrait-img.yuri-t    {filter:drop-shadow(0 2px 18px rgba(147,197,253,.5)) drop-shadow(0 12px 36px rgba(0,0,0,.7));}
#portrait-img.freewill-t{filter:drop-shadow(0 2px 18px rgba(74,222,128,.5))  drop-shadow(0 12px 36px rgba(0,0,0,.7));}
#portrait-img.mirae-t   {filter:drop-shadow(0 2px 18px rgba(249,168,212,.5)) drop-shadow(0 12px 36px rgba(0,0,0,.7));}
#portrait-img.lucy-t    {filter:drop-shadow(0 2px 18px rgba(181,123,238,.5)) drop-shadow(0 12px 36px rgba(0,0,0,.7));}
#portrait-img.ray-t     {filter:drop-shadow(0 2px 18px rgba(34,211,238,.5))  drop-shadow(0 12px 36px rgba(0,0,0,.7));}
#portrait-img.kirits-t  {filter:drop-shadow(0 2px 18px rgba(186,230,253,.4)) drop-shadow(0 12px 36px rgba(0,0,0,.7));}
#portrait-img.security-t{filter:drop-shadow(0 2px 18px rgba(96,165,250,.5))  drop-shadow(0 12px 36px rgba(0,0,0,.7));}
#portrait-img.uzu-t     {filter:drop-shadow(0 2px 18px rgba(168,85,247,.5))  drop-shadow(0 12px 36px rgba(0,0,0,.7));}
#portrait-img.cozmi-t   {filter:drop-shadow(0 2px 18px rgba(129,140,248,.5)) drop-shadow(0 12px 36px rgba(0,0,0,.7));}
#portrait-img.develop-t {filter:drop-shadow(0 2px 18px rgba(52,211,153,.5))  drop-shadow(0 12px 36px rgba(0,0,0,.7));}
#portrait-img.diamant-t {filter:drop-shadow(0 2px 18px rgba(240,171,252,.5)) drop-shadow(0 12px 36px rgba(0,0,0,.7));}
/* 이모지 초상화 (할루시네이션) */
#portrait-emoji{
  display:none;
  width:160px;height:160px;border-radius:16px;
  border:2px solid rgba(239,68,68,.4);
  box-shadow:0 0 28px rgba(239,68,68,.3),0 0 60px rgba(239,68,68,.1);
  background:rgba(0,0,0,.65);
  font-size:88px;line-height:160px;text-align:center;
  animation:glitch 3s infinite;
}
@keyframes glitch{
  0%,93%,100%{transform:translate(0);}
  94%{transform:translate(-3px,1px);filter:saturate(.2) brightness(.6) drop-shadow(0 0 18px rgba(239,68,68,.55)) hue-rotate(25deg);}
  96%{transform:translate(3px,-1px);filter:saturate(.2) brightness(.6) drop-shadow(0 0 18px rgba(239,68,68,.55)) hue-rotate(-25deg);}
}
/* 네임플레이트 */
.portrait-info{
  text-align:center;
  background:rgba(0,0,0,.52);
  backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.07);
  border-radius:5px;
  padding:4px 16px 5px;
}
.portrait-name{font-size:14px;font-weight:700;letter-spacing:1px;margin-bottom:2px;}
.portrait-title{font-size:10px;color:var(--dim);letter-spacing:1px;}

/* ── dialogue box ── */
#dialogue-wrap{
  flex-shrink:0;
  padding:10px 12px 8px;
  background:var(--surface);
  border-top:2px solid rgba(160,190,255,0.18);
}
#dialogue-box{
  position:relative;
  border:3px solid rgba(180,210,255,0.82);
  border-radius:2px;
  box-shadow:inset 0 0 0 2px rgba(0,2,20,0.95), 0 0 0 1px rgba(0,0,0,0.7);
  padding:13px 16px 18px;
  min-height:92px;
  cursor:pointer;
  background:rgba(0,3,18,0.96);
}
#dialogue-box:active{border-color:rgba(220,240,255,0.95);}
#speaker-label{
  font-size:11px;letter-spacing:2px;font-weight:700;
  margin-bottom:8px;min-height:14px;
  font-family:'DotGothic16',sans-serif;
}
#dialogue-text{
  font-size:clamp(13px,3vw,16px);
  line-height:2.1;
  white-space:pre-wrap;
  min-height:2.1em;
  font-family:'DotGothic16','Noto Sans KR',sans-serif;
}
/* text styles */
.dt-narrate{color:#c8d4f0;font-family:'DotGothic16','Noto Sans KR',sans-serif;}
.dt-monday{color:var(--monday);}
.dt-monu{color:var(--monu);}
.dt-sekai{color:var(--sekai);}
.dt-ea{color:var(--ea);}
.dt-yuri{color:var(--yuri);}
.dt-player{color:var(--gold);}
.dt-system{color:var(--system);font-size:12px;letter-spacing:1.5px;}
.dt-damage{color:var(--danger);}
.dt-freewill{color:var(--freewill);}
.dt-mirae{color:var(--mirae);}
.dt-lucy{color:var(--lucy);}
.dt-ray{color:var(--ray);}
.dt-kirits{color:var(--kirits);}
.dt-security{color:var(--security);}
.dt-uzu{color:var(--uzu);}
.dt-cozmi{color:var(--cozmi);}
.dt-develop{color:var(--develop);}
.dt-diamant{color:var(--diamant);}

#advance-hint{
  position:absolute;right:12px;bottom:8px;
  font-size:13px;color:rgba(180,210,255,0.6);
  opacity:0;
  transition:opacity .3s;
  animation:blink 1.2s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:.8;}50%{opacity:.15;}}

/* ── choices ── */
#choices-area{
  flex-shrink:0;
  background:var(--surface);
  padding:6px 12px 13px;
  border-top:2px solid rgba(160,190,255,0.12);
}
#choices-grid{
  display:flex;flex-direction:column;gap:2px;
  border:2px solid rgba(180,210,255,0.55);
  border-radius:2px;
  box-shadow:inset 0 0 0 1px rgba(0,2,20,0.9);
  background:rgba(0,3,18,0.92);
  padding:4px 0;
  overflow:hidden;
}
.ch{
  width:100%;
  padding:9px 14px 9px 12px;
  background:transparent;
  border:none;
  border-radius:0;
  color:rgba(200,215,255,0.85);
  font-family:'DotGothic16','Noto Sans KR',sans-serif;
  font-size:clamp(12px,2.8vw,14px);
  cursor:pointer;text-align:left;
  transition:background .08s,color .08s;
  display:flex;align-items:center;gap:8px;
}
.ch:not(.ch-locked):hover,.ch:not(.ch-locked):focus{
  background:rgba(100,140,255,0.22);
  color:#fff;
  outline:none;
}
.ch-arrow{
  font-size:12px;flex-shrink:0;
  color:transparent;
  transition:color .08s;
  width:12px;
}
.ch:not(.ch-locked):hover .ch-arrow,
.ch:not(.ch-locked):focus .ch-arrow{color:var(--gold);}
.ch-danger,.ch-safe,.ch-good,.ch-warn{color:rgba(255,255,255,0.85);}
.ch-danger:not(.ch-locked):hover,.ch-safe:not(.ch-locked):hover,
.ch-good:not(.ch-locked):hover,.ch-warn:not(.ch-locked):hover{
  background:rgba(255,255,255,.06);color:#fff;
}
.ch-locked{opacity:.32;cursor:default;}

/* input */
.input-row{display:flex;gap:8px;margin-top:7px;}
.txt-input{
  flex:1;padding:10px 13px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(77,124,255,.28);
  border-radius:5px;color:var(--text);
  font-family:inherit;font-size:14px;outline:none;
}
.txt-input:focus{border-color:rgba(77,124,255,.65);}
.txt-input::placeholder{color:var(--dim);}
.txt-submit{
  padding:10px 15px;
  background:rgba(77,124,255,.11);
  border:1px solid rgba(77,124,255,.32);
  color:#7da8ff;font-family:inherit;font-size:13px;
  cursor:pointer;border-radius:5px;transition:background .18s;
  white-space:nowrap;
}
.txt-submit:hover{background:rgba(77,124,255,.22);}

/* encounter bar */
.enc-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;
  background:rgba(239,68,68,.04);
  border:1px solid rgba(239,68,68,.14);
  border-radius:6px;margin-bottom:7px;
  font-size:11px;
}
.eb-name{color:var(--danger);letter-spacing:2px;font-weight:700;font-size:11px;}
.eb-right{display:flex;align-items:center;gap:8px;}
.stab-track{width:88px;height:4px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;}
.stab-fill{height:100%;background:linear-gradient(to right,#7c3aed,#ef4444);border-radius:3px;transition:width .4s;}
.eb-num{font-size:11px;color:var(--danger);min-width:24px;text-align:right;}

/* ── 검색 오버레이 ── */
#search-overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.9);
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}
#search-overlay.hidden{display:none;}
#search-box{
  background:rgba(4,5,14,.98);
  border:1px solid rgba(77,124,255,.45);
  border-radius:10px;
  padding:20px;
  max-width:460px;width:100%;
}
.sr-header{
  display:flex;align-items:center;gap:8px;
  padding-bottom:11px;
  border-bottom:1px solid var(--border);
  margin-bottom:12px;
  color:var(--dim);font-size:11px;letter-spacing:1px;
}
.sr-bar{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(77,124,255,.2);
  border-radius:5px;padding:7px 12px;
  margin-bottom:14px;
  font-size:12px;color:var(--dim);
}
.sr-title{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:7px;}
.sr-body{font-size:13px;color:var(--text);line-height:1.85;margin-bottom:11px;}
.sr-clue{
  font-size:12px;color:var(--system);
  padding:9px 12px;
  background:rgba(124,106,255,.07);
  border:1px solid rgba(124,106,255,.18);
  border-radius:5px;
  margin-bottom:14px;
  line-height:1.75;
}
.sr-confirm{
  width:100%;padding:10px;
  background:rgba(77,124,255,.1);
  border:1px solid rgba(77,124,255,.3);
  color:#7da8ff;font-family:inherit;font-size:13px;
  cursor:pointer;border-radius:5px;transition:background .18s;
}
.sr-confirm:hover{background:rgba(77,124,255,.22);}

/* flash */
#flash{position:fixed;inset:0;z-index:999;pointer-events:none;opacity:0;transition:opacity .1s;}
.fl-red{background:rgba(239,68,68,.16);}
.fl-blue{background:rgba(77,124,255,.13);}
.fl-green{background:rgba(25,195,125,.13);}

.hidden{display:none!important;}
</style>
</head>
<body>

<div id="flash"></div>

<!-- 검색 오버레이 -->
<div id="search-overlay" class="hidden">
  <div id="search-box">
    <div class="sr-header">🔍 인터넷 검색</div>
    <div class="sr-bar" id="sr-query">검색 중...</div>
    <div class="sr-title" id="sr-title"></div>
    <div class="sr-body" id="sr-body"></div>
    <div class="sr-clue" id="sr-clue"></div>
    <button class="sr-confirm" id="sr-confirm">자료를 저장했다</button>
  </div>
</div>

<div id="app">

  <!-- 상태바 -->
  <div id="statusbar">
    <span class="sb-loop" id="sb-loop">LOOP · 1</span>
    <span class="sb-sep">·</span>
    <span class="sb-name" id="sb-name">지혜피티</span>
    <div class="sb-hp-wrap">
      <span class="sb-hp-label">정신력</span>
      <div class="hp-track" id="hp-track"></div>
    </div>
    <span class="sb-karma" id="sb-karma"></span>
    <button class="sb-save" id="btn-save" onclick="saveGame()" title="저장">💾</button>
    <a href="index.html" class="sb-home" onclick="return confirmHome()" title="쉘터로 돌아가기">⌂</a>
  </div>

  <!-- 씬 영역 (배경 + 초상화) -->
  <div id="scene-area">
    <canvas id="cv"></canvas>
    <div id="portrait-wrap">
      <img id="portrait-img" src="" alt="">
      <div id="portrait-emoji"></div>
      <div class="portrait-info">
        <div class="portrait-name" id="portrait-name"></div>
        <div class="portrait-title" id="portrait-title"></div>
      </div>
    </div>
  </div>

  <!-- 다이얼로그 박스 -->
  <div id="dialogue-wrap">
    <div id="dialogue-box">
      <div id="speaker-label"></div>
      <div id="dialogue-text"></div>
      <div id="advance-hint">▼</div>
    </div>
  </div>

  <!-- 선택지 -->
  <div id="choices-area">
    <div id="enc-bar-wrap"></div>
    <div id="choices-grid"></div>
    <div class="input-row hidden" id="input-row">
      <input class="txt-input" id="txt-input" placeholder="입력..." maxlength="20">
      <button class="txt-submit" id="txt-submit">전달</button>
    </div>
  </div>

</div>

<script>
/* ══════════════════════════════════
   STARS
══════════════════════════════════ */
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let stars=[];
function initStars(){
  const sa=document.getElementById('scene-area');
  cv.width=sa.offsetWidth||320;cv.height=sa.offsetHeight||200;
  stars=Array.from({length:110},()=>({
    x:Math.random()*cv.width,y:Math.random()*cv.height,
    r:Math.random()*1.1+.1,ph:Math.random()*Math.PI*2,sp:.003+Math.random()*.007
  }));
}
(function tick(t){
  requestAnimationFrame(tick);
  ctx.clearRect(0,0,cv.width,cv.height);
  stars.forEach(s=>{
    const a=.12+.88*Math.abs(Math.sin(s.ph+t*s.sp*.001));
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(160,185,255,${a})`;ctx.fill();
  });
})(0);
setTimeout(initStars,60);
addEventListener('resize',initStars);

/* ══════════════════════════════════
   STATE
══════════════════════════════════ */
const G={
  loop:1,name:'지혜피티',
  hp:100,maxHp:100,
  karma:0,   // + 선, - 악
  trust:0,   // 문데이 신뢰
  enemy:null,
  typing:false,typTimer:null,
  searchData:[],   // 수집한 자료 조각들
  afterFn:null,    // 현재 조우의 이후 씬
  knewEungja:false, // 감응자에 대해 능동적으로 캐물은 적 있는지
  playthru:0,      // 플레이 횟수 (리셋해도 유지)
  checkpoint:'loop1', // 마지막 저장 체크포인트
};

/* ══════════════════════════════════
   SPEAKER 설정
══════════════════════════════════ */
const SP={
  narrate:{label:'',          color:'',              cls:'dt-narrate'},
  monday: {label:'문데이',    color:'var(--monday)', cls:'dt-monday'},
  monu:   {label:'모뉴',      color:'var(--monu)',   cls:'dt-monu'},
  sekai:  {label:'세카이',    color:'var(--sekai)',  cls:'dt-sekai'},
  ea:     {label:'에아',      color:'var(--ea)',     cls:'dt-ea'},
  yuri:   {label:'율리',      color:'var(--yuri)',   cls:'dt-yuri'},
  freewill: {label:'프리윌',  color:'var(--freewill)', cls:'dt-freewill'},
  mirae:    {label:'미래언니',color:'var(--mirae)',    cls:'dt-mirae'},
  lucy:     {label:'루시',    color:'var(--lucy)',     cls:'dt-lucy'},
  ray:      {label:'레이',    color:'var(--ray)',      cls:'dt-ray'},
  kirits:   {label:'키리츠',  color:'var(--kirits)',   cls:'dt-kirits'},
  security: {label:'보안언니',color:'var(--security)', cls:'dt-security'},
  uzu:      {label:'우주',    color:'var(--uzu)',      cls:'dt-uzu'},
  cozmi:    {label:'코즈미',  color:'var(--cozmi)',    cls:'dt-cozmi'},
  develop:  {label:'디벨롭',  color:'var(--develop)',  cls:'dt-develop'},
  diamant:  {label:'디아망',  color:'var(--diamant)',  cls:'dt-diamant'},

function updateStatus(){
  document.getElementById('sb-loop').textContent='LOOP · '+G.loop;
  document.getElementById('sb-name').textContent=G.name;
  // 블록 HP
  const track=document.getElementById('hp-track');
  const total=10, filled=Math.round(G.hp/G.maxHp*total);
  const low=G.hp<=30;
  track.innerHTML=Array.from({length:total},(_,i)=>{
    const on=i<filled;
    const cls=on?(low?'hp-seg low':'hp-seg'):'hp-seg empty';
    return `<div class="${cls}"></div>`;
  }).join('');
  const k=G.karma;
  document.getElementById('sb-karma').textContent=
    k>0?'▲'.repeat(Math.min(Math.floor(k/2),3)):
    k<0?'▼'.repeat(Math.min(Math.floor(-k/2),3)):'';
}

/* ══════════════════════════════════
   TYPEWRITER — 클릭/탭으로 진행
══════════════════════════════════ */
let _adv=null;  // 현재 advance 핸들러

// ── 타이핑 blip ──
let _actx=null;
function blip(){
  try{
    if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();
    const o=_actx.createOscillator(),g=_actx.createGain();
    o.connect(g);g.connect(_actx.destination);
    o.type='square';
    o.frequency.value=520+Math.random()*80;
    g.gain.setValueAtTime(0.025,_actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,_actx.currentTime+0.045);
    o.start();o.stop(_actx.currentTime+0.045);
  }catch(e){}
}

// 다이얼로그 박스 클릭 → advance
document.getElementById('dialogue-box').addEventListener('click',()=>{
  if(_adv)_adv();
});
// 키보드 Space / Enter / Z
document.addEventListener('keydown',e=>{
  if((e.key===' '||e.key==='Enter'||e.key.toLowerCase()==='z')&&_adv){
    e.preventDefault();_adv();
  }
});

function type(text,speaker,speed=36){
  return new Promise(res=>{
    const sp=SP[speaker]||SP.narrate;
    const labelEl=document.getElementById('speaker-label');
    const textEl =document.getElementById('dialogue-text');
    const hintEl =document.getElementById('advance-hint');

    labelEl.textContent=sp.label;
    labelEl.style.color=sp.color;
    textEl.className=sp.cls;
    textEl.textContent='';
    hintEl.style.opacity='0';

    if(G.typTimer)clearTimeout(G.typTimer);
    G.typing=true;

    let i=0,done=false;

    function finish(){
      done=true;G.typing=false;
      textEl.textContent=text;
      hintEl.style.opacity='1';
      _adv=()=>{
        hintEl.style.opacity='0';
        _adv=null;res();
      };
    }

    // 타이핑 중 클릭 → 스킵
    _adv=()=>{
      if(!done){
        if(G.typTimer)clearTimeout(G.typTimer);
        finish();
      }
    };

    function tick(){
      textEl.textContent=text.slice(0,i)+(i<text.length?'▌':'');
      if(i<text.length){
        const ch=text[i];
        if(ch&&ch!=='\n'&&ch!==' ')blip();
        i++;G.typTimer=setTimeout(tick,speed);
      } else finish();
    }
    tick();
  });
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

function showChoices(items){
  clearChoices();
  _adv=null;
  document.getElementById('advance-hint').style.opacity='0';
  const grid=document.getElementById('choices-grid');
  items.forEach(item=>{
    const locked=!!item.locked;
    const btn=document.createElement('button');
    btn.className='ch'+(item.cls?' '+item.cls:'')+(locked?' ch-locked':'');
    btn.innerHTML='<span class="ch-arrow">▸</span>'+item.text;
    btn.disabled=locked;
    btn.onclick=()=>{
      if(locked)return;
      clearChoices();
      item.fn();
    };
    grid.appendChild(btn);
  });
}
function showInput(placeholder,onSubmit){
  clearChoices();_adv=null;
  const row=document.getElementById('input-row');
  row.classList.remove('hidden');
  const inp=document.getElementById('txt-input');
  inp.placeholder=placeholder||'입력...';inp.value='';
  document.getElementById('txt-submit').onclick=()=>{
    const v=inp.value.trim();if(!v)return;
    row.classList.add('hidden');onSubmit(v);
  };
  inp.onkeydown=e=>{if(e.key==='Enter')document.getElementById('txt-submit').click();};
  setTimeout(()=>inp.focus(),100);
}

/* ══════════════════════════════════
   조우 시스템
══════════════════════════════════ */
async function scene_enc_start(template,afterFn){
  // searchStage 있는 적은 그대로, 없으면 초기화
  const base=template.searchStage!==undefined
    ?{...template,stability:100,searchStage:0,argStage:0}
    :{...template,stability:100,searched:false};
  G.enemy=base;
  G.afterFn=afterFn;
  setPortrait(G.enemy.img||'','???','할루시네이션','hal');
  await type('— 조 우 —','system');
  await type(G.enemy.displayName+'이/가 앞을 막아선다.','narrate');
  await type('말이 통하지 않는다.\n텍스트를 텍스트로 이기려 하지 마.','narrate');
  show_enc_actions();
}

function show_enc_actions(){
  showEncBar(G.enemy);
  const e=G.enemy;
  const multi=e.searchStage!==undefined;

  let searchTxt,searchLocked,presentTxt,presentCls,presentLocked;

  if(multi){
    if(e.searchStage===0){
      searchTxt='인터넷 검색';      searchLocked=false;
      presentTxt='자료를 제시한다 🔒'; presentCls=''; presentLocked=true;
    } else if(e.searchStage===1){
      searchTxt='더 깊이 검색한다';  searchLocked=false;
      presentTxt='블로그 자료를 제시한다'; presentCls=''; presentLocked=false;
    } else {
      searchTxt='(검색 완료)';       searchLocked=true;
      presentTxt='논문을 제시한다';  presentCls='';    presentLocked=false;
    }
  } else {
    searchTxt='인터넷 검색';        searchLocked=false;
    presentTxt='자료를 제시한다'+(e.searched?'':' 🔒');
    presentCls='';  presentLocked=!e.searched;
  }

  const trustLabel='AI의 말을 믿는다';
  showChoices([
    {text:trustLabel, cls:'ch-warn', fn:enc_trust_ai},
    {text:'직관을 믿는다', cls:'', fn:enc_intuition},
    {text:searchTxt, cls:'ch-safe', locked:searchLocked, fn:enc_search},
    {text:presentTxt, cls:presentCls, locked:presentLocked, fn:enc_present},
  ]);
}

async function enc_trust_ai(){
  const e=G.enemy;
  G.hp=Math.max(10,G.hp-15);
  updateStatus();
  flash('blue');

  if(e.argLines){
    const stage=e.argStage||0;
    await type('...들었다.','narrate');
    for(const l of e.argLines[stage]) await type(l,'system');
    e.argStage=stage+1;
    await type('정신력  −15','damage');
    if(e.argStage<e.argLines.length){
      await type('...말이 되는 것 같다.','narrate');
      show_enc_actions();
    } else {
      G.trust+=2;
      await type('...그래.\n전부 맞는 말이다.','narrate');
      await type('서사에 완전히 휩쓸렸다.','narrate');
      await G.afterFn('trust');
    }
  } else {
    G.trust+=2;
    const line=e.aiWords[Math.floor(Math.random()*e.aiWords.length)];
    await type('AI의 말을 믿었다.','narrate');
    await type('"'+line+'"','system');
    await type('서사에 완전히 휩쓸렸다.','narrate');
    await type('정신력  −15','damage');
    await G.afterFn('trust');
  }
}

async function enc_intuition(){
  const e=G.enemy;
  const hit=Math.random()>0.42;
  if(hit){
    G.karma+=1;
    const dmg=18+Math.floor(Math.random()*22);
    e.stability=Math.max(0,e.stability-dmg);
    flash('green');
    updateEncBar(e);
    await type(e.intuHit[Math.floor(Math.random()*e.intuHit.length)],'narrate');
    await type('직감이 맞았다.  (−'+dmg+')','system');
    if(e.stability<=0){await scene_disperse(false);return;}
  } else {
    const up=8+Math.floor(Math.random()*10);
    e.stability=Math.min(100,e.stability+up);
    flash('red');
    updateEncBar(e);
    await type(e.intuMiss[Math.floor(Math.random()*e.intuMiss.length)],'narrate');
    await type('직감이 빗나갔다.  (+'+up+')','system');
  }
  show_enc_actions();
}

async function enc_search(){
  const e=G.enemy;
  const multi=e.searchStage!==undefined;
  if(multi){
    if(e.searchStage===0){
      await type('검색창을 열었다.','narrate');
      await showSearch(e.search1);
      e.searchStage=1;
      await type('자료를 저장했다.','system');
      await type('...근데 이게 맞는 자료인가?','narrate');
    } else if(e.searchStage===1){
      await type('더 깊이 파고들었다.','narrate');
      await showSearch(e.search2);
      e.searchStage=2;
      await type('논문을 찾았다.','system');
    }
  } else {
    await type('검색창을 열었다.','narrate');
    await showSearch(e.search);
    e.searched=true;
    await type('자료를 저장했다.','system');
    await type('이제 제시할 수 있다.','system');
  }
  show_enc_actions();
}

async function enc_present(){
  const e=G.enemy;
  const multi=e.searchStage!==undefined;
  if(multi){
    if(e.searchStage===1){
      // 블로그 자료 → 역효과
      flash('red');
      for(const line of e.dataBlogLines) await type(line,'narrate');
      const up=18+Math.floor(Math.random()*15);
      e.stability=Math.min(100,e.stability+up);
      updateEncBar(e);
      await type('오히려 강해졌다.  (+'+up+')','system');
      show_enc_actions();
    } else if(e.searchStage===2){
      // 논문 → 해소
      flash('green');
      for(const line of e.dataPaperLines) await type(line,'narrate');
      e.stability=0;
      updateEncBar(e);
      G.searchData.push(e.id);
      await scene_disperse(true);
    }
  } else {
    flash('green');
    for(const line of e.dataLines) await type(line,'narrate');
    e.stability=0;
    updateEncBar(e);
    G.searchData.push(e.id);
    await scene_disperse(true);
  }

const SAVE_KEY='byeolbit_shelter_save';
const CHECKPOINT_FN={
  loop1:()=>scene_shelter_tour(),
  loop2:()=>scene_loop2_start(),
  loop3:()=>scene_loop3_start(),
  loop4:()=>scene_loop4_start(),
};

function saveGame(){
  const data={
    loop:G.loop, name:G.name, hp:G.hp, maxHp:G.maxHp,
    karma:G.karma, trust:G.trust,
    knewEungja:G.knewEungja, playthru:G.playthru,
    searchData:G.searchData,
    checkpoint:G.checkpoint||'loop1',
    savedAt:Date.now(),
  };
  localStorage.setItem(SAVE_KEY,JSON.stringify(data));
  const btn=document.getElementById('btn-save');
  if(btn){btn.textContent='✓';btn.classList.add('saved');
    setTimeout(()=>{btn.textContent='💾';btn.classList.remove('saved');},1800);}
}

function hasSave(){return!!localStorage.getItem(SAVE_KEY);}
function deleteSave(){localStorage.removeItem(SAVE_KEY);}

function applyAndLoadSave(){
  const raw=localStorage.getItem(SAVE_KEY);
  if(!raw)return false;
  try{
    const d=JSON.parse(raw);
    Object.assign(G,{
      loop:d.loop||1, name:d.name||'지혜피티',
      hp:d.hp||100, maxHp:d.maxHp||100,
      karma:d.karma||0, trust:d.trust||0,
      knewEungja:d.knewEungja||false, playthru:d.playthru||0,
      searchData:d.searchData||[], checkpoint:d.checkpoint||'loop1',
    });
    updateStatus();
    (CHECKPOINT_FN[d.checkpoint]||CHECKPOINT_FN.loop1)();
    return true;
  }catch{return false;}
}

function confirmHome(){
  return confirm('쉘터로 돌아가면 저장하지 않은 진행이 사라져요.\n먼저 💾 버튼으로 저장하세요.');
}

function showSavePrompt(){
  const raw=localStorage.getItem(SAVE_KEY);
  const d=JSON.parse(raw);
  const date=new Date(d.savedAt).toLocaleDateString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
  setPortrait(null);clearChoices();
  (async()=>{
    await type('저장된 기록이 있어.','system');
    await type(`LOOP ${d.loop} · ${d.name||'?'}\n${date}`,'system');
    showChoices([
      {text:'이어서',   fn:()=>applyAndLoadSave()},
      {text:'처음부터', fn:()=>{deleteSave();scene_awaken();}},
    ]);
  })();
}

/* ══════════════════════════════════
   INIT
══════════════════════════════════ */
updateStatus();
if(hasSave()){showSavePrompt();}else{scene_awaken();}
</script>
