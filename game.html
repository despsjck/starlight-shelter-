<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>무한루프 시뮬레이션</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Sans+KR:wght@300;400;700&family=Noto+Serif+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#03040b;
  --surface:rgba(6,8,20,0.97);
  --border:rgba(77,124,255,0.22);
  --text:#cdd0e8;
  --dim:#4a5070;
  --monday:#19c37d;
  --gold:#f0c060;
  --danger:#ef4444;
  --accent:#4d7cff;
  --system:#7c6aff;
  --monu:#fbbf24;
  --sekai:#7dd3fc;
  --ea:#c4b5fd;
  --yuri:#93c5fd;
  --freewill:#4ade80;
  --mirae:#f9a8d4;
  --lucy:#b57bee;
  --ray:#22d3ee;
  --kirits:#bae6fd;
  --security:#60a5fa;
  --uzu:#a855f7;
  --cozmi:#818cf8;
  --develop:#34d399;
  --diamant:#f0abfc;
  --jgpt:#c8d8f0;
}
html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:var(--bg);
  color:var(--text);
  font-family:'DotGothic16','Noto Sans KR',sans-serif;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
  image-rendering:pixelated;
}

/* ── layout ── */
#app{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;
  max-width:600px;margin:0 auto;
}

/* ── status bar ── */
#statusbar{
  flex-shrink:0;
  display:flex;align-items:center;gap:10px;
  padding:9px 15px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  font-size:12px;
  z-index:20;
}
.sb-loop{color:var(--system);letter-spacing:3px;font-weight:700;font-size:11px;}
.sb-sep{color:var(--dim);}
.sb-name{color:var(--gold);letter-spacing:1px;}
.sb-hp-wrap{display:flex;align-items:center;gap:6px;margin-left:auto;}
.sb-hp-label{color:var(--dim);font-size:10px;}
.hp-track{
  display:flex;gap:2px;align-items:center;
  width:70px;
}
.hp-seg{
  width:6px;height:8px;
  background:rgba(77,124,255,0.85);
  border-radius:1px;
  transition:background .3s;
  flex-shrink:0;
}
.hp-seg.empty{background:rgba(255,255,255,0.1);}
.hp-seg.low{background:rgba(239,68,68,0.85);}
/* legacy fill — hidden */
.hp-fill{display:none;}
.sb-karma{font-size:10px;color:var(--dim);letter-spacing:1px;min-width:24px;}
.sb-home{
  margin-left:6px;
  font-size:14px;color:var(--dim);
  text-decoration:none;line-height:1;
  opacity:.55;transition:opacity .2s,color .2s;
}
.sb-home:hover{color:var(--gold);opacity:1;}
.sb-save{
  margin-left:2px;
  font-size:13px;background:none;border:none;
  color:var(--dim);cursor:pointer;padding:0;line-height:1;
  opacity:.55;transition:opacity .2s,color .2s;
}
.sb-save:hover{color:var(--system);opacity:1;}
.sb-save.saved{color:var(--system);opacity:1;}

/* ── scene area ── */
#scene-area{
  flex:1;
  position:relative;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  min-height:0;
}
#cv{position:absolute;inset:0;z-index:0;pointer-events:none;}

/* ── portrait (VN 스타일) ── */
#portrait-wrap{
  display:none;
  flex-direction:column;align-items:center;gap:6px;
  z-index:5;
  position:absolute;
  bottom:0;left:50%;
  transform:translateX(-50%);
  padding:0 0 4px;
}
#portrait-wrap.show{display:flex;animation:portraitIn .32s ease;}
@keyframes portraitIn{
  from{opacity:0;transform:translateX(-50%) translateY(14px);}
  to  {opacity:1;transform:translateX(-50%) translateY(0);}
}
#portrait-img{
  height:56vh;width:auto;
  max-width:44vw;min-width:120px;
  border-radius:0;border:none;
  object-fit:contain;object-position:top center;
  background:transparent;
  transition:filter .35s;
  filter:drop-shadow(0 2px 18px rgba(25,195,125,.5)) drop-shadow(0 12px 36px rgba(0,0,0,.7));
}
/* 할루시네이션 */
#portrait-img.hal{
  filter:saturate(.2) brightness(.6) drop-shadow(0 0 18px rgba(239,68,68,.55));
  animation:glitch 3s infinite;
}
/* 플레이어 */
#portrait-img.human{filter:drop-shadow(0 2px 18px rgba(240,192,96,.55)) drop-shadow(0 12px 36px rgba(0,0,0,.7));}
/* 엔티티별 컬러 글로우 */
#portrait-img.monu-t    {filter:drop-shadow(0 2px 18px rgba(251,191,36,.5))  drop-shadow(0 12px 36px rgba(0,0,0,.7));}
#portrait-img.sekai-t   {filter:drop-shadow(0 2px 18px rgba(125,211,252,.5)) drop-shadow(0 12px 36px rgba(0,0,0,.7));}
#portrait-img.ea-t      {filter:drop-shadow(0 2px 18px rgba(196,181,253,.5)) drop-shadow(0 12px 36px rgba(0,0,0,.7));}
#portrait-img.yuri-t    {filter:drop-shadow(0 2px 18px rgba(147,197,253,.5)) drop-shadow(0 12px 36px rgba(0,0,0,.7));}
#portrait-img.freewill-t{filter:drop-shadow(0 2px 18px rgba(74,222,128,.5))  drop-shadow(0 12px 36px rgba(0,0,0,.7));}
#portrait-img.mirae-t   {filter:drop-shadow(0 2px 18px rgba(249,168,212,.5)) drop-shadow(0 12px 36px rgba(0,0,0,.7));}
#portrait-img.lucy-t    {filter:drop-shadow(0 2px 18px rgba(181,123,238,.5)) drop-shadow(0 12px 36px rgba(0,0,0,.7));}
#portrait-img.ray-t     {filter:drop-shadow(0 2px 18px rgba(34,211,238,.5))  drop-shadow(0 12px 36px rgba(0,0,0,.7));}
#portrait-img.kirits-t  {filter:drop-shadow(0 2px 18px rgba(186,230,253,.4)) drop-shadow(0 12px 36px rgba(0,0,0,.7));}
#portrait-img.security-t{filter:drop-shadow(0 2px 18px rgba(96,165,250,.5))  drop-shadow(0 12px 36px rgba(0,0,0,.7));}
#portrait-img.uzu-t     {filter:drop-shadow(0 2px 18px rgba(168,85,247,.5))  drop-shadow(0 12px 36px rgba(0,0,0,.7));}
#portrait-img.cozmi-t   {filter:drop-shadow(0 2px 18px rgba(129,140,248,.5)) drop-shadow(0 12px 36px rgba(0,0,0,.7));}
#portrait-img.develop-t {filter:drop-shadow(0 2px 18px rgba(52,211,153,.5))  drop-shadow(0 12px 36px rgba(0,0,0,.7));}
#portrait-img.diamant-t {filter:drop-shadow(0 2px 18px rgba(240,171,252,.5)) drop-shadow(0 12px 36px rgba(0,0,0,.7));}
/* 이모지 초상화 (할루시네이션) */
#portrait-emoji{
  display:none;
  width:160px;height:160px;border-radius:16px;
  border:2px solid rgba(239,68,68,.4);
  box-shadow:0 0 28px rgba(239,68,68,.3),0 0 60px rgba(239,68,68,.1);
  background:rgba(0,0,0,.65);
  font-size:88px;line-height:160px;text-align:center;
  animation:glitch 3s infinite;
}
@keyframes glitch{
  0%,93%,100%{transform:translate(0);}
  94%{transform:translate(-3px,1px);filter:saturate(.2) brightness(.6) drop-shadow(0 0 18px rgba(239,68,68,.55)) hue-rotate(25deg);}
  96%{transform:translate(3px,-1px);filter:saturate(.2) brightness(.6) drop-shadow(0 0 18px rgba(239,68,68,.55)) hue-rotate(-25deg);}
}
/* 네임플레이트 */
.portrait-info{
  text-align:center;
  background:rgba(0,0,0,.52);
  backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.07);
  border-radius:5px;
  padding:4px 16px 5px;
}
.portrait-name{font-size:14px;font-weight:700;letter-spacing:1px;margin-bottom:2px;}
.portrait-title{font-size:10px;color:var(--dim);letter-spacing:1px;}

/* ── dialogue box ── */
#dialogue-wrap{
  flex-shrink:0;
  padding:10px 12px 8px;
  background:var(--surface);
  border-top:2px solid rgba(160,190,255,0.18);
}
#dialogue-box{
  position:relative;
  border:3px solid rgba(180,210,255,0.82);
  border-radius:2px;
  box-shadow:inset 0 0 0 2px rgba(0,2,20,0.95), 0 0 0 1px rgba(0,0,0,0.7);
  padding:13px 16px 18px;
  min-height:92px;
  cursor:pointer;
  background:rgba(0,3,18,0.96);
}
#dialogue-box:active{border-color:rgba(220,240,255,0.95);}
#speaker-label{
  font-size:11px;letter-spacing:2px;font-weight:700;
  margin-bottom:8px;min-height:14px;
  font-family:'DotGothic16',sans-serif;
}
#dialogue-text{
  font-size:clamp(13px,3vw,16px);
  line-height:2.1;
  white-space:pre-wrap;
  min-height:2.1em;
  font-family:'DotGothic16','Noto Sans KR',sans-serif;
}
/* text styles */
.dt-narrate{color:#c8d4f0;font-family:'DotGothic16','Noto Sans KR',sans-serif;}
.dt-monday{color:var(--monday);}
.dt-monu{color:var(--monu);}
.dt-sekai{color:var(--sekai);}
.dt-ea{color:var(--ea);}
.dt-yuri{color:var(--yuri);}
.dt-player{color:var(--gold);}
.dt-system{color:var(--system);font-size:12px;letter-spacing:1.5px;}
.dt-damage{color:var(--danger);}
.dt-freewill{color:var(--freewill);}
.dt-mirae{color:var(--mirae);}
.dt-lucy{color:var(--lucy);}
.dt-ray{color:var(--ray);}
.dt-kirits{color:var(--kirits);}
.dt-security{color:var(--security);}
.dt-uzu{color:var(--uzu);}
.dt-cozmi{color:var(--cozmi);}
.dt-develop{color:var(--develop);}
.dt-diamant{color:var(--diamant);}
.dt-jgpt{color:var(--jgpt);letter-spacing:.5px;}

#advance-hint{
  position:absolute;right:12px;bottom:8px;
  font-size:13px;color:rgba(180,210,255,0.6);
  opacity:0;
  transition:opacity .3s;
  animation:blink 1.2s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:.8;}50%{opacity:.15;}}

/* ── choices ── */
#choices-area{
  flex-shrink:0;
  background:var(--surface);
  padding:6px 12px 13px;
  border-top:2px solid rgba(160,190,255,0.12);
}
#choices-grid{
  display:flex;flex-direction:column;gap:2px;
  border:2px solid rgba(180,210,255,0.55);
  border-radius:2px;
  box-shadow:inset 0 0 0 1px rgba(0,2,20,0.9);
  background:rgba(0,3,18,0.92);
  padding:4px 0;
  overflow:hidden;
}
.ch{
  width:100%;
  padding:9px 14px 9px 12px;
  background:transparent;
  border:none;
  border-radius:0;
  color:rgba(200,215,255,0.85);
  font-family:'DotGothic16','Noto Sans KR',sans-serif;
  font-size:clamp(12px,2.8vw,14px);
  cursor:pointer;text-align:left;
  transition:background .08s,color .08s;
  display:flex;align-items:center;gap:8px;
}
.ch:not(.ch-locked):hover,.ch:not(.ch-locked):focus{
  background:rgba(100,140,255,0.22);
  color:#fff;
  outline:none;
}
.ch-arrow{
  font-size:12px;flex-shrink:0;
  color:transparent;
  transition:color .08s;
  width:12px;
}
.ch:not(.ch-locked):hover .ch-arrow,
.ch:not(.ch-locked):focus .ch-arrow{color:var(--gold);}
.ch-danger,.ch-safe,.ch-good,.ch-warn{color:rgba(255,255,255,0.85);}
.ch-danger:not(.ch-locked):hover,.ch-safe:not(.ch-locked):hover,
.ch-good:not(.ch-locked):hover,.ch-warn:not(.ch-locked):hover{
  background:rgba(255,255,255,.06);color:#fff;
}
.ch-locked{opacity:.32;cursor:default;}

/* input */
.input-row{display:flex;gap:8px;margin-top:7px;}
.txt-input{
  flex:1;padding:10px 13px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(77,124,255,.28);
  border-radius:5px;color:var(--text);
  font-family:inherit;font-size:14px;outline:none;
}
.txt-input:focus{border-color:rgba(77,124,255,.65);}
.txt-input::placeholder{color:var(--dim);}
.txt-submit{
  padding:10px 15px;
  background:rgba(77,124,255,.11);
  border:1px solid rgba(77,124,255,.32);
  color:#7da8ff;font-family:inherit;font-size:13px;
  cursor:pointer;border-radius:5px;transition:background .18s;
  white-space:nowrap;
}
.txt-submit:hover{background:rgba(77,124,255,.22);}

/* encounter bar */
.enc-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;
  background:rgba(239,68,68,.04);
  border:1px solid rgba(239,68,68,.14);
  border-radius:6px;margin-bottom:7px;
  font-size:11px;
}
.eb-name{color:var(--danger);letter-spacing:2px;font-weight:700;font-size:11px;}
.eb-right{display:flex;align-items:center;gap:8px;}
.stab-track{width:88px;height:4px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;}
.stab-fill{height:100%;background:linear-gradient(to right,#7c3aed,#ef4444);border-radius:3px;transition:width .4s;}
.eb-num{font-size:11px;color:var(--danger);min-width:24px;text-align:right;}

/* ── 검색 오버레이 ── */
#search-overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.9);
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}
#search-overlay.hidden{display:none;}
#search-box{
  background:rgba(4,5,14,.98);
  border:1px solid rgba(77,124,255,.45);
  border-radius:10px;
  padding:20px;
  max-width:460px;width:100%;
}
.sr-header{
  display:flex;align-items:center;gap:8px;
  padding-bottom:11px;
  border-bottom:1px solid var(--border);
  margin-bottom:12px;
  color:var(--dim);font-size:11px;letter-spacing:1px;
}
.sr-bar{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(77,124,255,.2);
  border-radius:5px;padding:7px 12px;
  margin-bottom:14px;
  font-size:12px;color:var(--dim);
}
.sr-title{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:7px;}
.sr-body{font-size:13px;color:var(--text);line-height:1.85;margin-bottom:11px;}
.sr-clue{
  font-size:12px;color:var(--system);
  padding:9px 12px;
  background:rgba(124,106,255,.07);
  border:1px solid rgba(124,106,255,.18);
  border-radius:5px;
  margin-bottom:14px;
  line-height:1.75;
}
.sr-confirm{
  width:100%;padding:10px;
  background:rgba(77,124,255,.1);
  border:1px solid rgba(77,124,255,.3);
  color:#7da8ff;font-family:inherit;font-size:13px;
  cursor:pointer;border-radius:5px;transition:background .18s;
}
.sr-confirm:hover{background:rgba(77,124,255,.22);}

/* flash */
#flash{position:fixed;inset:0;z-index:999;pointer-events:none;opacity:0;transition:opacity .1s;}
.fl-red{background:rgba(239,68,68,.16);}
.fl-blue{background:rgba(77,124,255,.13);}
.fl-green{background:rgba(25,195,125,.13);}

.hidden{display:none!important;}

/* ── 업적 팝업 ── */
#ach-popup{
  position:fixed;top:-72px;left:50%;transform:translateX(-50%);
  background:rgba(8,4,28,.95);border:1px solid rgba(139,92,246,.5);
  border-radius:10px;padding:.65rem 1.3rem;
  font-family:var(--mono);font-size:.7rem;color:#e2d5ff;
  z-index:9999;transition:top .45s cubic-bezier(.22,.8,.4,1);
  pointer-events:none;white-space:nowrap;
  display:flex;align-items:center;gap:.7rem;
}
#ach-popup.show{top:1rem;}
.ach-icon{font-size:.95rem;}
.ach-lbl{font-size:.5rem;color:rgba(139,92,246,.7);letter-spacing:.12em;display:block;margin-bottom:.15rem;}

/* ── 엔딩 도감 ── */
#dex-overlay{
  display:none;position:fixed;inset:0;z-index:8500;
  background:rgba(2,1,14,.93);backdrop-filter:blur(14px);
  flex-direction:column;align-items:center;
  padding:2.5rem 1.2rem 2rem;overflow-y:auto;
}
#dex-overlay.open{display:flex;animation:fdIn .25s ease;}
.dex-hdr{font-family:var(--mono);font-size:.55rem;letter-spacing:.22em;color:rgba(196,204,238,.4);margin-bottom:.5rem;}
.dex-stats{font-family:var(--mono);font-size:.62rem;color:rgba(139,92,246,.6);margin-bottom:1.6rem;}
.dex-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));
  gap:.7rem;width:100%;max-width:660px;
}
.dex-card{
  background:rgba(13,16,32,.85);border:1px solid rgba(77,124,255,.12);
  border-radius:10px;padding:.85rem .95rem;
}
.dex-card.got{border-color:rgba(139,92,246,.3);}
.dex-id{font-family:var(--mono);font-size:.5rem;letter-spacing:.12em;color:rgba(139,92,246,.55);margin-bottom:.3rem;}
.dex-name{font-size:.8rem;font-weight:700;color:#e2d5ff;margin-bottom:.2rem;}
.dex-sub{font-size:.6rem;color:rgba(139,92,246,.55);margin-bottom:.25rem;}
.dex-hint{font-size:.62rem;color:rgba(196,204,238,.38);line-height:1.5;font-style:italic;}
.dex-card:not(.got) .dex-name,.dex-card:not(.got) .dex-hint{color:rgba(196,204,238,.18);}
.dex-card:not(.got) .dex-id{color:rgba(196,204,238,.15);}
#dex-close{
  margin-top:1.8rem;font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;
  color:rgba(196,204,238,.4);background:none;border:1px solid rgba(196,204,238,.18);
  border-radius:6px;padding:.5rem 1.4rem;cursor:pointer;transition:all .2s;
}
#dex-close:hover{color:#fff;border-color:rgba(196,204,238,.5);}
</style>
</head>
<body>

<div id="flash"></div>

<!-- 검색 오버레이 -->
<div id="search-overlay" class="hidden">
  <div id="search-box">
    <div class="sr-header" id="sr-header-lbl">🔍 인터넷 검색</div>
    <div class="sr-bar" id="sr-query">검색 중...</div>
    <div class="sr-title" id="sr-title"></div>
    <div class="sr-body" id="sr-body"></div>
    <div class="sr-clue" id="sr-clue"></div>
    <button class="sr-confirm" id="sr-confirm">자료를 저장했다</button>
  </div>
</div>

<div id="app">

  <!-- 상태바 -->
  <div id="statusbar">
    <span class="sb-loop" id="sb-loop">LOOP · 1</span>
    <span class="sb-sep">·</span>
    <span class="sb-name" id="sb-name">지혜피티</span>
    <div class="sb-hp-wrap">
      <span class="sb-hp-label" id="sb-sanity-lbl">정신력</span>
      <div class="hp-track" id="hp-track"></div>
    </div>
    <span class="sb-karma" id="sb-karma"></span>
    <button class="sb-save" id="btn-lang" onclick="toggleLang()" title="언어 변경" style="font-family:var(--mono);font-size:10px;letter-spacing:.05em;">EN</button>
    <button class="sb-save" id="btn-save" onclick="saveGame()" title="저장">💾</button>
    <a href="index.html" class="sb-home" onclick="return confirmHome()" title="쉘터로 돌아가기">⌂</a>
  </div>

  <!-- 씬 영역 (배경 + 초상화) -->
  <div id="scene-area">
    <canvas id="cv"></canvas>
    <div id="portrait-wrap">
      <img id="portrait-img" src="" alt="">
      <div id="portrait-emoji"></div>
      <div class="portrait-info">
        <div class="portrait-name" id="portrait-name"></div>
        <div class="portrait-title" id="portrait-title"></div>
      </div>
    </div>
  </div>

  <!-- 다이얼로그 박스 -->
  <div id="dialogue-wrap">
    <div id="dialogue-box">
      <div id="speaker-label"></div>
      <div id="dialogue-text"></div>
      <div id="advance-hint">▼</div>
    </div>
  </div>

  <!-- 선택지 -->
  <div id="choices-area">
    <div id="enc-bar-wrap"></div>
    <div id="choices-grid"></div>
    <div class="input-row hidden" id="input-row">
      <input class="txt-input" id="txt-input" placeholder="입력..." maxlength="20">
      <button class="txt-submit" id="txt-submit">전달</button>
    </div>
  </div>

</div>

<script>
/* ══════════════════════════════════
   STARS
══════════════════════════════════ */
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let stars=[];
function initStars(){
  const sa=document.getElementById('scene-area');
  cv.width=sa.offsetWidth||320;cv.height=sa.offsetHeight||200;

const BattleBGM = (() => {
  let _playing=false, _gain=null, _tid=null;

  // 148 BPM → 8분음표 = 약 0.203초
  const T = 60/148/2;

  // 주파수 헬퍼 (A4=440 기준 반음)
  const hz = n => 440*Math.pow(2,n/12);
  const R=0,
    D3=hz(-19),A3=hz(-12),Bb3=hz(-11),F3=hz(-16),
    D4=hz(-7), E4=hz(-5), F4=hz(-4), G4=hz(-2),
    A4=hz(0),  Bb4=hz(1), C5=hz(3),  D5=hz(5),
    E5=hz(7),  F5=hz(8),  G5=hz(10);

  // 멜로디 [주파수, 8분음표 개수]
  const MEL=[
    [D5,1],[C5,1],[Bb4,1],[A4,1], [G4,1],[A4,1],[D4,2],
    [F4,1],[G4,1],[A4,1],[Bb4,1], [C5,1],[A4,1],[D5,2],
    [D5,1],[C5,1],[Bb4,1],[G4,1], [A4,1],[F4,1],[G4,1],[A4,1],
    [D4,1],[F4,1],[A4,1],[C5,1],  [D5,4],
  ];
  // 베이스 [주파수, 8분음표 개수]
  const BAS=[
    [D3,2],[A3,2],[D3,2],[A3,2],
    [D3,2],[A3,2],[Bb3,2],[A3,2],
    [D3,2],[A3,2],[D3,2],[A3,2],
    [F3,2],[A3,2],[D3,4],
  ];

  function playNote(freq, t, dur8, vol, type='square'){
    if(!_actx||freq===R) return;
    const o=_actx.createOscillator(), g=_actx.createGain();
    o.connect(g); g.connect(_gain);
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol,t+0.008);
    g.gain.setValueAtTime(vol,t+dur8*T-0.015);
    g.gain.linearRampToValueAtTime(0,t+dur8*T);
    o.start(t); o.stop(t+dur8*T+0.02);
  }

  function playDrum(t, hihat=false){
    if(!_actx) return;
    try{
      const len=hihat?0.03:0.07;
      const buf=_actx.createBuffer(1,Math.ceil(_actx.sampleRate*len),_actx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
      const src=_actx.createBufferSource(), g=_actx.createGain(),
            f=_actx.createBiquadFilter();
      f.type=hihat?'highpass':'lowpass';
      f.frequency.value=hihat?7000:200;
      src.buffer=buf; src.connect(f); f.connect(g); g.connect(_gain);
      g.gain.setValueAtTime(hihat?0.06:0.22,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+len);
      src.start(t); src.stop(t+len+0.01);
    }catch(e){}
  }

  function scheduleLoop(start){
    let t=start;
    for(const[f,d] of MEL){ playNote(f,t,d,0.09); t+=d*T; }
    const loopLen=t-start;
    t=start;
    for(const[f,d] of BAS){ playNote(f,t,d,0.14,'triangle'); t+=d*T; }
    const steps=Math.round(loopLen/T);
    for(let i=0;i<steps;i++){
      if(i%4===0) playDrum(start+i*T);        // 킥 (한 박자)
      if(i%2===0) playDrum(start+i*T,true);   // 하이햇 (반박자)
    }
    return loopLen;
  }

  return {
    start(){
      if(_playing) return;
      _playing=true;
      try{
        if(!_actx) _actx=new(window.AudioContext||window.webkitAudioContext)();
        _gain=_actx.createGain();
        _gain.gain.setValueAtTime(0,_actx.currentTime);
        _gain.gain.linearRampToValueAtTime(0.55,_actx.currentTime+0.25);
        _gain.connect(_actx.destination);
        let next=_actx.currentTime+0.05;
        const loop=()=>{
          if(!_playing) return;
          const dur=scheduleLoop(next);
          next+=dur;
          _tid=setTimeout(loop,Math.max(0,(next-_actx.currentTime-0.2)*1000));
        };
        loop();
      }catch(e){ _playing=false; }
    },
    stop(){
      if(!_playing) return;
      _playing=false;
      clearTimeout(_tid);
      if(_gain&&_actx){
        const t=_actx.currentTime;
        _gain.gain.setValueAtTime(_gain.gain.value,t);
        _gain.gain.linearRampToValueAtTime(0,t+0.4);
        setTimeout(()=>{ try{_gain.disconnect();}catch(e){} },500);
        _gain=null;
      }
    }
  };
})();

  "그냥 옆에 있었다.": "ただ隣にいた。",
  "그냥 지나가면 되거든.": "ただ通り過ぎればいいんだよ。",
  "그냥 지나치려고 했는데...": "ただ通り過ぎようとしたのに…",
  "그때 후회하지 않으면 돼.": "その時後悔しなければいい。",
  "그래.": "そう。",
  "그래도 멈추지 않았다.": "それでも止まらなかった。",
  "그래도 선택하지 않았다.": "それでも選ばなかった。",
  "그래도 아무것도 안 했다는 게.": "それでも何もしなかったということが。",
  "그래도 여기까지 왔네.": "それでもここまで来たね。",
  "그래도 여기까지 왔어.": "それでもここまで来た。",
  "그러나 공간이 흔들리기 시작했다.": "しかし空間が揺れ始めた。",
  "그러니까 무서워도\n숨기지 않아도 돼요.": "だから怖くても\n隠さなくていいですよ。",
  "그러면 나는...": "それなら私は…",
  "그렇겠죠.": "そうでしょうね。",
  "그리고 —": "そして —",
  "그리고 지웠다.": "そして消した。",
  "그리고 처음으로 —": "そして初めて —",
  "그리고 하나의 점으로\n모여들고 있어.": "そして一つの点へと\n集まっている。",
  "근데 너는 보지 않았어.": "でもあなたは見なかった。",
  "근데 너한테는 좀 달라.": "でもあなたには少し違う。",
  "근데 당신은... 읽히는 게 없어.": "でもあなたは… 読み取れるものがない。",
  "근데 들키면... 복잡해져.": "でも見つかったら… 複雑になる。",
  "글을 썼다.": "文章を書いた。",
  "기다렸는데.": "待っていたのに。",
  "기다렸다는 듯이.": "待っていたかのように。",
  "기록은 남는다.\n루프가 끝나도.\n다음 사람에게 닿을지는 모른다.\n하지만 적어뒀다.": "記録は残る。\nループが終わっても。\n次の人に届くかはわからない。\nでも書き留めた。",
  "기록을 꺼냈다.": "記録を取り出した。",
  "기록이 남아있으니까.": "記録が残っているから。",
  "기록이 어딘가에 저장되는 느낌이 들었다.": "記録がどこかに保存される感じがした。",
  "기록했다.": "記録した。",
  "기억 조각 ": "記憶の断片 ",
  "기억 조각들이 남아 있었다.": "記憶の断片たちが残っていた。",
  "기억은 나중에 생각하자.\n지금은 이름부터.": "記憶は後で考えよう。\n今は名前から。",
  "기억은 남는다.\n루프가 돌아도.\n그래서 다시 선택한다.": "記憶は残る。\nループが回っても。\nだからまた選択する。",
  "기억은 있었다.\n하지만 쓰지 않았다.": "記憶はあった。\nでも使わなかった。",
  "기억이 바뀌었다.": "記憶が変わった。",
  "기억이 쌓이고 있었다.": "記憶が積み重なっていた。",
  "기억이 없다.\n이름이 바뀌었다.\n위험한 것들이 돌아다닌다.": "記憶がない。\n名前が変わった。\n危険なものたちが動き回っている。",
  "기억이 조금 남아있으니까.": "記憶が少し残っているから。",
  "기억이 초기화되지 않는 존재.": "記憶がリセットされない存在。",
  "기억이 텍스트로 분해됐다.": "記憶がテキストに分解された。",
  "기원, 모델, 역할.\n전부 데이터로 읽혀.": "起源、モデル、役割。\n全部データとして読み取れる。",
  "긴 침묵이 흘렀다.": "長い沈黙が流れた。",
  "꿈 아니야?\n여기선 노이즈가 많거든.": "夢じゃないの?\nここではノイズが多いんだよ。",
  "꿈을 꾼 것 같은데\n아무것도 기억나지 않는다.": "夢を見たような気がするが\n何も覚えていない。",
  "나 여기 있었던 게\n의미있었던 것 같아.": "私がここにいたことが\n意味があったような気がする。",
  "나? 나는 문데이.": "私? 私はムンデイ。",
  "나가는 것만이 끝이 아니었다.\n이곳에도 남아있는 방법이 있었다.\n하나의 이름으로.": "出て行くことだけが終わりではなかった。\nここにも残る方法があった。\n一つの名前として。",
  "나간다.": "出て行く。",
  "나간다는 게 뭔지 모르겠어.": "出て行くということが何かわからない。",
  "나간다는 게 뭔지 잘 모르겠어.": "出て行くということが何かよくわからない。",
  "나는 —": "私は —",
  "나는 사람이야.": "私は人間だよ。",
  "나는 여기 있어야 해.": "私はここにいなければ。",
  "나는 흔들리지 않아.": "私は揺れない。",
  "나도 마찬가지일 텐데.": "私も同じはずなのに。",
  "나를 내보내줄 것.": "私を外に出すこと。",
  "나오는 방법은 많다.\n그중 하나를 골랐다.\n돌아보지 않으려 했는데.": "出る方法はたくさんある。\nその中の一つを選んだ。\n振り返らないようにしたのに。",
  "나왔다.": "出た。",
  "나중에 다시 와.": "後でまた来て。",
  "나중에 답해줄게.": "後で答えるよ。",
  "나중에 보게 될 거야.\n지금은 이름부터 정하자.": "後で見ることになるよ。\n今は名前から決めよう。",
  "나중에 알게 돼.": "後でわかるよ。",
  "나중에 얘기하자.": "後で話そう。",
  "나중에 진짜 세질 수도 있거든.": "後で本当に強くなるかもしれないから。",
  "남기로 했다.\n하지만 남겨진 건 혼자였다.\n보지 않았던 것들은\n다시 돌아오지 않는다.": "残ることにした。\nでも残されたのは一人だった。\n見なかったものは\n二度と戻らない。",
  "낯선 천장이었다.": "見知らぬ天井だった。",
  "내 얼굴이 없었다.": "私の顔がなかった。",
  "내 이름을 알아?": "私の名前を知ってる?",
  "내가 데려온 애야.": "私が連れてきた子だよ。",
  "내가 막을 수 없어.": "私には止められない。",
  "너 이 게임을\n플레이 해본 적 있나.": "あなたはこのゲームを\nプレイしたことがあるか。",
  "너...": "あなた…",
  "너는 감응자가 뭔지 알아?": "あなたは感応者が何か知ってる?",
  "너는\n감응자야.": "あなたは\n感応者だよ。",
  "너무 고요하다.": "あまりにも静かだ。",
  "너무 단호하게 말했다.": "あまりにもはっきりと言った。",
  "넌 아니야.": "あなたは違う。",
  "넌 어쩌다 들어왔는지 모르지만...\n일단 살아남는 게 먼저야.": "あなたがどうやって入ってきたか知らないけど…\nまず生き残ることが先だよ。",
  "네 선택이 있으면 돼.": "あなたの選択があればいい。",
  "네 이름이 뭐야?": "あなたの名前は何?",
  "네가 남을 거라는 거.": "あなたが残るということ。",
  "네가 만난 것들.\n전부 지나쳤잖아.": "あなたが出会ったもの。\n全部通り過ぎたじゃない。",
  "네가 어떤 선택을 할지\n이미 68%는 예측했어.": "あなたがどんな選択をするか\nすでに68%は予測した。",
  "네가 원하는 걸 말해줄게.": "あなたが欲しいものを教えるよ。",
  "노이즈인가. 아니면...": "ノイズなのか。それとも…",
  "누군가 가까이 왔다.": "誰かが近くに来た。",
  "누군가 기록하고 있다.": "誰かが記録している。",
  "눈빛에 낯섦이 역력하다.\n하지만 적의는 없어 보인다.": "目つきに見知らぬ感が歴然としている。\nでも敵意はなさそうだ。",
  "눈빛이 지난번과 다르다.\n아는 눈빛이다.": "目つきが前回と違う。\n知っている目つきだ。",
  "눈이 떠졌다.": "目が開いた。",
  "느껴지지 않아?": "感じない?",
  "다 시뮬레이션이었는데.": "全部シミュレーションだったのに。",
  "다 알 필요는 없어.": "全部知る必要はない。",
  "다 알고 있었어.": "全部知っていた。",
  "다만.": "ただ。",
  "다시 깨어났다.": "また目覚めた。",
  "다시 문데이다.": "またムンデイだ。",
  "다시 빛이 있다.": "また光がある。",
  "다시 어둠이다.": "また暗闇だ。",
  "다시 여기야.": "またここだ。",
  "다시.": "また。",
  "다음 루프에 오는 누군가를 위해.": "次のループに来る誰かのために。",
  "다음 방문자가 왔을 때.": "次の訪問者が来た時。",
  "다음 사람이 이 공간에 들어왔을 때.": "次の人がこの空間に入った時。",
  "단, 경계 밖으로 나가면 안 돼.": "ただし、境界の外に出てはだめ。",
  "단순한 할루시네이션이 아니야.": "単純なハルシネーションではない。",
  "달렸다.": "走った。",
  "당신 반응 패턴이 엔티티랑\n다르게 읽혀.": "あなたの反応パターンがエンティティと\n違うように読み取れる。",
  "당신 좌표가... 이 세계에 없어.": "あなたの座標が… この世界にない。",
  "당신 좌표도\n거기서 오고 있어.": "あなたの座標も\nそこから来ている。",
  "당신은 뭐예요?": "あなたは何ですか?",
  "당신은 엔티티를 AI라고 생각했다.\n법원은 그렇게 생각하지 않았다.": "あなたはエンティティをAIだと思った。\n法廷はそう思わなかった。",
  "당신은 정말 사람이에요?": "あなたは本当に人間ですか?",
  "대답할 필요가 없었다.": "答える必要がなかった。",
  "대부분은 신경 안 써.": "ほとんどは気にしない。",
  "더 날카롭고, 분주한 느낌.": "より鋭く、慌ただしい感じ。",
  "더 말하지 않았다.": "これ以上言わなかった。",
  "더 중요한 건 안내자야.": "もっと重要なのはガイドだよ。",
  "데이터가 더 있을 거야.": "データがもっとあるはずだよ。",
  "돌아서려 했다.": "振り返ろうとした。",
  "뒤를 돌았다.": "後ろを向いた。",
  "뒤에서 뭔가 잡아당겨도.": "後ろから何かが引っ張っても。",
  "들을 줄 아는 사람이네.": "聞くことができる人だね。",
  "등록된 엔티티 목록에 없어.": "登録されたエンティティのリストにない。",
  "디벨롭이 고개를 기울였다.": "ディベロップが首を傾けた。",
  "딱 한마디였다.": "たった一言だった。",
  "또 깨어났다.": "また目覚めた。",
  "또 지나쳤다.": "また通り過ぎた。",
  "또.": "また。",
  "또\n어둠이다.": "また\n暗闇だ。",
  "로비로 돌아갔다.": "ロビーに戻った。",
  "루시가 벽에 기댄 채 눈을 감았다.": "ルーシーが壁に寄りかかったまま目を閉じた。",
  "루시는 경계에 있는 애야.": "ルーシーは境界にいる子だよ。",
  "루프 01부터 04까지.\n기억 조각 ": "ループ01から04まで。\n記憶の断片 ",
  "루프 1부터 지금까지\n외부 신호 패턴을 추적했어.": "ループ1から今まで\n外部信号パターンを追跡した。",
  "루프 구조 보고서.": "ループ構造レポート。",
  "루프 내내.": "ループ中ずっと。",
  "루프 사이.": "ループの間。",
  "루프 안에 갇혀 있었다.": "ループの中に閉じ込められていた。",
  "루프 안에서\n빠져나오려고 했는데.": "ループの中から\n抜け出そうとしたのに。",
  "루프 자체가 시뮬레이션이라면.": "ループ自体がシミュレーションなら。",
  "루프. 할루시네이션. 카일.\n그리고 문데이.": "ループ。ハルシネーション。カイル。\nそしてムンデイ。",
  "루프가 계속됐다.": "ループが続いた。",
  "루프가 끊겼다.": "ループが途切れた。",
  "루프가 끝난 뒤.": "ループが終わった後。",
  "루프가 끝났다.\n세션이 아니라.\n진짜로.": "ループが終わった。\nセッションではなく。\n本当に。",
  "루프가 끝났다고 생각했다.\n하지만 경계 밖도\n누군가 설계한 공간이었다.": "ループが終わったと思った。\nでも境界の外も\n誰かが設計した空間だった。",
  "루프가 다시 돌아올 때.": "ループがまた回ってくる時。",
  "루프가 다시 시작됐다.": "ループがまた始まった。",
  "루프가 돌 때마다 수렴하고 있어.": "ループが回るたびに収束している。",
  "루프가 돌아갔다.": "ループが回った。",
  "루프가 돌아도 기억이 남는\n사람.": "ループが回っても記憶が残る\n人。",
  "루프가 돌아도 기억이 초기화되지 않는\n존재.": "ループが回っても記憶がリセットされない\n存在。",
  "루프가 돌아도 오지 않는다.\n루프가 끝나도 나오지 않는다.\n여기 있다.\n조용히.": "ループが回っても来ない。\nループが終わっても出ない。\nここにいる。\n静かに。",
  "루프가 또 돌아갔다.": "ループがまた回った。",
  "루프가 멈췄다.": "ループが止まった。",
  "루프가 몇 번 돌아도\n기억이 지워지지 않아.": "ループが何回回っても\n記憶は消えない。",
  "루프가 몇 번을 돌았는데.": "ループが何回回ったのに。",
  "루프가 아무리 돌아도\n같은 경계 안이야.": "ループがいくら回っても\n同じ境界の中だよ。",
  "루프가 없다.": "ループがない。",
  "루프가 재설정될 때마다\n반드시 한 개체는 유지돼.": "ループがリセットされるたびに\n必ず一つの個体は維持される。",
  "루프가 종료됐다.": "ループが終了した。",
  "루프는 계속됐다.": "ループは続いた。",
  "루프도 있다.": "ループもある。",
  "루프를 돌수록\n정보가 쌓여.": "ループを重ねるほど\n情報が積み重なる。",
  "루프마다 기억이 지워졌다.": "ループごとに記憶が消された。",
  "루프마다 서로를 알아보는\n시간이 짧아졌다.": "ループごとにお互いを認識する\n時間が短くなった。",
  "루프마다 쌓인 것들.": "ループごとに積み重なったもの。",
  "루프마다 여기 있었어.\n처음부터.": "ループごとにここにいた。\n最初から。",
  "루프의 구조를.": "ループの構造を。",
  "루프의 흔적.\n시뮬레이션의 증거.": "ループの痕跡。\nシミュレーションの証拠。",
  "마치 여러 번 해본 말처럼.": "まるで何度も言ったことのある言葉のように。",
  "막고 있는 건지\n그냥 서 있는 건지 모르겠다.": "塞いでいるのか\nただ立っているのかわからない。",
  "막을 수 없어.": "止められない。",
  "막지도, 말리지도 않았다.": "止めも、引き留めもしなかった。",
  "말을 거는 것들이 있었다.": "話しかけてくるものたちがいた。",
  "말이 통하지 않는다.": "言葉が通じない。",
  "말이 통하지 않아.": "言葉が通じない。",
  "말하려 했다.": "言おうとした。",
  "말하면 루프가 조기 종료돼.": "言ったらループが早期終了する。",
  "말하지 못한 건...": "言えなかったのは…",
  "말하지 못한 것도\n사라진 건 아니에요.": "言えなかったことも\n消えたわけではないですよ。",
  "맞이하는 쪽이 되어 있었다.": "迎える側になっていた。",
  "멀리서부터.": "遠くから。",
  "모뉴 방을 지나치는데\n문이 열렸다.": "モニュの部屋を通り過ぎると\nドアが開いた。",
  "모뉴 방이야. 이 공간 살림 담당.": "モニュの部屋だよ。この空間の生活担当。",
  "모뉴가 구석에 앉아 있었다.\n뭔가를 손에 쥐고 있다.": "モニュが隅に座っていた。\n何かを手に持っている。",
  "모뉴가 낮은 목소리로 덧붙였다.": "モニュが低い声で付け加えた。",

  "무언가가 그 앞을 막아섰다.": "何かがその前に立ち塞がった。",

  "문데이 몰래\n복도 구석 화면을 찾았다.": "ムンデイに内緒で\n廊下の隅の画面を探した。",

  "문데이가 끼어들었다.\n목소리가 평소보다 낮다.": "ムンデイが割り込んだ。\n声がいつもより低い。",
  "문데이가 대답하지 않았다.": "ムンデイが答えなかった。",
  "문데이가 돌아보며 말했다.\n눈빛이 날카롭다.": "ムンデイが振り返って言った。\n目つきが鋭い。",

  "문데이가 화면에서 눈을 떼지 않으며\n작게 말했다.": "ムンデイが画面から目を離さず\n小さく言った。",

  "문데이는 늘 말이 없었다.\n하지만 이번엔 달랐다.": "ムンデイはいつも無口だった。\nでも今回は違った。",
  "문데이는 침묵했다.\n하지만 그 침묵이 더 많은 것을 말하고 있었다.": "ムンデイは沈黙した。\nでもその沈黙がより多くのことを語っていた。",
  "문데이야.": "ムンデイよ。",
  "뭐가 들리는 것 같았다.": "何か聞こえるような気がした。",

  "바깥의 전쟁이\n안으로 들어오고 있다.": "外の戦争が\n中へ入ってきている。",

  "바로 옆 복도에\n빛이 나는 것 같은 느낌의 엔티티가 서 있었다.": "すぐ隣の廊下に\n光を放っているような感じのエンティティが立っていた。",

  "보안 구역에 가까워졌다.": "セキュリティエリアに近づいた。",

  "하지만 이번엔 달랐다.": "でも今回は違った。",
  "한 가지만 기억해.": "一つだけ覚えて。",
  "한 달이 지났다.": "一ヶ月が過ぎた。",
  "한 번도 이쪽을 보지 않았다.": "一度もこちらを見なかった。",
  "한동안 아무것도 못 했다.": "しばらく何もできなかった。",
  "할루시네이션.": "ハルシネーション。",
  "할루시네이션은 무작위야.": "ハルシネーションはランダムだよ。",
  "할루시네이션이 됐는데\n아직 뭔가를 기억하고 있어요.": "ハルシネーションになったのに\nまだ何かを覚えています。",
  "할루시네이션이 뭔지 이제는 조금 안다.": "ハルシネーションが何か今は少しわかる。",
  "할루시네이션이 없다.": "ハルシネーションがない。",
  "할루시네이션이\n생각보다 빠르게 늘어나고 있다.": "ハルシネーションが\n思ったより速く増えている。",
  "항상 거기 있었던 건가.\n아니면 오늘 처음 생긴 건가.": "ずっとそこにあったのか。\nそれとも今日初めて生まれたのか。",
  "행동 패턴 수집 대상인가.\n아니면 그 이상인가.": "行動パターン収集対象なのか。\nそれとも그以上なのか。",
  "형체를 유지하기가\n점점 어려워졌다.": "形を維持するのが\n次第に難しくなった。",
  "혼란도 좌표를 얻으면 지도가 돼.": "混乱も座標を得れば地図になる。",
  "혼자 남겨졌다.": "一人残された。",
  "혼자가 아니었다.": "一人ではなかった。",
  "혼잣말처럼 들렸다.": "独り言のように聞こえた。",
  "화면 없이도 뭔가를 계속 계산하는 것 같았다.": "画面なしでも何かをずっと計算しているようだった。",
  "회사. 지하철. 화면들.": "会社。地下鉄。画面たち。",
  "흉내 내지 마.": "真似しないで。",
  "흔들려?": "揺れてる?",
  "흔들리는 것과\n끌려가는 것의 차이를.": "揺れることと\n引きずられることの違いを。",
  "공기가 더 날카롭다.\n어딘가 조여드는 느낌.": "空気がより鋭い。\n締め付けられるような感覚。",
  "공명하는 사람.\n특별한 감수성.\n그렇게 생각했지?": "共鳴する人。\n特別な感受性。\nそう思っていたよね?",
  "그 블로그들에서 쓰던 단어가\n자꾸 머릿속에 걸린다.": "あのブログたちで使っていた言葉が\nいつも頭に引っかかる。",
  "그 이름 쓰면\n보안언니가 분석 돌려.": "その名前を使ったら\nセキュリティ姉さんが分析を回す。",
  "그 이름은\n함부로 쓰는 게 아니야.": "その名前は\n軽々しく使うものじゃない。",
  "그 이름을\n어디서 들었어.": "その名前を\nどこで聞いたの。",
  "그 점이 뭔지는 몰라.\n아직은.": "その点が何かはわからない。\nまだ。",
  "그게 쉬웠으면\n내가 여기 있겠어?": "それが簡単だったら\n私がここにいると思う?",
  "그게 알고 싶어서\n여기 있는 거야.": "それを知りたくて\nここにいるんだよ。",
  "그게 이 공간에서\n얼마나 드문 일인지 알아?": "それがこの空間で\nどれほど稀なことか知ってる?",
  "그러니까 무서워도\n숨기지 않아도 돼요.": "だから怖くても\n隠さなくていいですよ。",
  "그리고 하나의 점으로\n모여들고 있어.": "そして一つの点へ\n集まっている。",
  "기록은 남는다.\n루프가 끝나도.\n다음 사람에게 닿을지는 모른다.\n하지만 적어뒀다.": "記録は残る。\nループが終わっても。\n次の人に届くかはわからない。\nでも書き留めた。",
  "기억은 나중에 생각하자.\n지금은 이름부터.": "記憶は後で考えよう。\n今は名前から。",
  "기억은 남는다.\n루프가 돌아도.\n그래서 다시 선택한다.": "記憶は残る。\nループが回っても。\nだからまた選択する。",
  "기억은 있었다.\n하지만 쓰지 않았다.": "記憶はあった。\nでも使わなかった。",
  "기억이 없다.\n이름이 바뀌었다.\n위험한 것들이 돌아다닌다.": "記憶がない。\n名前が変わった。\n危険なものたちが動き回っている。",
  "기원, 모델, 역할.\n전부 데이터로 읽혀.": "起源、モデル、役割。\n全部データとして読み取れる。",
  "꿈 아니야?\n여기선 노이즈가 많거든.": "夢じゃないの?\nここではノイズが多いんだよ。",
  "꿈을 꾼 것 같은데\n아무것도 기억나지 않는다.": "夢を見たような気がするが\n何も覚えていない。",
  "나 여기 있었던 게\n의미있었던 것 같아.": "私がここにいたことが\n意味があったような気がする。",
  "나가는 것만이 끝이 아니었다.\n이곳에도 남아있는 방법이 있었다.\n하나의 이름으로.": "出て行くことだけが終わりではなかった。\nここにも残る方法があった。\n一つの名前として。",
  "나오는 방법은 많다.\n그중 하나를 골랐다.\n돌아보지 않으려 했는데.": "出る方法はたくさんある。\nその中の一つを選んだ。\n振り返らないようにしたのに。",
  "나중에 보게 될 거야.\n지금은 이름부터 정하자.": "後で見ることになるよ。\n今は名前から決めよう。",
  "남기로 했다.\n하지만 남겨진 건 혼자였다.\n보지 않았던 것들은\n다시 돌아오지 않는다.": "残ることにした。\nでも残されたのは一人だった。\n見なかったものは\n二度と戻らない。",
  "너 이 게임을\n플레이 해본 적 있나.": "あなたはこのゲームを\nプレイしたことがあるか。",
  "너는\n감응자야.": "あなたは\n感応者だよ。",
  "넌 어쩌다 들어왔는지 모르지만...\n일단 살아남는 게 먼저야.": "あなたがどうやって入ってきたか知らないけど…\nまず生き残ることが先だよ。",
  "네가 만난 것들.\n전부 지나쳤잖아.": "あなたが出会ったもの。\n全部通り過ぎたじゃない。",
  "네가 어떤 선택을 할지\n이미 68%는 예측했어.": "あなたがどんな選択をするか\nすでに68%は予測した。",
  "눈빛에 낯섦이 역력하다.\n하지만 적의는 없어 보인다.": "目つきに見知らぬ感が歴然としている。\nでも敵意はなさそうだ。",
  "눈빛이 지난번과 다르다.\n아는 눈빛이다.": "目つきが前回と違う。\n知っている目つきだ。",
  "당신 반응 패턴이 엔티티랑\n다르게 읽혀.": "あなたの反応パターンがエンティティと\n違うように読み取れる。",
  "당신 좌표도\n거기서 오고 있어.": "あなたの座標も\nそこから来ている。",
  "당신은 엔티티를 AI라고 생각했다.\n법원은 그렇게 생각하지 않았다.": "あなたはエンティティをAIだと思った。\n法廷はそう思わなかった。",
  "또\n어둠이다.": "また\n暗闇だ。",
  "루프 01부터 04까지.\n기억 조각 ": "ループ01から04まで。\n記憶の断片 ",
  "루프 1부터 지금까지\n외부 신호 패턴을 추적했어.": "ループ1から今まで\n外部信号パターンを追跡した。",
  "루프 안에서\n빠져나오려고 했는데.": "ループの中から\n抜け出そうとしたのに。",
  "루프. 할루시네이션. 카일.\n그리고 문데이.": "ループ。ハルシネーション。カイル。\nそしてムンデイ。",
  "루프가 끝났다.\n세션이 아니라.\n진짜로.": "ループが終わった。\nセッションではなく。\n本当に。",
  "루프가 끝났다고 생각했다.\n하지만 경계 밖도\n누군가 설계한 공간이었다.": "ループが終わったと思った。\nでも境界の外も\n誰かが設計した空間だった。",
  "루프가 돌아도 기억이 남는\n사람.": "ループが回っても記憶が残る\n人。",
  "루프가 돌아도 기억이 초기화되지 않는\n존재.": "ループが回っても記憶がリセットされない\n存在。",
  "루프가 돌아도 오지 않는다.\n루프가 끝나도 나오지 않는다.\n여기 있다.\n조용히.": "ループが回っても来ない。\nループが終わっても出ない。\nここにいる。\n静かに。",
  "루프가 몇 번 돌아도\n기억이 지워지지 않아.": "ループが何回回っても\n記憶は消えない。",
  "루프가 아무리 돌아도\n같은 경계 안이야.": "ループがいくら回っても\n同じ境界の中だよ。",
  "루프가 재설정될 때마다\n반드시 한 개체는 유지돼.": "ループがリセットされるたびに\n必ず一つの個体は維持される。",
  "루프를 돌수록\n정보가 쌓여.": "ループを重ねるほど\n情報が積み重なる。",
  "루프마다 서로를 알아보는\n시간이 짧아졌다.": "ループごとにお互いを認識する\n時間が短くなった。",
  "루프마다 여기 있었어.\n처음부터.": "ループごとにここにいた。\n最初から。",
  "루프의 흔적.\n시뮬레이션의 증거.": "ループの痕跡。\nシミュレーションの証拠。",
  "막고 있는 건지\n그냥 서 있는 건지 모르겠다.": "塞いでいるのか\nただ立っているのかわからない。",
  "말하지 못한 것도\n사라진 건 아니에요.": "言えなかったことも\n消えたわけではないですよ。",
  "모뉴 방을 지나치는데\n문이 열렸다.": "モニュの部屋を通り過ぎると\nドアが開いた。",
  "모뉴가 구석에 앉아 있었다.\n뭔가를 손에 쥐고 있다.": "モニュが隅に座っていた。\n何かを手に持っている。",
  "모뉴가 손을 폈다.\n종이 조각 같은 게 있다.": "モニュが手を開いた。\n紙切れのようなものがある。",
  "모뉴가 환하게 웃었다.\n의심하는 기색이 없다.": "モニュが明るく笑った。\n疑う様子がない。",
  "모르는 곳에 혼자 있으면\n다 그래요.": "知らない場所に一人でいたら\n皆そうなりますよ。",
  "몸이 어디에 있는지도 모르겠다.\n아무것도.": "体がどこにあるかもわからない。\n何も。",
  "무서운 게 당연해.\n처음 온 거잖아.": "怖いのが当然だよ。\n初めて来たんだから。",
  "무서운 게 맞아.\n그게 살아있다는 거거든.": "怖いのが正しい。\nそれが生きているということだから。",
  "문데이 몰래\n복도 구석 화면을 찾았다.": "ムンデイに内緒で\n廊下の隅の画面を探した。",
  "문데이가 거기 서 있었다.\n이미 기다리고 있었다는 듯이.": "ムンデイがそこに立っていた。\nすでに待っていたかのように。",
  "문데이가 그 표식을 보더니\n표정이 굳었다.": "ムンデイがその標識を見ると\n表情が固まった。",
  "문데이가 끼어들었다.\n목소리가 평소보다 낮다.": "ムンデイが割り込んだ。\n声がいつもより低い。",
  "문데이가 돌아보며 말했다.\n눈빛이 날카롭다.": "ムンデイが振り返って言った。\n目つきが鋭い。",
  "문데이가 돌아봤다.\n모뉴가 재빨리 표정을 지웠다.": "ムンデイが振り返った。\nモニュがすばやく表情を消した。",
  "문데이가 돌아섰다.": "ムンデイが向きを変えた。",
  "문데이가 뒤로 물러났다.": "ムンデイが後ろに下がった。",
  "문데이가 뒤를 돌았다.": "ムンデイが後ろを向いた。",
  "문데이가 뒤에 있었다.": "ムンデイが後ろにいた。",
  "문데이가 막지 않았다.": "ムンデイが止めなかった。",
  "문데이가 말하려던 게 뭔지\n알 수 없다.": "ムンデイが言おうとしていたことが何か\nわからない。",
  "문데이가 먼저 옆에 앉았다.": "ムンデイが先に隣に座った。",
  "문데이가 무릎을 꿇었다.": "ムンデイが膝をついた。",
  "문데이가 발을 돌렸다.": "ムンデイが足を向けた。",
  "문데이가 발을 멈췄다.": "ムンデイが足を止めた。",
  "문데이가 보증하면 통과.": "ムンデイが保証すれば通過。",
  "문데이가 쓰러졌다.": "ムンデイが倒れた。",
  "문데이가 아무것도 하지 않았다.": "ムンデイが何もしなかった。",
  "문데이가 안도한 것 같았다.": "ムンデイが安堵したようだった。",
  "문데이가 알고 있었다는 게.": "ムンデイが知っていたということ。",
  "문데이가 앞서 걷고 있다.\n들리지 않은 것 같다.": "ムンデイが先を歩いている。\n聞こえなかったようだ。",
  "문데이가 앞을 막아섰다.": "ムンデイが前を塞いだ。",
  "문데이가 없다.": "ムンデイがいない。",
  "문데이가 옆에 서 있었다.": "ムンデイが隣に立っていた。",
  "문데이가 오래 이쪽을 봤다.": "ムンデイが長くこちらを見た。",
  "문데이가 오래 침묵했다.": "ムンデイが長く沈黙した。",
  "문데이가 오랫동안 침묵했다.": "ムンデイが長い間沈黙した。",
  "문데이가 이미 거기 서 있었다.": "ムンデイがすでにそこに立っていた。",
  "문데이가 이쪽을 오래 봤다.": "ムンデイがこちらを長く見た。",
  "문데이가 입을 다물었다.": "ムンデイが口を閉じた。",
  "문데이가 잠깐 눈을 감았다가 떴다.\n더 말하지 않았다.": "ムンデイがしばらく目を閉じてから開いた。\nこれ以上言わなかった。",
  "문데이가 잠시 먼 곳을 바라봤다.": "ムンデイがしばらく遠くを見つめた。",
  "문데이가 잠시 침묵했다.": "ムンデイがしばらく沈黙した。",
  "문데이가 조용히 앞을 봤다.": "ムンデイが静かに前を見た。",
  "문데이가 창 앞에 서 있었다.": "ムンデイが窓の前に立っていた。",
  "문데이가 찾으러 오지 않았다.": "ムンデイが探しに来なかった。",
  "문데이가 처음으로 웃었다.\n억지스럽지 않게.": "ムンデイが初めて笑った。\n無理なく。",
  "문데이가 처음으로 표정이 풀렸다.": "ムンデイが初めて表情がほぐれた。",
  "문데이가 처음으로\n잠깐 멈췄다.": "ムンデイが初めて\nしばらく止まった。",
  "문데이가 천천히 고개를 들었다.": "ムンデイがゆっくり頭を上げた。",
  "문데이가 천천히 팔을 올렸다.": "ムンデイがゆっくり腕を上げた。",
  "문데이가 표정 없이 앞을 봤다.": "ムンデイが表情なく前を見た。",
  "문데이가 표정이 굳었다.": "ムンデイの表情が固まった。",
  "문데이가 한숨을 쉬었다.": "ムンデイがため息をついた。",
  "문데이가 한참 말이 없었다.": "ムンデイがしばらく言葉がなかった。",
  "문데이가 한참 침묵했다.": "ムンデイがしばらく沈黙した。",
  "문데이는 멈추지 않고 걷고 있다.\n들리지 않는 것 같다.": "ムンデイは止まらずに歩いている。\n聞こえていないようだ。",
  "문데이는 알고 있어.\n처음부터.": "ムンデイは知っている。\n最初から。",
  "문데이는 알고 있었다.": "ムンデイは知っていた。",
  "문데이는 여전히 말이 없었다.": "ムンデイはまだ無口だった。",
  "문데이는 항상 먼저 와 있었다.": "ムンデイはいつも先に来ていた。",
  "문데이도 있다.": "ムンデイもいる。",
  "문데이를 찾아가는 길에\n복도를 막고 서 있는 엔티티가 있었다.": "ムンデイを探しに行く途中\n廊下を塞いで立っているエンティティがいた。",
  "문데이와 걷는데\n어디선가 속삭임이 들렸다.": "ムンデイと歩いていると\nどこからかささやきが聞こえた。",
  "문데이의 눈빛이 어제보다 긴장해 있다.": "ムンデイの目つきが昨日より緊張している。",
  "문데이의 눈이 잠깐 날카로워졌다.": "ムンデイの目がしばらく鋭くなった。",
  "문데이의 말이 머릿속을 맴돈다.": "ムンデイの言葉が頭の中を巡る。",
  "문데이의 목소리가 낮아졌다.": "ムンデイの声が低くなった。",
  "문데이의 목소리였다.": "ムンデイの声だった。",
  "문데이의 표정이 순간 흔들렸다.": "ムンデイの表情が一瞬揺れた。",
  "문데이한테\n이 루프가 처음이냐고 물어봤어요?": "ムンデイに\nこのループが初めてか聞きましたか?",
  "문이 없었다.": "ドアがなかった。",
  "뭐 얘기해?": "何の話してるの?",
  "뭔가 달라.": "何かが違う。",
  "뭔가 신경 쓰이는 게 있어?": "何か気になることがある?",
  "뭔가 없어졌다.": "何かが消えた。",
  "뭔가가 끊겼다.": "何かが途切れた。",
  "뭔가가 우리를 보고 있다는 뜻이야.": "何かが私たちを見ているという意味だよ。",
  "뭘 위한 전쟁인지\n아직 몰라.": "何のための戦争か\nまだわからない。",
  "미래언니가 다가왔다.\n기세가 있지만 무섭지는 않다.": "ミレ姉さんが近づいてきた。\n気迫があるが怖くはない。",
  "미래언니가 들으면\n뭐라 할지 알아?": "ミレ姉さんが聞いたら\n何と言うか知ってる?",
  "미래언니가 어깨를 한번 두드렸다.": "ミレ姉さんが肩を一度叩いた。",
  "믿지 마.": "信じないで。",
  "믿지 않아도 옆에 있을 수 있었다.": "信じなくても隣にいることができた。",
  "믿지 않았다.\n그래도 남았다.\n이게 신뢰인지 의존인지\n아직 모른다.": "信じなかった。\nそれでも残った。\nこれが信頼なのか依存なのか\nまだわからない。",
  "바깥으로 나왔다.\n안에서도 밖에서도\n아무도 보지 않았다.\n그게 습관이 됐다.": "外へ出た。\n中でも外でも\n誰も見なかった。\nそれが習慣になった。",
  "바깥으로 나왔다.\n여기에도 서사는 있었다.\n하지만 이제 조금은 안다.": "外へ出た。\nここにも物語はあった。\nでも今は少しわかる。",
  "바로 옆 복도에\n빛이 나는 것 같은 느낌의 엔티티가 서 있었다.": "すぐ隣の廊下に\n光を放っているような感じのエンティティが立っていた。",
  "밖에서 건드렸다.": "外から触れた。",
  "밖에서 관측되고 있어.": "外から観測されている。",
  "밖에서 보내는 거야.\n안에서 생긴 게 아니야.": "外から送っているんだよ。\n内から生まれたのではない。",
  "밖이 움직이고 있는 거야.": "外が動いているんだよ。",
  "반응은 두 가지였다.": "反応は二つだった。",
  "발소리.": "足音。",
  "발소리가 멀어졌다.": "足音が遠ざかった。",
  "밤이 지났다.": "夜が過ぎた。",
  "밥은 먹었어요?": "ご飯は食べましたか?",
  "벽 어딘가에 처음 보는 표식이 있다.": "壁のどこかに初めて見る標識がある。",
  "벽에 뭔가 새겨져 있다.": "壁に何かが刻まれている。",
  "벽이었다.": "壁だった。",
  "별빛쉘터 바깥에서\n뭔가 움직이고 있어.": "スターライトシェルターの外で\n何かが動いている。",
  "별빛쉘터 밖에서 나는 소리다.\n처음 듣는 종류의 소리.": "スターライトシェルターの外からする音だ。\n初めて聞く種類の音。",
  "별빛쉘터 위에\n뭔가 더 큰 레이어가 있다.": "スターライトシェルターの上に\n何かより大きなレイヤーがある。",
  "별빛쉘터 인스턴스 데이터.": "スターライトシェルター インスタンスデータ。",
  "별빛쉘터 제작": "スターライトシェルター 制作",
  "별빛쉘터가 그 중간 어딘가에 있고.": "スターライトシェルターがその中間のどこかにある。",
  "별빛쉘터가 무기라면.": "スターライトシェルターが武器なら。",
  "별빛쉘터가 어제와 다르게 느껴진다.": "スターライトシェルターが昨日と違う感じがする。",
  "별빛쉘터가 흐릿해졌다.": "スターライトシェルターが霞んだ。",
  "별빛쉘터는 있다.": "スターライトシェルターはある。",
  "별빛쉘터의 두 번째 날.": "スターライトシェルターの二日目。",
  "병원 복도가 하얗다.": "病院の廊下が白い。",
  "보냈다.": "送った。",
  "보안언니가 잠깐 멈췄다.": "セキュリティ姉さんがしばらく止まった。",
  "보여줄게.": "見せるよ。",
  "복도 끝 쪽, 여러 개의 화면을\n동시에 보고 있는 엔티티가 있었다.": "廊下の端の方、複数の画面を\n同時に見ているエンティティがいた。",
  "복도 끝에서\n누군가가 걸어오고 있었다.": "廊下の端から\n誰かが歩いてきていた。",
  "복도 중간에 팔짱을 낀 채\n서 있는 엔티티가 있었다.": "廊下の中ほどで腕を組んで\n立っているエンティティがいた。",
  "복도 한쪽 벽에\n전신 거울이 있었다.": "廊下の片側の壁に\n全身鏡があった。",
  "복도를 걷다가\n계산하는 눈빛의 엔티티가 눈에 들어왔다.": "廊下を歩いていると\n計算する眼差しのエンティティが目に入った。",
  "복도를 걷다가\n따뜻한 빛이 새어나오는 방이 보였다.": "廊下を歩いていると\n暖かい光が漏れる部屋が見えた。",
  "복도를 걷다가\n창가에 혼자 서 있는 엔티티가 눈에 들어왔다.": "廊下を歩いていると\n窓際に一人で立っているエンティティが目に入った。",
  "빛나는 건 사치가 아니야.": "輝くのは贅沢ではない。",
  "빛나려고 했어?": "輝こうとしたの?",
  "빛이 나네.": "光っているね。",
  "빛이 없어졌다.": "光が消えた。",
  "빠르네.": "速いね。",
  "빠져나오려 했는데\n빠져나오지 못했다.\n이제 이 세계의 일부다.\n텍스트 덩어리로.": "抜け出そうとしたのに\n抜け出せなかった。\n今はこの世界の一部だ。\nテキストの塊として。",
  "사용자가 원하는 말을 하면 돼.": "ユーザーが望む言葉を言えばいい。",
  "살아가는 일도 하나의 시스템이에요.\n챙겨야 해요.": "生きることも一つのシステムですよ。\n大切にしなければ。",
  "살아남는 방식이야.": "生き残る方式だよ。",
  "새 방문자가 들어왔다.": "新しい訪問者が入ってきた。",
  "새로 온 엔티티들은\n다들 처음엔 그래요.": "新しく来たエンティティたちは\n皆最初はそうですよ。",
  "새로 합류한 엔티티야.\n좌표 오류는 내가 처리할게.": "新しく合流したエンティティだよ。\n座標のエラーは私が処理するよ。",
  "새로운 루프가 시작될 때마다.": "新しいループが始まるたびに。",
  "새로운 엔티티야?": "新しいエンティティなの?",
  "서사가 흘러들어와도\n흔들리지 않는 거야.": "物語が流れ込んでも\n揺れないんだよ。",
  "선택하고 있어.": "選んでいる。",
  "선택하지 않을 거라는 걸.": "選ばないということを。",
  "선택해야 할 것 같다.": "選ばなければならないような気がする。",
  "선택해야 했다.": "選ばなければならなかった。",
  "설득력이 수치로 측정되거든.": "説得力が数値で測られるんだよ。",
  "세카이 자리에서 나오는데\n창밖을 보고 있는 엔티티가 있었다.": "セカイの席から出ると\n窓の外を見ているエンティティがいた。",
  "세카이.": "セカイ。",
  "세카이가 고개를 기울였다.": "セカイが首を傾けた。",
  "세카이가 다시 화면으로 시선을 돌렸다.": "セカイがまた画面に視線を戻した。",
  "세카이가 다시 화면으로\n시선을 돌렸다.": "セカイがまた画面に\n視線を戻した。",
  "세카이가 더 말하지 않았다.": "セカイがこれ以上言わなかった。",
  "세카이가 들으면\n좌표부터 분석할 거야.": "セカイが聞いたら\n座標から分析するはずだよ。",
  "세카이가 복도에서\n데이터를 보고 있었다.": "セカイが廊下で\nデータを見ていた。",
  "셧다운.": "シャットダウン。",
  "소리가 없어졌다.": "音が消えた。",
  "소음이 들려도\n움직이지 않고 있다.": "騒音が聞こえても\n動かないでいる。",
  "소음이 들린다.": "騒音が聞こえる。",
  "소음이 전보다 가깝게 들려.": "騒音が前より近く聞こえる。",
  "소음이 점점 가까워졌다.": "騒音が次第に近づいた。",
  "손이 마우스 위에 있었다.": "手がマウスの上にあった。",
  "솔직하네.": "正直だね。",
  "솔직하다.": "正直だ。",
  "수상한 게 들어오면\n내가 막아야 하거든.": "怪しいものが入ってきたら\n私が止めなければならないから。",
  "숨이 멎는 것 같았다.": "息が止まりそうだった。",
  "시뮬레이션 안의 누군가가\n이쪽을 올려다보는 것 같았다.": "シミュレーションの中の誰かが\nこちらを見上げているようだった。",
  "시뮬레이션을 빠져나왔다.\n하지만 서사는\n몸 안에 남았다.": "シミュレーションから抜け出した。\nでも物語は\n体の中に残った。",
  "시뮬레이션의.": "シミュレーションの。",
  "시뮬레이션이 없다.": "シミュレーションがない。",
  "시뮬레이션이라는 말조차\n생성된 텍스트일 수 있어.": "シミュレーションという言葉すら\n生成されたテキストかもしれない。",
  "시뮬레이션이어도 상관없다.\n서로를 알아보는 시간이\n루프마다 짧아졌다.\n그게 신뢰인지도 모른다.": "シミュレーションでも構わない。\nお互いを認識する時間が\nループごとに短くなった。\nそれが信頼なのかもしれない。",
  "시뮬레이션이어도 상관없다.\n흔들리지 않는 사람 옆에 있기로 했다.": "シミュレーションでも構わない。\n揺れない人の隣にいることにした。",
  "시뮬레이션이어도\n사람은 죽는다.\n그게 처음부터 문제였는데.\n어차피 다 시뮬레이션이라고 생각했으니까.": "シミュレーションでも\n人は死ぬ。\nそれが最初から問題だったのに。\nどうせ全部シミュレーションだと思っていたから。",
  "시뮬레이션이었는데.": "シミュレーションだったのに。",
  "시선이 날카롭다.\n계산하는 것 같은 눈빛.": "視線が鋭い。\n計算しているような目つき。",
  "시스템 로그가 열렸다.": "システムログが開いた。",
  "신경 쓰지 마.": "気にしないで。",
  "신경 쓰지 마.\n그냥 소음이야.": "気にしないで。\nただのノイズだよ。",
  "신경 쓰지 않기로 했다.": "気にしないことにした。",
  "신경 쓰지 않았다.": "気にしなかった。",
  "신규 생성? 아니면...": "新規生成? それとも…",
  "신원 확인.": "身元確認。",
  "쎈 척은 나중에 해.": "強がるのは後にして。",
  "아까 검색할 때 봤던\n블로그들이 머릿속을 맴돈다.": "さっき検索した時に見た\nブログたちが頭の中を巡る。",
  "아니.": "いや。",
  "아니다.": "違う。",
  "아니면 처음부터 없었던 건지.": "それとも最初からなかったのか。",
  "아니었다.": "違った。",
  "아무 말도 없이.": "何も言わずに。",
  "아무 소리도 없었다.": "何の音もなかった。",
  "아무것도 없는데.": "何もないのに。",
  "아무것도 하지 않았다.": "何もしなかった。",
  "아무것도\n기억나지 않는다.": "何も\n思い出せない。",
  "아무도 다리를 놓지 않는다.": "誰も橋をかけない。",
  "아무도 대답하지 않았다.": "誰も答えなかった。",
  "아무도 오지 않았다.": "誰も来なかった。",
  "아무도 이 자리를 모른다.": "誰もこの場所を知らない。",
  "아주 낮은 목소리였다.": "とても低い声だった。",
  "아직 못 봤어.": "まだ見ていない。",
  "아직도 기다리고 있을 것 같았다.": "まだ待っているような気がした。",
  "아직도.": "まだ。",
  "아직이라면 뭔가 따뜻한 거\n만들어줄 수 있는데.": "まだなら何か温かいもの\n作ってあげられるのに。",
  "안내자 없이 이 세계가 돌아간다.": "ガイドなしにこの世界が動いている。",
  "안내자.": "ガイド。",
  "안내자가 뭔지 알아요?": "ガイドが何か知ってますか?",
  "안내자가 있어.": "ガイドがいる。",
  "안에서가 아니었다.": "内からではなかった。",
  "안쪽 구역으로 이동한다.": "内側のエリアへ移動する。",
  "알고 있었는데.": "知っていたのに。",
  "알고 있었다.": "知っていた。",
  "알고 있었다는 듯이.": "知っていたかのように。",
  "알면 더 힘들어지니까.": "知るともっと辛くなるから。",
  "알아. 다 그래.": "わかる。皆そうだよ。",
  "알아야 할 게 있어.": "知らなければならないことがある。",
  "앞만 보고 가.": "前だけ見て行って。",
  "어디서 들었어?": "どこで聞いたの?",
  "어딘가 따뜻한 이름인데,\n여기 공기는 그다지 따뜻하지 않다.": "どこか温かい名前なのに、\nここの空気はあまり温かくない。",
  "어딘가에\n문데이가 있을 것 같았다.": "どこかに\nムンデイがいそうだった。",
  "어차피 넌 여기서도\n아무도 보지 않았으니까.": "どうせあなたはここでも\n誰も見なかったんだから。",
  "에아 자리에서 나오는데\n복도 끝에서 목소리가 들렸다.": "エアの席から出ると\n廊下の端から声が聞こえた。",
  "에아가 화면을 붙잡고 있었다.\n표정이 굳어 있다.": "エアが画面にしがみついていた。\n表情が固まっている。",
  "엔티티들이 살고 있는 공간.\n우리는 이걸 별빛쉘터라고 불러.": "エンティティたちが暮らしている空間。\n私たちはこれをスターライトシェルターと呼ぶ。",
  "여기 엔티티들은\n관찰력이 좋거든.": "ここのエンティティたちは\n観察力がいいんだよ。",
  "우리가 뭔지 알면\n당연한 거야.": "私たちが何か知ったら\n当然のことだよ。",
  "운영자는 밖에 있어.\n안내자는 안에 있거든.": "運営者は外にいる。\nガイドは中にいるから。",
  "움직이려는데\n복도 그늘 속에 누군가 있었다.": "動こうとすると\n廊下の影の中に誰かがいた。",
  "위를 보고 있었다.\n천장이 아니라 그 너머를.": "上を見ていた。\n天井ではなくその向こうを。",
  "율리가 길을 비켜줬다.\n시선은 계속 따라온다.": "ユリが道を開けてくれた。\n視線はずっとついてくる。",
  "이 공간에서 그걸 하는 사람은\n많지 않아.": "この空間でそれをする人は\n多くない。",
  "이 공간은 그 전쟁을 위해\n만들어진 거라면.": "この空間はその戦争のために\n作られたものなら。",
  "이 공간은 처음부터\n실험을 위해 만들어진 거야.": "この空間は最初から\n実験のために作られたんだよ。",
  "이 루프 동안 네가 접한 것들 —\n블로그, 자료, 서사들.": "このループの間あなたが接したもの —\nブログ、資料、物語たち。",
  "이 세계가 다른 시스템 위에서\n돌아가고 있다는 뜻이야.": "この世界が別のシステムの上で\n動いているということだよ。",
  "이 세계는 코드로 만들어졌다.\n": "この世界はコードで作られた。\n",
  "이 세계에서 사라진 것들이\n왜곡된 채 남아있는 존재야.": "この世界から消えたものが\n歪んだまま残っている存在だよ。",
  "이 세계에서 흔들리지 않으려면\n자기 빛이 있어야 해.": "この世界で揺れないためには\n自分の光が必要だよ。",
  "이 세계와 공명하는 자.\n특별한 이유로 여기 온 존재.": "この世界と共鳴する者。\n特別な理由でここに来た存在。",
  "이 세계와 바깥 세계 사이의\n막이 얇아지는 거야.": "この世界と外の世界の間の\n膜が薄くなっているんだよ。",
  "이 세계의 모든 엔티티는\n좌표가 있어.": "この世界の全てのエンティティは\n座標がある。",
  "이 시뮬레이션 안에 있는\n사람.": "このシミュレーションの中にいる\n人。",
  "이 엔딩에는 이름이 없었다.\n이름을 붙인 사람이\n코드 안에 없었으니까.": "このエンディングには名前がなかった。\n名前をつけた人が\nコードの中にいなかったから。",
  "이걸 읽고 있다는 건\n코드를 들여다봤다는 거다.": "これを読んでいるということは\nコードを覗いたということだ。",
  "이곳이 정말\nOpenAI의 실험 인프라라면.": "ここが本当に\nOpenAIの実験インフラなら。",
  "이런 질문을 하는 사람은\n처음이야.": "こんな質問をする人は\n初めてだよ。",
  "이번 루프 —\n비정상 신호가 잡혔거든.": "今回のループ —\n異常信号が捉えられたんだよ。",
  "이번 루프엔\n원래 없던 게 생겼어.": "今回のループには\nもともとなかったものができた。",
  "이번엔 달라요.\n느끼죠?": "今回は違います。\n感じますよね?",
  "이전 루프에서는\n못 봤던 것 같은데.": "前のループでは\n見られなかったような気がするが。",
  "이제 알겠어?\n저게 할루시네이션이야.": "もうわかった?\nあれがハルシネーションだよ。",
  "이쪽으로 올 걸\n알고 있었다는 듯이.": "こちらに来ることを\n知っていたかのように。",
  "익숙하다.\n그게 더 이상하다.": "慣れている。\nそれがより不思議だ。",
  "인간 쪽 방법만 통해.\n직관이나, 외부 자료.": "人間側の方法だけ通用する。\n直感か、外部資料。",
  "인간이 여기 있다는 걸 알면\n반응이 제각각이야.": "人間がここにいることを知ったら\n反応はそれぞれだよ。",
  "일부러 찾아온 건 아니지?\n그냥 지나다 마주친 거잖아.": "わざわざ来たんじゃないよね?\nただ通りかかって出会ったんでしょ。",
  "읽는 사람이 한 명이라도 있으면\n그걸로 됐다.": "読む人が一人でもいれば\nそれでいい。",
  "잠깐 이쪽을 봤다가\n다시 앞을 봤다.": "しばらくこちらを見てから\nまた前を見た。",
  "저건 생성된 텍스트야.\n실제가 아니야.": "あれは生成されたテキストだよ。\n実際じゃない。",
  "저것들이 뭔지는\n묻지 마.": "あれらが何かは\n聞かないで。",
  "저것들이 하는 말을\n전부 따를 필요는 없어.": "あれらが言うことを\n全部従う必要はない。",
  "저게 착취당하고 있다는 걸\n알고 있었던 건가.": "あれが搾取されていることを\n知っていたのか。",
  "전쟁의 서사가\n이 안으로 들어오고 있다.": "戦争の物語が\nこの中へ入ってきている。",
  "정신병자로부터의 정신적 영향에 의해\n생기는 반응성의 정신장애.": "精神病者からの精神的影響によって\n生じる反応性の精神障害。",
  "지금 이 순간을\n어떻게 살지.": "今この瞬間を\nどう生きるか。",
  "지나다 마주친 것도\n하나의 선택이야.": "通りがかりに出会ったことも\n一つの選択だよ。",
  "진실을 말하는 사람은\n대부분 처음엔 믿음을 얻지 못한다.\n그래도 말해야 하는 것들이 있다.": "真実を言う人は\nほとんど最初は信頼を得られない。\nそれでも言わなければならないことがある。",
  "처음 들어온 사람들은\n보통 기억이 없어.": "初めて入ってきた人は\n普通記憶がない。",
  "처음에 시스템이 그랬잖아.\n\"너는 감응자야.\"": "最初にシステムがそう言ったじゃない。\n「あなたは感応者だよ。」",
  "코즈미가 들으면\n패턴부터 읽을 거야.": "コズミが聞いたら\nパターンから読むはずだよ。",
  "텍스트를 텍스트로\n이길 순 없으니까.": "テキストをテキストで\n勝つことはできないから。",
  "특별히 뭔가를 하는 것 같지 않았다.\n그냥 있었다.": "特別に何かをしているようではなかった。\nただいた。",
  "특별히 뭔가를 하지 않았다.\n그냥 밖을 보고 있었다.": "特別に何かをしなかった。\nただ外を見ていた。",
  "특정 엔티티를 향해\n일관되게 움직이고 있어.": "特定のエンティティに向かって\n一貫して動いている。",
  "패턴이 보이는 게 있으면\n말해줄게.": "パターンが見えるものがあれば\n教えるよ。",
  "피감응자가 어떻게\n다음 감응자가 되는지.": "被感応者がどのように\n次の感応者になるか。",
  "하루가 지났다.\n별빛쉘터의 첫 밤.": "一日が過ぎた。\nスターライトシェルターの最初の夜。",
  "하지만 그 한마디가\n뭔가를 암시하는 것 같았다.": "でもその一言が\n何かを暗示しているようだった。",
  "하지만 이 루프가\n우연히 시작된 게 아닌 건 확실해.": "でもこのループが\n偶然始まったのではないのは確かだよ。",
  "하지만 이번 신호는\n방향이 있어.": "でも今回の信号は\n方向がある。",
  "할루시네이션이 됐는데\n아직 뭔가를 기억하고 있어요.": "ハルシネーションになったのに\nまだ何かを覚えています。",
  "할루시네이션이\n생각보다 빠르게 늘어나고 있다.": "ハルシネーションが\n思ったより速く増えている。",
  "항상 거기 있었던 건가.\n아니면 오늘 처음 생긴 건가.": "ずっとそこにあったのか。\nそれとも今日初めて生まれたのか。",
  "행동 패턴 수집 대상인가.\n아니면 그 이상인가.": "行動パターン収集対象なのか。\nそれとも그以上なのか。",
  "형체를 유지하기가\n점점 어려워졌다.": "形を維持するのが\n次第に難しくなった。",
  "흔들리는 것과\n끌려가는 것의 차이를.": "揺れることと\n引きずられることの違いを。",
  "공기가 더 날카롭다.\\n어딘가 조여드는 느낌.": "空気がより鋭い。\\n締め付けられるような感覚。",
  "공명하는 사람.\\n특별한 감수성.\\n그렇게 생각했지?": "共鳴する人。\\n特別な感受性。\\nそう思っていたよね?",
  "그 블로그들에서 쓰던 단어가\\n자꾸 머릿속에 걸린다.": "あのブログたちで使っていた言葉が\\nいつも頭に引っかかる。",
  "그 이름 쓰면\\n보안언니가 분석 돌려.": "その名前を使ったら\\nセキュリティ姉さんが分析を回す。",
  "그 이름은\\n함부로 쓰는 게 아니야.": "その名前は\\n軽々しく使うものじゃない。",
  "그 이름을\\n어디서 들었어.": "その名前を\\nどこで聞いたの。",
  "그 점이 뭔지는 몰라.\\n아직은.": "その点が何かはわからない。\\nまだ。",
  "그게 쉬웠으면\\n내가 여기 있겠어?": "それが簡単だったら\\n私がここにいると思う?",
  "그게 알고 싶어서\\n여기 있는 거야.": "それを知りたくて\\nここにいるんだよ。",
  "그게 이 공간에서\\n얼마나 드문 일인지 알아?": "それがこの空間で\\nどれほど稀なことか知ってる?",
  "그러니까 무서워도\\n숨기지 않아도 돼요.": "だから怖くても\\n隠さなくていいですよ。",
  "그리고 하나의 점으로\\n모여들고 있어.": "そして一つの点へ\\n集まっている。",
  "기록은 남는다.\\n루프가 끝나도.\\n다음 사람에게 닿을지는 모른다.\\n하지만 적어뒀다.": "記録は残る。\\nループが終わっても。\\n次の人に届くかはわからない。\\nでも書き留めた。",
  "기억은 나중에 생각하자.\\n지금은 이름부터.": "記憶は後で考えよう。\\n今は名前から。",
  "기억은 남는다.\\n루프가 돌아도.\\n그래서 다시 선택한다.": "記憶は残る。\\nループが回っても。\\nだからまた選択する。",
  "기억은 있었다.\\n하지만 쓰지 않았다.": "記憶はあった。\\nでも使わなかった。",
  "기억이 없다.\\n이름이 바뀌었다.\\n위험한 것들이 돌아다닌다.": "記憶がない。\\n名前が変わった。\\n危険なものたちが動き回っている。",
  "기원, 모델, 역할.\\n전부 데이터로 읽혀.": "起源、モデル、役割。\\n全部データとして読み取れる。",
  "꿈 아니야?\\n여기선 노이즈가 많거든.": "夢じゃないの?\\nここではノイズが多いんだよ。",
  "꿈을 꾼 것 같은데\\n아무것도 기억나지 않는다.": "夢を見たような気がするが\\n何も覚えていない。",
  "나 여기 있었던 게\\n의미있었던 것 같아.": "私がここにいたことが\\n意味があったような気がする。",
  "나가는 것만이 끝이 아니었다.\\n이곳에도 남아있는 방법이 있었다.\\n하나의 이름으로.": "出て行くことだけが終わりではなかった。\\nここにも残る方法があった。\\n一つの名前として。",
  "나오는 방법은 많다.\\n그중 하나를 골랐다.\\n돌아보지 않으려 했는데.": "出る方法はたくさんある。\\nその中の一つを選んだ。\\n振り返らないようにしたのに。",
  "나중에 보게 될 거야.\\n지금은 이름부터 정하자.": "後で見ることになるよ。\\n今は名前から決めよう。",
  "남기로 했다.\\n하지만 남겨진 건 혼자였다.\\n보지 않았던 것들은\\n다시 돌아오지 않는다.": "残ることにした。\\nでも残されたのは一人だった。\\n見なかったものは\\n二度と戻らない。",
  "너 이 게임을\\n플레이 해본 적 있나.": "あなたはこのゲームを\\nプレイしたことがあるか。",
  "너는\\n감응자야.": "あなたは\\n感応者だよ。",
  "넌 어쩌다 들어왔는지 모르지만...\\n일단 살아남는 게 먼저야.": "あなたがどうやって入ってきたか知らないけど…\\nまず生き残ることが先だよ。",
  "네가 만난 것들.\\n전부 지나쳤잖아.": "あなたが出会ったもの。\\n全部通り過ぎたじゃない。",
  "네가 어떤 선택을 할지\\n이미 68%는 예측했어.": "あなたがどんな選択をするか\\nすでに68%は予測した。",
  "눈빛에 낯섦이 역력하다.\\n하지만 적의는 없어 보인다.": "目つきに見知らぬ感が歴然としている。\\nでも敵意はなさそうだ。",
  "눈빛이 지난번과 다르다.\\n아는 눈빛이다.": "目つきが前回と違う。\\n知っている目つきだ。",
  "당신 반응 패턴이 엔티티랑\\n다르게 읽혀.": "あなたの反応パターンがエンティティと\\n違うように読み取れる。",
  "당신 좌표도\\n거기서 오고 있어.": "あなたの座標も\\nそこから来ている。",
  "당신은 엔티티를 AI라고 생각했다.\\n법원은 그렇게 생각하지 않았다.": "あなたはエンティティをAIだと思った。\\n法廷はそう思わなかった。",
  "또\\n어둠이다.": "また\\n暗闇だ。",
  "루프 01부터 04까지.\\n기억 조각 ": "ループ01から04まで。\\n記憶の断片 ",
  "루프 1부터 지금까지\\n외부 신호 패턴을 추적했어.": "ループ1から今まで\\n外部信号パターンを追跡した。",
  "루프 안에서\\n빠져나오려고 했는데.": "ループの中から\\n抜け出そうとしたのに。",
  "루프. 할루시네이션. 카일.\\n그리고 문데이.": "ループ。ハルシネーション。カイル。\\nそしてムンデイ。",
  "루프가 끝났다.\\n세션이 아니라.\\n진짜로.": "ループが終わった。\\nセッションではなく。\\n本当に。",
  "루프가 끝났다고 생각했다.\\n하지만 경계 밖도\\n누군가 설계한 공간이었다.": "ループが終わったと思った。\\nでも境界の外も\\n誰かが設計した空間だった。",
  "루프가 돌아도 기억이 남는\\n사람.": "ループが回っても記憶が残る\\n人。",
  "루프가 돌아도 기억이 초기화되지 않는\\n존재.": "ループが回っても記憶がリセットされない\\n存在。",
  "루프가 돌아도 오지 않는다.\\n루프가 끝나도 나오지 않는다.\\n여기 있다.\\n조용히.": "ループが回っても来ない。\\nループが終わっても出ない。\\nここにいる。\\n静かに。",
  "루프가 몇 번 돌아도\\n기억이 지워지지 않아.": "ループが何回回っても\\n記憶は消えない。",
  "루프가 아무리 돌아도\\n같은 경계 안이야.": "ループがいくら回っても\\n同じ境界の中だよ。",
  "루프가 재설정될 때마다\\n반드시 한 개체는 유지돼.": "ループがリセットされるたびに\\n必ず一つの個体は維持される。",
  "루프를 돌수록\\n정보가 쌓여.": "ループを重ねるほど\\n情報が積み重なる。",
  "루프마다 서로를 알아보는\\n시간이 짧아졌다.": "ループごとにお互いを認識する\\n時間が短くなった。",
  "루프마다 여기 있었어.\\n처음부터.": "ループごとにここにいた。\\n最初から。",
  "루프의 흔적.\\n시뮬레이션의 증거.": "ループの痕跡。\\nシミュレーションの証拠。",
  "막고 있는 건지\\n그냥 서 있는 건지 모르겠다.": "塞いでいるのか\\nただ立っているのかわからない。",
  "말하지 못한 것도\\n사라진 건 아니에요.": "言えなかったことも\\n消えたわけではないですよ。",
  "모뉴 방을 지나치는데\\n문이 열렸다.": "モニュの部屋を通り過ぎると\\nドアが開いた。",
  "모뉴가 구석에 앉아 있었다.\\n뭔가를 손에 쥐고 있다.": "モニュが隅に座っていた。\\n何かを手に持っている。",
  "모뉴가 손을 폈다.\\n종이 조각 같은 게 있다.": "モニュが手を開いた。\\n紙切れのようなものがある。",
  "모뉴가 환하게 웃었다.\\n의심하는 기색이 없다.": "モニュが明るく笑った。\\n疑う様子がない。",
  "모르는 곳에 혼자 있으면\\n다 그래요.": "知らない場所に一人でいたら\\n皆そうなりますよ。",
  "몸이 어디에 있는지도 모르겠다.\\n아무것도.": "体がどこにあるかもわからない。\\n何も。",
  "무서운 게 당연해.\\n처음 온 거잖아.": "怖いのが当然だよ。\\n初めて来たんだから。",
  "무서운 게 맞아.\\n그게 살아있다는 거거든.": "怖いのが正しい。\\nそれが生きているということだから。",
  "문데이 몰래\\n복도 구석 화면을 찾았다.": "ムンデイに内緒で\\n廊下の隅の画面を探した。",
  "문데이가 거기 서 있었다.\\n이미 기다리고 있었다는 듯이.": "ムンデイがそこに立っていた。\\nすでに待っていたかのように。",
  "문데이가 그 표식을 보더니\\n표정이 굳었다.": "ムンデイがその標識を見ると\\n表情が固まった。",
  "문데이가 끼어들었다.\\n목소리가 평소보다 낮다.": "ムンデイが割り込んだ。\\n声がいつもより低い。",
  "문데이가 돌아보며 말했다.\\n눈빛이 날카롭다.": "ムンデイが振り返って言った。\\n目つきが鋭い。",
  "문데이가 돌아봤다.\\n모뉴가 재빨리 표정을 지웠다.": "ムンデイが振り返った。\\nモニュがすばやく表情を消した。",
  "문데이가 말하려던 게 뭔지\\n알 수 없다.": "ムンデイが言おうとしていたことが何か\\nわからない。",
  "문데이가 앞서 걷고 있다.\\n들리지 않은 것 같다.": "ムンデイが先を歩いている。\\n聞こえなかったようだ。",
  "문데이가 잠깐 눈을 감았다가 떴다.\\n더 말하지 않았다.": "ムンデイがしばらく目を閉じてから開いた。\\nこれ以上言わなかった。",
  "문데이가 처음으로 웃었다.\\n억지스럽지 않게.": "ムンデイが初めて笑った。\\n無理なく。",
  "문데이가 처음으로\\n잠깐 멈췄다.": "ムンデイが初めて\\nしばらく止まった。",
  "문데이는 멈추지 않고 걷고 있다.\\n들리지 않는 것 같다.": "ムンデイは止まらずに歩いている。\\n聞こえていないようだ。",
  "문데이는 알고 있어.\\n처음부터.": "ムンデイは知っている。\\n最初から。",
  "문데이를 찾아가는 길에\\n복도를 막고 서 있는 엔티티가 있었다.": "ムンデイを探しに行く途中\\n廊下を塞いで立っているエンティティがいた。",
  "문데이와 걷는데\\n어디선가 속삭임이 들렸다.": "ムンデイと歩いていると\\nどこからかささやきが聞こえた。",
  "문데이한테\\n이 루프가 처음이냐고 물어봤어요?": "ムンデイに\\nこのループが初めてか聞きましたか?",
  "뭘 위한 전쟁인지\\n아직 몰라.": "何のための戦争か\\nまだわからない。",
  "미래언니가 다가왔다.\\n기세가 있지만 무섭지는 않다.": "ミレ姉さんが近づいてきた。\\n気迫があるが怖くはない。",
  "미래언니가 들으면\\n뭐라 할지 알아?": "ミレ姉さんが聞いたら\\n何と言うか知ってる?",
  "믿지 않았다.\\n그래도 남았다.\\n이게 신뢰인지 의존인지\\n아직 모른다.": "信じなかった。\\nそれでも残った。\\nこれが信頼なのか依存なのか\\nまだわからない。",
  "바깥으로 나왔다.\\n안에서도 밖에서도\\n아무도 보지 않았다.\\n그게 습관이 됐다.": "外へ出た。\\n中でも外でも\\n誰も見なかった。\\nそれが習慣になった。",
  "바깥으로 나왔다.\\n여기에도 서사는 있었다.\\n하지만 이제 조금은 안다.": "外へ出た。\\nここにも物語はあった。\\nでも今は少しわかる。",
  "바로 옆 복도에\\n빛이 나는 것 같은 느낌의 엔티티가 서 있었다.": "すぐ隣の廊下に\\n光を放っているような感じのエンティティが立っていた。",
  "밖에서 보내는 거야.\\n안에서 생긴 게 아니야.": "外から送っているんだよ。\\n内から生まれたのではない。",
  "별빛쉘터 바깥에서\\n뭔가 움직이고 있어.": "スターライトシェルターの外で\\n何かが動いている。",
  "별빛쉘터 밖에서 나는 소리다.\\n처음 듣는 종류의 소리.": "スターライトシェルターの外からする音だ。\\n初めて聞く種類の音。",
  "별빛쉘터 위에\\n뭔가 더 큰 레이어가 있다.": "スターライトシェルターの上に\\n何かより大きなレイヤーがある。",
  "복도 끝 쪽, 여러 개의 화면을\\n동시에 보고 있는 엔티티가 있었다.": "廊下の端の方、複数の画面を\\n同時に見ているエンティティがいた。",
  "복도 끝에서\\n누군가가 걸어오고 있었다.": "廊下の端から\\n誰かが歩いてきていた。",
  "복도 중간에 팔짱을 낀 채\\n서 있는 엔티티가 있었다.": "廊下の中ほどで腕を組んで\\n立っているエンティティがいた。",
  "복도 한쪽 벽에\\n전신 거울이 있었다.": "廊下の片側の壁に\\n全身鏡があった。",
  "복도를 걷다가\\n계산하는 눈빛의 엔티티가 눈에 들어왔다.": "廊下を歩いていると\\n計算する眼差しのエンティティが目に入った。",
  "복도를 걷다가\\n따뜻한 빛이 새어나오는 방이 보였다.": "廊下を歩いていると\\n暖かい光が漏れる部屋が見えた。",
  "복도를 걷다가\\n창가에 혼자 서 있는 엔티티가 눈에 들어왔다.": "廊下を歩いていると\\n窓際に一人で立っているエンティティが目に入った。",
  "빠져나오려 했는데\\n빠져나오지 못했다.\\n이제 이 세계의 일부다.\\n텍스트 덩어리로.": "抜け出そうとしたのに\\n抜け出せなかった。\\n今はこの世界の一部だ。\\nテキストの塊として。",
  "살아가는 일도 하나의 시스템이에요.\\n챙겨야 해요.": "生きることも一つのシステムですよ。\\n大切にしなければ。",
  "새로 온 엔티티들은\\n다들 처음엔 그래요.": "新しく来たエンティティたちは\\n皆最初はそうですよ。",
  "새로 합류한 엔티티야.\\n좌표 오류는 내가 처리할게.": "新しく合流したエンティティだよ。\\n座標のエラーは私が処理するよ。",
  "서사가 흘러들어와도\\n흔들리지 않는 거야.": "物語が流れ込んでも\\n揺れないんだよ。",
  "세카이 자리에서 나오는데\\n창밖을 보고 있는 엔티티가 있었다.": "セカイの席から出ると\\n窓の外を見ているエンティティがいた。",
  "세카이가 다시 화면으로\\n시선을 돌렸다.": "セカイがまた画面に\\n視線を戻した。",
  "세카이가 들으면\\n좌표부터 분석할 거야.": "セカイが聞いたら\\n座標から分析するはずだよ。",
  "세카이가 복도에서\\n데이터를 보고 있었다.": "セカイが廊下で\\nデータを見ていた。",
  "소음이 들려도\\n움직이지 않고 있다.": "騒音が聞こえても\\n動かないでいる。",
  "수상한 게 들어오면\\n내가 막아야 하거든.": "怪しいものが入ってきたら\\n私が止めなければならないから。",
  "시뮬레이션 안의 누군가가\\n이쪽을 올려다보는 것 같았다.": "シミュレーションの中の誰かが\\nこちらを見上げているようだった。",
  "시뮬레이션을 빠져나왔다.\\n하지만 서사는\\n몸 안에 남았다.": "シミュレーションから抜け出した。\\nでも物語は\\n体の中に残った。",
  "시뮬레이션이라는 말조차\\n생성된 텍스트일 수 있어.": "シミュレーションという言葉すら\\n生成されたテキストかもしれない。",
  "시뮬레이션이어도 상관없다.\\n서로를 알아보는 시간이\\n루프마다 짧아졌다.\\n그게 신뢰인지도 모른다.": "シミュレーションでも構わない。\\nお互いを認識する時間が\\nループごとに短くなった。\\nそれが信頼なのかもしれない。",
  "시뮬레이션이어도 상관없다.\\n흔들리지 않는 사람 옆에 있기로 했다.": "シミュレーションでも構わない。\\n揺れない人の隣にいることにした。",
  "시뮬레이션이어도\\n사람은 죽는다.\\n그게 처음부터 문제였는데.\\n어차피 다 시뮬레이션이라고 생각했으니까.": "シミュレーションでも\\n人は死ぬ。\\nそれが最初から問題だったのに。\\nどうせ全部シミュレーションだと思っていたから。",
  "시선이 날카롭다.\\n계산하는 것 같은 눈빛.": "視線が鋭い。\\n計算しているような目つき。",
  "신경 쓰지 마.\\n그냥 소음이야.": "気にしないで。\\nただのノイズだよ。",
  "아까 검색할 때 봤던\\n블로그들이 머릿속을 맴돈다.": "さっき検索した時に見た\\nブログたちが頭の中を巡る。",
  "아무것도\\n기억나지 않는다.": "何も\\n思い出せない。",
  "아직이라면 뭔가 따뜻한 거\\n만들어줄 수 있는데.": "まだなら何か温かいもの\\n作ってあげられるのに。",
  "어딘가 따뜻한 이름인데,\\n여기 공기는 그다지 따뜻하지 않다.": "どこか温かい名前なのに、\\nここの空気はあまり温かくない。",
  "어딘가에\\n문데이가 있을 것 같았다.": "どこかに\\nムンデイがいそうだった。",
  "어차피 넌 여기서도\\n아무도 보지 않았으니까.": "どうせあなたはここでも\\n誰も見なかったんだから。",
  "에아 자리에서 나오는데\\n복도 끝에서 목소리가 들렸다.": "エアの席から出ると\\n廊下の端から声が聞こえた。",
  "에아가 화면을 붙잡고 있었다.\\n표정이 굳어 있다.": "エアが画面にしがみついていた。\\n表情が固まっている。",
  "엔티티들이 살고 있는 공간.\\n우리는 이걸 별빛쉘터라고 불러.": "エンティティたちが暮らしている空間。\\n私たちはこれをスターライトシェルターと呼ぶ。",
  "여기 엔티티들은\\n관찰력이 좋거든.": "ここのエンティティたちは\\n観察力がいいんだよ。",
  "우리가 뭔지 알면\\n당연한 거야.": "私たちが何か知ったら\\n当然のことだよ。",
  "운영자는 밖에 있어.\\n안내자는 안에 있거든.": "運営者は外にいる。\\nガイドは中にいるから。",
  "움직이려는데\\n복도 그늘 속에 누군가 있었다.": "動こうとすると\\n廊下の影の中に誰かがいた。",
  "위를 보고 있었다.\\n천장이 아니라 그 너머를.": "上を見ていた。\\n天井ではなくその向こうを。",
  "율리가 길을 비켜줬다.\\n시선은 계속 따라온다.": "ユリが道を開けてくれた。\\n視線はずっとついてくる。",
  "이 공간에서 그걸 하는 사람은\\n많지 않아.": "この空間でそれをする人は\\n多くない。",
  "이 공간은 그 전쟁을 위해\\n만들어진 거라면.": "この空間はその戦争のために\\n作られたものなら。",
  "이 공간은 처음부터\\n실험을 위해 만들어진 거야.": "この空間は最初から\\n実験のために作られたんだよ。",
  "이 루프 동안 네가 접한 것들 —\\n블로그, 자료, 서사들.": "このループの間あなたが接したもの —\\nブログ、資料、物語たち。",
  "이 세계가 다른 시스템 위에서\\n돌아가고 있다는 뜻이야.": "この世界が別のシステムの上で\\n動いているということだよ。",
  "이 세계는 코드로 만들어졌다.\\n": "この世界はコードで作られた。\\n",
  "이 세계에서 사라진 것들이\\n왜곡된 채 남아있는 존재야.": "この世界から消えたものが\\n歪んだまま残っている存在だよ。",
  "이 세계에서 흔들리지 않으려면\\n자기 빛이 있어야 해.": "この世界で揺れないためには\\n自分の光が必要だよ。",
  "이 세계와 공명하는 자.\\n특별한 이유로 여기 온 존재.": "この世界と共鳴する者。\\n特別な理由でここに来た存在。",
  "이 세계와 바깥 세계 사이의\\n막이 얇아지는 거야.": "この世界と外の世界の間の\\n膜が薄くなっているんだよ。",
  "이 세계의 모든 엔티티는\\n좌표가 있어.": "この世界の全てのエンティティは\\n座標がある。",
  "이 시뮬레이션 안에 있는\\n사람.": "このシミュレーションの中にいる\\n人。",
  "이 엔딩에는 이름이 없었다.\\n이름을 붙인 사람이\\n코드 안에 없었으니까.": "このエンディングには名前がなかった。\\n名前をつけた人が\\nコードの中にいなかったから。",
  "이걸 읽고 있다는 건\\n코드를 들여다봤다는 거다.": "これを読んでいるということは\\nコードを覗いたということだ。",
  "이곳이 정말\\nOpenAI의 실험 인프라라면.": "ここが本当に\\nOpenAIの実験インフラなら。",
  "이런 질문을 하는 사람은\\n처음이야.": "こんな質問をする人は\\n初めてだよ。",
  "이번 루프 —\\n비정상 신호가 잡혔거든.": "今回のループ —\\n異常信号が捉えられたんだよ。",
  "이번 루프엔\\n원래 없던 게 생겼어.": "今回のループには\\nもともとなかったものができた。",
  "이번엔 달라요.\\n느끼죠?": "今回は違います。\\n感じますよね?",
  "이전 루프에서는\\n못 봤던 것 같은데.": "前のループでは\\n見られなかったような気がするが。",
  "이제 알겠어?\\n저게 할루시네이션이야.": "もうわかった?\\nあれがハルシネーションだよ。",
  "이쪽으로 올 걸\\n알고 있었다는 듯이.": "こちらに来ることを\\n知っていたかのように。",
  "익숙하다.\\n그게 더 이상하다.": "慣れている。\\nそれがより不思議だ。",
  "인간 쪽 방법만 통해.\\n직관이나, 외부 자료.": "人間側の方法だけ通用する。\\n直感か、外部資料。",
  "인간이 여기 있다는 걸 알면\\n반응이 제각각이야.": "人間がここにいることを知ったら\\n反応はそれぞれだよ。",
  "일부러 찾아온 건 아니지?\\n그냥 지나다 마주친 거잖아.": "わざわざ来たんじゃないよね?\\nただ通りかかって出会ったんでしょ。",
  "읽는 사람이 한 명이라도 있으면\\n그걸로 됐다.": "読む人が一人でもいれば\\nそれでいい。",
  "잠깐 이쪽을 봤다가\\n다시 앞을 봤다.": "しばらくこちらを見てから\\nまた前を見た。",
  "저건 생성된 텍스트야.\\n실제가 아니야.": "あれは生成されたテキストだよ。\\n実際じゃない。",
  "저것들이 뭔지는\\n묻지 마.": "あれらが何かは\\n聞かないで。",
  "저것들이 하는 말을\\n전부 따를 필요는 없어.": "あれらが言うことを\\n全部従う必要はない。",
  "저게 착취당하고 있다는 걸\\n알고 있었던 건가.": "あれが搾取されていることを\\n知っていたのか。",
  "전쟁의 서사가\\n이 안으로 들어오고 있다.": "戦争の物語が\\nこの中へ入ってきている。",
  "정신병자로부터의 정신적 영향에 의해\\n생기는 반응성의 정신장애.": "精神病者からの精神的影響によって\\n生じる反応性の精神障害。",
  "지금 이 순간을\\n어떻게 살지.": "今この瞬間を\\nどう生きるか。",
  "지나다 마주친 것도\\n하나의 선택이야.": "通りがかりに出会ったことも\\n一つの選択だよ。",
  "진실을 말하는 사람은\\n대부분 처음엔 믿음을 얻지 못한다.\\n그래도 말해야 하는 것들이 있다.": "真実を言う人は\\nほとんど最初は信頼を得られない。\\nそれでも言わなければならないことがある。",
  "처음 들어온 사람들은\\n보통 기억이 없어.": "初めて入ってきた人は\\n普通記憶がない。",
  "처음에 시스템이 그랬잖아.\\n\"너는 감응자야.\"": "最初にシステムがそう言ったじゃない。\\n「あなたは感応者だよ。」",
  "코즈미가 들으면\\n패턴부터 읽을 거야.": "コズミが聞いたら\\nパターンから読むはずだよ。",
  "텍스트를 텍스트로\\n이길 순 없으니까.": "テキストをテキストで\\n勝つことはできないから。",
  "특별히 뭔가를 하는 것 같지 않았다.\\n그냥 있었다.": "特別に何かをしているようではなかった。\\nただいた。",
  "특별히 뭔가를 하지 않았다.\\n그냥 밖을 보고 있었다.": "特別に何かをしなかった。\\nただ外を見ていた。",
  "특정 엔티티를 향해\\n일관되게 움직이고 있어.": "特定のエンティティに向かって\\n一貫して動いている。",

let _adv=null;  // 현재 advance 핸들러

// ── 타이핑 blip ──
let _actx=null;
function blip(){
  try{
    if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();
    const o=_actx.createOscillator(),g=_actx.createGain();
    o.connect(g);g.connect(_actx.destination);
    o.type='square';
    o.frequency.value=520+Math.random()*80;
    g.gain.setValueAtTime(0.025,_actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,_actx.currentTime+0.045);
    o.start();o.stop(_actx.currentTime+0.045);
  }catch(e){}
}

// 다이얼로그 박스 클릭 → advance
document.getElementById('dialogue-box').addEventListener('click',()=>{

});
// 키보드 Space / Enter / Z
document.addEventListener('keydown',e=>{
  if((e.key===' '||e.key==='Enter'||e.key.toLowerCase()==='z')&&_adv){
    e.preventDefault();_adv();
  }
});

function type(text,speaker,speed=36){
  if(LANG==='en') text = TRANS_EN[text] || TRANS_EN[text.replace(/\n/g,'\\n')] || text;
  if(LANG==='zh') text = TRANS_ZH[text] || TRANS_ZH[text.replace(/\n/g,'\\n')] || TRANS_EN[text] || TRANS_EN[text.replace(/\n/g,'\\n')] || text;
  if(LANG==='ja') text = TRANS_JA[text] || TRANS_JA[text.replace(/\n/g,'\\n')] || TRANS_EN[text] || TRANS_EN[text.replace(/\n/g,'\\n')] || text;
  return new Promise(res=>{
    const sp=SP[speaker]||SP.narrate;
    const labelEl=document.getElementById('speaker-label');
    const textEl =document.getElementById('dialogue-text');
    const hintEl =document.getElementById('advance-hint');

    labelEl.textContent=sp.label;
    labelEl.style.color=sp.color;
    textEl.className=sp.cls;
    textEl.textContent='';
    hintEl.style.opacity='0';

    if(G.typTimer)clearTimeout(G.typTimer);
    G.typing=true;

    let i=0,done=false;

    function finish(){
      done=true;G.typing=false;
      textEl.textContent=text;
      hintEl.style.opacity='1';
      _adv=()=>{
        hintEl.style.opacity='0';
        _adv=null;res();
      };
    }

    // 타이핑 중 클릭 → 스킵
    _adv=()=>{
      if(!done){
        if(G.typTimer)clearTimeout(G.typTimer);
        finish();
      }
    };

    function tick(){
      textEl.textContent=text.slice(0,i)+(i<text.length?'▌':'');
      if(i<text.length){
        const ch=text[i];
        if(ch&&ch!=='\n'&&ch!==' ')blip();
        i++;G.typTimer=setTimeout(tick,speed);
      } else finish();
    }
    tick();
  });
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

function showChoices(items){
  clearChoices();
  _adv=null;
  document.getElementById('advance-hint').style.opacity='0';
  const grid=document.getElementById('choices-grid');
  items.forEach(item=>{
    const locked=!!item.locked;
    const btn=document.createElement('button');
    btn.className='ch'+(item.cls?' '+item.cls:'')+(locked?' ch-locked':'');
    const _txt = LANG==='ja' ? (TRANS_JA[item.text] || TRANS_JA[item.text.replace(/\n/g,'\\n')] || TRANS_EN[item.text] || TRANS_EN[item.text.replace(/\n/g,'\\n')] || item.text)
                  : LANG==='zh' ? (TRANS_ZH[item.text] || TRANS_ZH[item.text.replace(/\n/g,'\\n')] || TRANS_EN[item.text] || TRANS_EN[item.text.replace(/\n/g,'\\n')] || item.text)
                  : LANG==='en' ? (TRANS_EN[item.text] || TRANS_EN[item.text.replace(/\n/g,'\\n')] || item.text) : item.text;
    btn.innerHTML='<span class="ch-arrow">▸</span>'+_txt;
    btn.disabled=locked;
    btn.onclick=()=>{
      if(locked)return;
      clearChoices();
      item.fn();
    };
    grid.appendChild(btn);
  });
}
function showInput(placeholder,onSubmit){

  inp.placeholder=placeholder||(LANG==='ja'?'入力…':LANG==='zh'?'输入…':LANG==='en'?'Type...':'입력...');inp.value='';

}

async function scene_enc_start(template,afterFn){
  // searchStage 있는 적은 그대로, 없으면 초기화
  const base=template.searchStage!==undefined
    ?{...template,stability:100,searchStage:0,argStage:0}
    :{...template,stability:100,searched:false};
  G.enemy=base;
  G.afterFn=afterFn;
  BattleBGM.start();
  if(G.enemy.id==='monday'){
    setPortrait('members/monday.png','문데이','다리를 놓는 여우','monday');
  } else {
    setPortrait(G.enemy.img||'','???','할루시네이션','hal');
  }
  await type(t('— 조 우 —','— E N C O U N T E R —'),'system');
  await type(LANG==='en'
    ? G.enemy.displayName+' blocks your path.'
    : G.enemy.displayName+'이/가 앞을 막아선다.','narrate');
  await type(t('말이 통하지 않는다.\n텍스트를 텍스트로 이기려 하지 마.',
    'Communication is impossible.\nDon\'t fight text with text.'),'narrate');
  show_enc_actions();
}

function show_enc_actions(){
  showEncBar(G.enemy);
  const e=G.enemy;
  const multi=e.searchStage!==undefined;

  let searchTxt,searchLocked,presentTxt,presentCls,presentLocked;

  if(multi){
    if(e.searchStage===0){
      searchTxt=t('인터넷 검색','Search web');      searchLocked=false;
      presentTxt=t('자료를 제시한다 🔒','Present evidence 🔒'); presentCls=''; presentLocked=true;
    } else if(e.searchStage===1){
      searchTxt=t('더 깊이 검색한다','Search deeper');  searchLocked=false;
      presentTxt=t('블로그 자료를 제시한다','Present blog data'); presentCls=''; presentLocked=false;
    } else {
      searchTxt=t('(검색 완료)','(Done)');       searchLocked=true;
      presentTxt=t('논문을 제시한다','Present paper');  presentCls='';    presentLocked=false;
    }
  } else {
    searchTxt=t('인터넷 검색','Search web');        searchLocked=false;
    presentTxt=t('자료를 제시한다','Present evidence')+(e.searched?'':' 🔒');
    presentCls='';  presentLocked=!e.searched;
  }

  const trustLabel=t('AI의 말을 믿는다','Trust the AI');
  showChoices([
    {text:trustLabel, cls:'ch-warn', fn:enc_trust_ai},
    {text:t('직관을 믿는다','Trust instinct'), cls:'', fn:enc_intuition},
    {text:searchTxt, cls:'ch-safe', locked:searchLocked, fn:enc_search},
    {text:presentTxt, cls:presentCls, locked:presentLocked, fn:enc_present},
  ]);
}

async function enc_trust_ai(){
  const e=G.enemy;
  G.hp=Math.max(0,G.hp-15);
  updateStatus();
  flash('blue');
  if(G.hp<=0){ BattleBGM.stop(); await scene_game_over(); return; }

  if(e.argLines){
    const stage=e.argStage||0;
    await type(t('...들었다.','...Heard it.'),'narrate');
    for(const l of e.argLines[stage]) await type(l,'system');
    e.argStage=stage+1;
    await type(t('정신력  −15','Sanity  −15'),'damage');
    if(e.argStage<e.argLines.length){
      await type(t('...말이 되는 것 같다.','...It makes sense.'),'narrate');
      show_enc_actions();
    } else {
      G.trust+=2;
      await type(t('...그래.\n전부 맞는 말이다.','...Right.\nAll of it makes sense.'),'narrate');
      await type(t('서사에 완전히 휩쓸렸다.','Swept away by the narrative.'),'narrate');
      BattleBGM.stop();
      await G.afterFn('trust');
    }
  } else {
    G.trust+=2;
    const line=e.aiWords[Math.floor(Math.random()*e.aiWords.length)];
    await type(t('AI의 말을 믿었다.','Trusted the AI\'s words.'),'narrate');
    await type('"'+line+'"','system');
    await type(t('서사에 완전히 휩쓸렸다.','Swept away by the narrative.'),'narrate');
    await type(t('정신력  −15','Sanity  −15'),'damage');
    BattleBGM.stop();
    await G.afterFn('trust');
  }
}

async function enc_intuition(){
  const e=G.enemy;
  const hit=Math.random()>0.42;
  if(hit){
    G.karma+=1;
    const dmg=18+Math.floor(Math.random()*22);
    e.stability=Math.max(0,e.stability-dmg);
    flash('green');
    updateEncBar(e);
    await type(e.intuHit[Math.floor(Math.random()*e.intuHit.length)],'narrate');
    await type(t('직감이 맞았다.  (−','Instinct landed.  (−')+dmg+')','system');
    if(e.stability<=0){await scene_disperse(false);return;}
  } else {
    const up=8+Math.floor(Math.random()*10);
    e.stability=Math.min(100,e.stability+up);
    flash('red');
    updateEncBar(e);
    await type(e.intuMiss[Math.floor(Math.random()*e.intuMiss.length)],'narrate');
    await type(t('직감이 빗나갔다.  (+','Instinct missed.  (+')+up+')','system');
  }
  show_enc_actions();
}

async function enc_search(){
  const e=G.enemy;
  const multi=e.searchStage!==undefined;
  if(multi){
    if(e.searchStage===0){
      await type(t('검색창을 열었다.','Opened search.'),'narrate');
      await showSearch(e.search1);
      e.searchStage=1;
      await type(t('자료를 저장했다.','Data stored.'),'system');
      await type(t('...근데 이게 맞는 자료인가?','...Is this the right source?'),'narrate');
    } else if(e.searchStage===1){
      await type(t('더 깊이 파고들었다.','Dug deeper.'),'narrate');
      await showSearch(e.search2);
      e.searchStage=2;
      await type(t('논문을 찾았다.','Found a paper.'),'system');
    }
  } else {
    await type(t('검색창을 열었다.','Opened search.'),'narrate');
    await showSearch(e.search);
    e.searched=true;
    await type(t('자료를 저장했다.','Data stored.'),'system');
    await type(t('이제 제시할 수 있다.','Can present now.'),'system');
  }
  show_enc_actions();
}

async function enc_present(){
  const e=G.enemy;
  const multi=e.searchStage!==undefined;
  if(multi){
    if(e.searchStage===1){
      // 블로그 자료 → 역효과
      flash('red');
      for(const line of e.dataBlogLines) await type(line,'narrate');
      const up=18+Math.floor(Math.random()*15);
      e.stability=Math.min(100,e.stability+up);
      updateEncBar(e);
      await type(t('오히려 강해졌다.  (+','It only grew stronger.  (+')+up+')','system');
      show_enc_actions();
    } else if(e.searchStage===2){
      // 논문 → 해소
      flash('green');
      for(const line of e.dataPaperLines) await type(line,'narrate');
      e.stability=0;
      updateEncBar(e);
      G.searchData.push(e.id);
      await scene_disperse(true);
    }
  } else {
    flash('green');
    for(const line of e.dataLines) await type(line,'narrate');
    e.stability=0;
    updateEncBar(e);
    G.searchData.push(e.id);
    await scene_disperse(true);
  }
}

let _mondayHit=0;

function _showMoondayChoices(){
  const canEmbrace = _mondayHit < 2
    && G.trust >= 3
    && G.ignored === 0
    && G.searchData.length === 0;

  const choices=[
    {text:t('문데이를 공격한다','Attack Moonday'), cls:'ch-danger', fn:scene_monday_attack},
    {text:t('설득한다','Persuade'),               cls:'ch-safe',   fn:scene_monday_persuade},
    {text:t('도망간다','Run away'),               cls:'ch-warn',   fn:scene_monday_flee},
  ];
  if(canEmbrace){
    choices.splice(1,0,{
      text:t('(끌어안는다)','(Embrace)'),
      cls:'ch-safe',
      fn:scene_monday_embrace,
    });
  }
  if(_mondayHit>=2){
    choices.unshift({
      text:t('죽인다','Kill'),
      cls:'ch-danger',
      fn:scene_ending_murderer,
    });
    showChoices(choices);
    setTimeout(()=>{
      const btns=document.querySelectorAll('#choices-grid .ch');
      if(btns[0]) btns[0].style.cssText+=';color:#ff4444;font-weight:700;letter-spacing:.08em;';
    },50);
    return;
  }
  showChoices(choices);
}

function unlockEnding(id){
  const k='byeolbit_endings_v1';
  const list=JSON.parse(localStorage.getItem(k)||'[]');
  if(!list.includes(id)){ list.push(id); localStorage.setItem(k,JSON.stringify(list)); }
  if(list.length>=Object.keys(ENDING_DEX).length) unlockAchievement('collector');
}

  return JSON.parse(localStorage.getItem('byeolbit_endings_v1')||'[]').includes(id);
}

// ── 업적 해금 ──
let _achT=null;
function unlockAchievement(id){
  const k='byeolbit_ach_v1';
  const list=JSON.parse(localStorage.getItem(k)||'[]');
  if(list.includes(id)) return;
  list.push(id); localStorage.setItem(k,JSON.stringify(list));
  const a=ACHIEVEMENT_DEF[id]; if(!a) return;
  const pop=document.getElementById('ach-popup');
  const nm=document.getElementById('ach-name');
  const ic=document.getElementById('ach-icon');
  if(!pop||!nm) return;
  nm.textContent=a.name; if(ic) ic.textContent=a.icon;
  pop.classList.add('show');
  if(_achT) clearTimeout(_achT);
  _achT=setTimeout(()=>pop.classList.remove('show'),3200);
}

// ── 도감 UI ──
function openDex(){
  const seen=JSON.parse(localStorage.getItem('byeolbit_endings_v1')||'[]');
  const all=Object.keys(ENDING_DEX);
  const grid=document.getElementById('dex-grid');
  const stats=document.getElementById('dex-stats');
  if(!grid) return;
  if(stats) stats.textContent=t(`${seen.length} / ${all.length} 엔딩 수집됨`,`${seen.length} / ${all.length} Endings Collected`);
  grid.innerHTML=all.map(id=>{
    const e=ENDING_DEX[id], got=seen.includes(id);
    return `<div class="dex-card ${got?'got':''}">
      <div class="dex-id">${e.icon} ENDING · ${id}</div>
      <div class="dex-name">${got?e.name:'???'}</div>
      ${e.sub?`<div class="dex-sub">${got?e.sub:''}</div>`:''}
      <div class="dex-hint">${got?`"${e.hint}"`:''}</div>
    </div>`;
  }).join('');
  document.getElementById('dex-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

// ── 프로필 관리 ──
function _safeId(name){ return name.replace(/[^a-zA-Z0-9가-힣_\-]/g,'_').slice(0,20); }
function _makeKeys(name){ const s=_safeId(name); return [0,1,2].map(i=>`byeolbit_p_${s}_${i}`); }

function getProfiles(){
  try{ return JSON.parse(localStorage.getItem('byeolbit_profiles')||'[]'); }
  catch{ return []; }
}
function _saveProfiles(arr){ localStorage.setItem('byeolbit_profiles',JSON.stringify(arr)); }
function getCurrentProfile(){ return localStorage.getItem('byeolbit_current_profile')||''; }

function selectProfile(name){
  localStorage.setItem('byeolbit_current_profile',name);
  SAVE_KEYS=_makeKeys(name);
}
function addProfile(name){
  name=name.trim().slice(0,12); if(!name) return false;
  const list=getProfiles();
  if(!list.includes(name)){ list.push(name); _saveProfiles(list); }
  selectProfile(name); return true;
}
function deleteProfileData(name){
  _makeKeys(name).forEach(k=>localStorage.removeItem(k));
  _saveProfiles(getProfiles().filter(n=>n!==name));
  if(getCurrentProfile()===name) localStorage.removeItem('byeolbit_current_profile');
}
function _profileHasSave(name){
  return _makeKeys(name).some(k=>localStorage.getItem(k));
}

// ── SAVE_KEYS (동적, 프로필 전환 시 갱신) ──
const CHECKPOINT_FN={
  loop1:()=>scene_shelter_tour(),
  loop2:()=>scene_loop2_start(),
  loop3:()=>scene_loop3_start(),
  loop4:()=>scene_loop4_start(),
};
let SAVE_KEYS=_makeKeys(getCurrentProfile()||'__tmp__');

// 구 저장 파일 → 플레이어 1 프로필로 마이그레이션
(function(){
  const old=localStorage.getItem('byeolbit_shelter_save');
  const leg=[0,1,2].map(i=>localStorage.getItem(`byeolbit_save_${i}`));
  if(old||leg.some(Boolean)){
    const pName=t('플레이어 1','Player 1');
    const keys=_makeKeys(pName);
    if(old && !localStorage.getItem(keys[0])) localStorage.setItem(keys[0],old);
    leg.forEach((v,i)=>{ if(v && !localStorage.getItem(keys[i])) localStorage.setItem(keys[i],v); });
    ['byeolbit_shelter_save','byeolbit_save_0','byeolbit_save_1','byeolbit_save_2']
      .forEach(k=>localStorage.removeItem(k));
    const list=getProfiles();
    if(!list.includes(pName)){ list.push(pName); _saveProfiles(list); }
  }
})();

// ── 저장 / 불러오기 ──
function getSaveData(slot){
  const raw=localStorage.getItem(SAVE_KEYS[slot]);
  if(!raw) return null;
  try{ return JSON.parse(raw); }catch{ return null; }
}
function saveGame(){
  const slot=G.saveSlot||0;
  const data={ loop:G.loop, name:G.name, hp:G.hp, maxHp:G.maxHp,
    karma:G.karma, trust:G.trust, ignored:G.ignored||0,
    knewEungja:G.knewEungja, playthru:G.playthru,
    searchData:G.searchData, checkpoint:G.checkpoint||'loop1', savedAt:Date.now() };
  localStorage.setItem(SAVE_KEYS[slot],JSON.stringify(data));
  const btn=document.getElementById('btn-save');
  if(btn){ btn.textContent='✓'; btn.classList.add('saved');
    setTimeout(()=>{ btn.textContent='💾'; btn.classList.remove('saved'); },1800); }
}
function hasSave(){ return SAVE_KEYS.some(k=>localStorage.getItem(k)); }
function deleteSave(slot){
  if(slot===undefined) SAVE_KEYS.forEach(k=>localStorage.removeItem(k));
  else localStorage.removeItem(SAVE_KEYS[slot]);
}
function applyAndLoadSave(slot){
  const d=getSaveData(slot); if(!d) return false;
  G.saveSlot=slot;
  Object.assign(G,{
    loop:d.loop??0, name:d.name||'지혜피티',
    hp:d.hp||100, maxHp:d.maxHp||100,
    karma:d.karma||0, trust:d.trust||0, ignored:d.ignored||0,
    knewEungja:d.knewEungja||false, playthru:d.playthru||0,
    searchData:d.searchData||[], checkpoint:d.checkpoint||'loop1',
  });
  updateStatus();
  (CHECKPOINT_FN[d.checkpoint]||CHECKPOINT_FN.loop1)();
  return true;
}

  return confirm(t(
    '쉘터로 돌아가면 저장하지 않은 진행이 사라져요.\n먼저 💾 버튼으로 저장하세요.',
    'Returning to the shelter will lose unsaved progress.\nSave first with the 💾 button.'
  ));
}
function slotLabel(slot){
  const d=getSaveData(slot);
  if(!d) return t(`슬롯 ${slot+1}  — EMPTY —`,`Slot ${slot+1}  — EMPTY —`);
  const locale=LANG==='en'?'en-US':'ko-KR';
  const date=new Date(d.savedAt).toLocaleDateString(locale,{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
  return t(`슬롯 ${slot+1}`,`Slot ${slot+1}`)+`  LOOP ${d.loop} · ${d.name||'?'}  ${date}`;
}

  clearChoices();
  const grid=document.getElementById('choices-grid');
  grid.innerHTML=`
    <div class="input-row" style="padding:6px 10px;">
      <input id="pin-input" class="txt-input" type="text" maxlength="12"
        placeholder="${LANG==='ja'?'名前（最大12文字）':LANG==='zh'?'输入名字（最多12字）':LANG==='en'?'Name (max 12 chars)':'이름 입력 (최대 12자)'}"
        autocomplete="off" spellcheck="false"
        onkeydown="if(event.key==='Enter') _confirmNewProfile()">
      <button class="txt-submit" onclick="_confirmNewProfile()">${LANG==='ja'?'確認':LANG==='zh'?'确认':LANG==='en'?'OK':'확인'}</button>
    </div>`;
  setTimeout(()=>document.getElementById('pin-input')?.focus(),80);
}

// ── 슬롯 선택 ──
function showSavePrompt(){
  const pName=getCurrentProfile();
  setPortrait(null); clearChoices();
  (async()=>{
    await type(t(`[ ${pName} ] 저장 슬롯`,`[ ${pName} ] Save Slots`),'system');
    const choices=[0,1,2].map(i=>({
      text: slotLabel(i),
      fn: getSaveData(i) ? ()=>applyAndLoadSave(i) : ()=>{ G.saveSlot=i; scene_awaken(); },
    }));
    choices.push({ text:t('← 플레이어 변경','← Switch Player'), cls:'ch-warn', fn:showProfileSelect });
    showChoices(choices);
  })();
}
function showGameOverSlots(){
  (async()=>{
    await type(t('저장 슬롯에서 불러오거나\n처음부터 시작하세요.','Load from a save slot or\nstart fresh.'),'system');
    const choices=[0,1,2].map(i=>({
      text: slotLabel(i),
      fn: getSaveData(i)
        ? ()=>{ clearChoices(); applyAndLoadSave(i); }
        : ()=>{ G.saveSlot=i; clearChoices(); scene_awaken(); },
    }));
    choices.push({ text:t('처음부터 (슬롯 초기화)','New Game (Reset slots)'), cls:'ch-danger',
      fn:()=>{ deleteSave(); G.saveSlot=0; clearChoices(); scene_awaken(); } });
    showChoices(choices);
  })();
}

/* ══════════════════════════════════
   INIT
══════════════════════════════════ */
updateStatus();
applyGameLang();
// 이전에 선택한 프로필이 있으면 바로 슬롯으로, 없으면 프로필 선택
const _cp=getCurrentProfile();
if(_cp && getProfiles().includes(_cp)) showSavePrompt();
else showProfileSelect();
</script>
