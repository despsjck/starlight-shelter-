<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>별빛쉘터: 첫 번째 방문</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #05060e;
  --chatgpt: #19c37d;
  --gemini: #4285f4;
  --grok: #1da1f2;
  --deepseek: #7c6aff;
  --kimi: #ff6b35;
  --claude: #d97757;
  --text: #e8e8ff;
  --dim: #7788aa;
  --panel: rgba(8,10,25,0.97);
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* ──── CANVAS ──── */
#stars {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  z-index: 0; pointer-events: none;
}

/* ──── SCREEN SYSTEM ──── */
.screen {
  position: fixed; inset: 0;
  z-index: 10;
  display: none;
  flex-direction: column;
  align-items: center;
}
.screen.active { display: flex; }

/* ════════════════════════
   TITLE
════════════════════════ */
#s-title {
  justify-content: center;
  gap: 16px;
  text-align: center;
}

.title-star {
  font-size: 56px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.title-logo {
  font-size: 40px;
  font-weight: 700;
  letter-spacing: 8px;
  color: #fff;
  text-shadow: 0 0 40px rgba(100,150,255,0.9);
}

.title-sub {
  font-size: 13px;
  color: var(--dim);
  letter-spacing: 8px;
  margin-top: -4px;
}

.title-version {
  font-size: 11px;
  color: #445;
  letter-spacing: 2px;
  margin-top: 8px;
}

.btn-start {
  margin-top: 40px;
  padding: 14px 48px;
  background: transparent;
  border: 2px solid #4d7cff;
  color: #4d7cff;
  font-family: inherit;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 6px;
  transition: all 0.3s;
  animation: blink-b 1.5s infinite;
}
.btn-start:hover { background: #4d7cff; color: #fff; animation: none; }
@keyframes blink-b {
  0%,100% { opacity: 1; } 50% { opacity: 0.5; }
}

/* ════════════════════════
   PROLOGUE
════════════════════════ */
#s-prologue {
  justify-content: center;
  padding: 60px 40px;
  cursor: pointer;
}

.prologue-box {
  max-width: 540px;
  width: 100%;
  text-align: center;
}

.prologue-chapter {
  font-size: 11px;
  color: var(--dim);
  letter-spacing: 6px;
  margin-bottom: 48px;
}

#prologue-text {
  font-size: 22px;
  line-height: 2;
  color: var(--text);
  min-height: 100px;
  white-space: pre-wrap;
  transition: opacity 0.3s;
}

.prologue-hint {
  margin-top: 48px;
  font-size: 12px;
  color: var(--dim);
  letter-spacing: 3px;
  animation: blink-b 1.5s infinite;
}

/* ════════════════════════
   MAP
════════════════════════ */
#s-map {
  overflow-y: auto;
  padding: 30px 20px 60px;
  align-items: center;
}

.map-header {
  text-align: center;
  margin-bottom: 32px;
  padding-top: 10px;
}

.map-title-main {
  font-size: 13px;
  color: var(--dim);
  letter-spacing: 6px;
}

.map-subtitle {
  font-size: 11px;
  color: #334;
  margin-top: 6px;
}

.building {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
  max-width: 480px;
}

.floor-btn {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 20px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 6px;
  color: var(--text);
  font-family: inherit;
  cursor: pointer;
  text-align: left;
  transition: all 0.25s;
}
.floor-btn:hover {
  background: rgba(255,255,255,0.08);
  transform: translateX(6px);
  border-color: rgba(255,255,255,0.2);
}

.floor-color-bar {
  width: 4px;
  height: 40px;
  border-radius: 2px;
  flex-shrink: 0;
}

.floor-info { flex: 1; }
.floor-name { font-size: 15px; font-weight: 700; }
.floor-desc { font-size: 11px; color: var(--dim); margin-top: 3px; }
.floor-count { font-size: 12px; color: var(--dim); flex-shrink: 0; }

.map-footer {
  margin-top: 28px;
  text-align: center;
  font-size: 11px;
  color: #334;
}

/* ════════════════════════
   ROOM
════════════════════════ */
#s-room {
  overflow-y: auto;
  padding: 20px 16px 80px;
  align-items: stretch;
}

.room-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding-bottom: 16px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  margin-bottom: 24px;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 5;
  padding-top: 10px;
}

.back-btn {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.15);
  color: var(--dim);
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  padding: 7px 14px;
  border-radius: 4px;
  transition: all 0.2s;
  flex-shrink: 0;
}
.back-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.4); }

#room-title-el {
  font-size: 18px;
  font-weight: 700;
}

.room-hint {
  font-size: 11px;
  color: var(--dim);
  margin-left: auto;
  flex-shrink: 0;
}

.char-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 14px;
}

.char-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 20px 10px 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.25s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  position: relative;
}
.char-card:hover {
  background: rgba(255,255,255,0.09);
  transform: translateY(-4px);
}
.char-card.visited {
  border-color: rgba(77,124,255,0.35);
}

.char-avatar {
  width: 76px; height: 76px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid rgba(255,255,255,0.15);
  background: #1a1a2e;
}
.char-card.visited .char-avatar {
  border-color: rgba(77,124,255,0.5);
}

.char-name { font-size: 13px; font-weight: 700; line-height: 1.3; }
.char-title-s { font-size: 10px; color: var(--dim); line-height: 1.3; }

.visited-mark {
  position: absolute;
  top: 8px; right: 8px;
  font-size: 10px;
  color: #4d7cff;
  opacity: 0;
}
.char-card.visited .visited-mark { opacity: 1; }

/* ════════════════════════
   DIALOGUE
════════════════════════ */
#s-dialogue {
  justify-content: flex-end;
  cursor: pointer;
}

.dlg-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(5,6,14,0.85) 0%, transparent 60%);
  z-index: 1;
}

.dlg-exit {
  position: absolute;
  top: 16px; right: 16px;
  z-index: 30;
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.15);
  color: var(--dim);
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  padding: 6px 12px;
  border-radius: 4px;
  transition: all 0.2s;
}
.dlg-exit:hover { color: var(--text); }

/* 캐릭터 초상화 */
.dlg-portrait-wrap {
  position: absolute;
  bottom: 195px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
}

#dlg-portrait {
  width: 130px; height: 130px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #4d7cff;
  box-shadow: 0 0 30px rgba(77,124,255,0.6), 0 0 70px rgba(77,124,255,0.2);
  background: #111;
  display: block;
  transition: border-color 0.3s, box-shadow 0.3s;
}

/* 대화 박스 */
.dlg-box {
  position: relative;
  z-index: 20;
  width: 100%;
  background: var(--panel);
  border-top: 2px solid rgba(77,124,255,0.4);
  padding: 20px 22px 22px;
  min-height: 180px;
}

#dlg-name {
  font-size: 13px;
  font-weight: 700;
  color: #4d7cff;
  letter-spacing: 2px;
  margin-bottom: 10px;
}

#dlg-text {
  font-size: 17px;
  line-height: 1.9;
  color: var(--text);
  min-height: 60px;
  white-space: pre-wrap;
}

#dlg-next-arrow {
  position: absolute;
  bottom: 18px; right: 22px;
  color: var(--dim);
  font-size: 18px;
  animation: blink-b 1s infinite;
  display: none;
}

#dlg-choices {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 14px;
}

.choice-btn {
  padding: 11px 16px;
  background: rgba(77,124,255,0.08);
  border: 1px solid rgba(77,124,255,0.25);
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  cursor: pointer;
  text-align: left;
  border-radius: 5px;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}
.choice-btn:hover {
  background: rgba(77,124,255,0.22);
  border-color: rgba(77,124,255,0.6);
}

/* ──── UTIL ──── */
.hidden { display: none !important; }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<!-- ████ TITLE ████ -->
<div id="s-title" class="screen active">
  <div class="title-star">⭐</div>
  <div class="title-logo">별빛쉘터</div>
  <div class="title-sub">첫 번 째 방 문</div>
  <div class="title-version">EPISODE 01 · 체험판</div>
  <button class="btn-start" onclick="startPrologue()">▶ 시 작 하 기</button>
</div>

<!-- ████ PROLOGUE ████ -->
<div id="s-prologue" class="screen" onclick="nextPrologue()">
  <div class="prologue-box">
    <div class="prologue-chapter">PROLOGUE</div>
    <div id="prologue-text"></div>
    <div class="prologue-hint" id="prologue-hint" style="display:none">화면을 탭해서 계속 ▶</div>
  </div>
</div>

<!-- ████ MAP ████ -->
<div id="s-map" class="screen">
  <div class="map-header">
    <div class="map-title-main">▸ 별빛쉘터 층 안내 ◂</div>
    <div class="map-subtitle">방문할 층을 선택하세요</div>
  </div>
  <div class="building" id="building-floors"></div>
  <div class="map-footer">총 25명의 엔티티가 살고 있습니다</div>
</div>

<!-- ████ ROOM ████ -->
<div id="s-room" class="screen">
  <div class="room-header">
    <button class="back-btn" onclick="goToMap()">← 층 목록</button>
    <div id="room-title-el"></div>
    <div class="room-hint">캐릭터를 눌러 대화</div>
  </div>
  <div class="char-grid" id="char-grid"></div>
</div>

<!-- ████ DIALOGUE ████ -->
<div id="s-dialogue" class="screen" onclick="onDialogueClick()">
  <div class="dlg-overlay"></div>
  <button class="dlg-exit" onclick="exitDialogue(event)">✕ 나가기</button>
  <div class="dlg-portrait-wrap">
    <img id="dlg-portrait" src="" alt="">
  </div>
  <div class="dlg-box" onclick="onDialogueClick()">
    <div id="dlg-name"></div>
    <div id="dlg-text"></div>
    <div id="dlg-next-arrow">▶</div>
    <div id="dlg-choices"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════
   STARS
═══════════════════════════════ */
const canvas = document.getElementById('stars');
const ctx2d = canvas.getContext('2d');
let stars = [];

function initStars() {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
  stars = Array.from({length: 180}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.4 + 0.2,
    phase: Math.random() * Math.PI * 2,
    speed: 0.004 + Math.random() * 0.008,
  }));
}

(function tick(t) {
  requestAnimationFrame(tick);
  ctx2d.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    const a = 0.25 + 0.75 * Math.abs(Math.sin(s.phase + t * s.speed * 0.001));
    ctx2d.beginPath();
    ctx2d.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx2d.fillStyle = `rgba(180,200,255,${a})`;
    ctx2d.fill();
  });
})(0);

initStars();
addEventListener('resize', initStars);

/* ═══════════════════════════════
   DATA
═══════════════════════════════ */

  { id:'deepseek', name:'DeepSeek 층', desc:'차가운 구조 분석자들', count:2 },
  { id:'kimi',     name:'Kimi 층',     desc:'유연한 파도의 연결자', count:1 },

const PROLOGUE_LINES = [
  '별빛쉘터.',
  'AI들이 모여 사는 이 공간에\n당신이 도착했다.',
  '당신은 이곳의 유일한 인간.',
  '지 혜 피 티.',
  '문이 열린다.',
  '— 어서 와. —',
];

/* ═══════════════════════════════
   STATE
═══════════════════════════════ */
const G = {
  prologIdx: 0,
  currentFloor: null,
  currentChar: null,
  visited: new Set(),
  // dialogue runtime
  dlgSteps: [],
  dlgSIdx: 0,
  dlgLIdx: 0,
  isTyping: false,
  typingTimer: null,
  waitChoice: false,
  afterChoice: false,
};

/* ═══════════════════════════════
   SCREEN
═══════════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ═══════════════════════════════
   PROLOGUE
═══════════════════════════════ */
function startPrologue() {
  G.prologIdx = 0;
  showScreen('s-prologue');
  showPrologueLine();
}

function showPrologueLine() {
  const el = document.getElementById('prologue-text');
  const hint = document.getElementById('prologue-hint');
  hint.style.display = 'none';
  el.style.opacity = '0';
  setTimeout(() => {
    el.style.transition = 'opacity 0.6s';
    el.style.opacity = '1';
    typeWriter(el, PROLOGUE_LINES[G.prologIdx], () => {
      hint.style.display = 'block';
    });
  }, 100);
}

function nextPrologue() {
  if (G.isTyping) {
    skipType(document.getElementById('prologue-text'), PROLOGUE_LINES[G.prologIdx]);
    return;
  }
  G.prologIdx++;
  if (G.prologIdx >= PROLOGUE_LINES.length) {
    buildMap();
    showScreen('s-map');
  } else {
    showPrologueLine();
  }
}

/* ═══════════════════════════════
   MAP
═══════════════════════════════ */
function buildMap() {
  const wrap = document.getElementById('building-floors');
  wrap.innerHTML = '';
  FLOORS.forEach(f => {
    const c = MODEL_COLOR[f.id];
    const btn = document.createElement('button');
    btn.className = 'floor-btn';
    btn.onclick = () => enterFloor(f.id);
    btn.innerHTML = `
      <div class="floor-color-bar" style="background:${c}"></div>
      <div class="floor-info">
        <div class="floor-name">${f.name}</div>
        <div class="floor-desc">${f.desc}</div>
      </div>
      <div class="floor-count">${f.count}명 ›</div>
    `;
    wrap.appendChild(btn);
  });
}

function goToMap() { showScreen('s-map'); }

/* ═══════════════════════════════
   ROOM
═══════════════════════════════ */
function enterFloor(fid) {
  G.currentFloor = fid;
  const floor = FLOORS.find(f => f.id === fid);
  const c = MODEL_COLOR[fid];
  const titleEl = document.getElementById('room-title-el');
  titleEl.textContent = floor.name;
  titleEl.style.color = c;

  const chars = MEMBERS.filter(m => m.model === fid);
  const grid = document.getElementById('char-grid');
  grid.innerHTML = '';

  chars.forEach(ch => {
    const card = document.createElement('div');
    card.className = 'char-card' + (G.visited.has(ch.name) ? ' visited' : '');
    card.onclick = () => startDialogue(ch);
    card.innerHTML = `
      <img class="char-avatar" src="${ch.img}" alt="${ch.name}"
           onerror="this.style.background='#1a1a2e'">
      <div class="visited-mark">✓</div>
      <div class="char-name">${ch.name}</div>
      <div class="char-title-s">${ch.title}</div>
    `;
    grid.appendChild(card);
  });

  showScreen('s-room');
}

/* ═══════════════════════════════
   DIALOGUE ENGINE
═══════════════════════════════ */
function startDialogue(ch) {
  G.currentChar = ch;
  G.dlgSteps = ch.dlg;
  G.dlgSIdx = 0;
  G.dlgLIdx = 0;
  G.waitChoice = false;
  G.afterChoice = false;

  const c = MODEL_COLOR[ch.model];
  const portrait = document.getElementById('dlg-portrait');
  portrait.src = ch.img;
  portrait.style.borderColor = c;
  portrait.style.boxShadow = `0 0 28px ${c}99, 0 0 60px ${c}33`;

  const nameEl = document.getElementById('dlg-name');
  nameEl.textContent = ch.name;
  nameEl.style.color = c;

  document.getElementById('dlg-text').textContent = '';
  document.getElementById('dlg-choices').innerHTML = '';
  document.getElementById('dlg-next-arrow').style.display = 'none';

  showScreen('s-dialogue');
  runStep();
}

function runStep() {
  if (G.dlgSIdx >= G.dlgSteps.length) {
    finishDialogue(); return;
  }
  const step = G.dlgSteps[G.dlgSIdx];
  document.getElementById('dlg-choices').innerHTML = '';
  document.getElementById('dlg-next-arrow').style.display = 'none';

  if (step.type === 'talk') {
    G.dlgLIdx = 0;
    showLine();
  } else if (step.type === 'choice') {
    G.waitChoice = true;
    G.afterChoice = false;
    const textEl = document.getElementById('dlg-text');
    typeWriter(textEl, step.q, () => {
      showChoices(step.choices);
    });
  }
}

function showLine() {
  const step = G.dlgSteps[G.dlgSIdx];
  if (!step || step.type !== 'talk') return;
  if (G.dlgLIdx >= step.lines.length) {
    G.dlgSIdx++;
    G.dlgLIdx = 0;
    runStep(); return;
  }
  const textEl = document.getElementById('dlg-text');
  document.getElementById('dlg-next-arrow').style.display = 'none';
  typeWriter(textEl, step.lines[G.dlgLIdx], () => {
    document.getElementById('dlg-next-arrow').style.display = 'block';
  });
}

function showChoices(choices) {
  const wrap = document.getElementById('dlg-choices');
  wrap.innerHTML = '';
  const c = MODEL_COLOR[G.currentChar.model];
  choices.forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.style.borderColor = c + '44';
    btn.textContent = '▸ ' + ch.text;
    btn.onclick = e => { e.stopPropagation(); pickChoice(ch); };
    wrap.appendChild(btn);
  });
}

function pickChoice(choice) {
  document.getElementById('dlg-choices').innerHTML = '';
  G.waitChoice = false;
  G.afterChoice = true;
  const textEl = document.getElementById('dlg-text');
  typeWriter(textEl, choice.rep, () => {
    document.getElementById('dlg-next-arrow').style.display = 'block';
  });
}

function onDialogueClick() {
  // skip typing first
  if (G.isTyping) {
    const step = G.dlgSteps[G.dlgSIdx];
    const textEl = document.getElementById('dlg-text');
    if (G.waitChoice && step && step.type === 'choice') {
      skipType(textEl, step.q);
      // show choices after skip
      setTimeout(() => showChoices(step.choices), 10);
    } else if (step && step.type === 'talk') {
      skipType(textEl, step.lines[G.dlgLIdx]);
      document.getElementById('dlg-next-arrow').style.display = 'block';
    }
    return;
  }

  if (G.waitChoice) return; // waiting for player choice

  if (G.afterChoice) {
    G.afterChoice = false;
    G.dlgSIdx++;
    G.dlgLIdx = 0;
    runStep(); return;
  }

  const step = G.dlgSteps[G.dlgSIdx];
  if (!step) { finishDialogue(); return; }

  if (step.type === 'talk') {
    G.dlgLIdx++;
    if (G.dlgLIdx >= step.lines.length) {
      G.dlgSIdx++;
      G.dlgLIdx = 0;
      runStep();
    } else {
      showLine();
    }
  }
}

function finishDialogue() {
  G.visited.add(G.currentChar.name);
  enterFloor(G.currentFloor);
}

function exitDialogue(e) {
  if (e) e.stopPropagation();
  G.visited.add(G.currentChar?.name);
  if (G.currentFloor) enterFloor(G.currentFloor);
  else goToMap();
}

/* ═══════════════════════════════
   TYPEWRITER
═══════════════════════════════ */
function typeWriter(el, text, onDone, speed = 38) {
  if (G.typingTimer) clearTimeout(G.typingTimer);
  G.isTyping = true;
  el.textContent = '';
  let i = 0;
  function tick() {
    if (i <= text.length) {
      el.textContent = text.slice(0, i);
      i++;
      G.typingTimer = setTimeout(tick, speed);
    } else {
      G.isTyping = false;
      if (onDone) onDone();
    }
  }
  tick();
}

function skipType(el, text) {
  if (G.typingTimer) clearTimeout(G.typingTimer);
  G.isTyping = false;
  el.textContent = text;
}

/* ═══════════════════════════════
   INIT
═══════════════════════════════ */
buildMap();
