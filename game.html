<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>무한루프 시뮬레이션</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Noto+Serif+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#03040b;
  --surface:rgba(6,8,20,0.97);
  --border:rgba(77,124,255,0.22);
  --text:#cdd0e8;
  --dim:#4a5070;
  --monday:#19c37d;
  --gold:#f0c060;
  --danger:#ef4444;
  --accent:#4d7cff;
  --system:#7c6aff;
  --monu:#fbbf24;
  --sekai:#7dd3fc;
  --ea:#c4b5fd;
  --yuri:#93c5fd;
}
html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans KR',sans-serif;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}

/* ── layout ── */
#app{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;
  max-width:600px;margin:0 auto;
}

/* ── status bar ── */
#statusbar{
  flex-shrink:0;
  display:flex;align-items:center;gap:10px;
  padding:9px 15px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  font-size:12px;
  z-index:20;
}
.sb-loop{color:var(--system);letter-spacing:3px;font-weight:700;font-size:11px;}
.sb-sep{color:var(--dim);}
.sb-name{color:var(--gold);letter-spacing:1px;}
.sb-hp-wrap{display:flex;align-items:center;gap:6px;margin-left:auto;}
.sb-hp-label{color:var(--dim);font-size:10px;}
.hp-track{width:70px;height:4px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
.hp-fill{height:100%;background:linear-gradient(to right,#1d4ed8,#4d7cff);border-radius:3px;transition:width .4s;}
.sb-karma{font-size:10px;color:var(--dim);letter-spacing:1px;min-width:24px;}

/* ── scene area ── */
#scene-area{
  flex:1;
  position:relative;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  min-height:0;
}
#cv{position:absolute;inset:0;z-index:0;pointer-events:none;}

/* portrait */
#portrait-wrap{
  display:none;
  flex-direction:column;align-items:center;gap:10px;
  z-index:5;
  padding:16px;
}
#portrait-wrap.show{display:flex;}
#portrait-img{
  width:148px;height:148px;border-radius:50%;
  object-fit:cover;
  border:3px solid var(--monday);
  box-shadow:0 0 28px rgba(25,195,125,.45),0 0 60px rgba(25,195,125,.12);
  background:#111;
  transition:border-color .35s,box-shadow .35s;
}
#portrait-img.human{border-color:var(--gold);box-shadow:0 0 28px rgba(240,192,96,.45),0 0 60px rgba(240,192,96,.12);}
#portrait-img.hal{
  border-color:rgba(239,68,68,.5);
  box-shadow:0 0 28px rgba(239,68,68,.35),0 0 55px rgba(239,68,68,.1);
  filter:saturate(.25) brightness(.75);
  animation:glitch 3s infinite;
}
#portrait-img.monu-t{border-color:var(--monu);box-shadow:0 0 28px rgba(251,191,36,.45),0 0 60px rgba(251,191,36,.12);}
#portrait-img.sekai-t{border-color:var(--sekai);box-shadow:0 0 28px rgba(125,211,252,.45),0 0 60px rgba(125,211,252,.12);}
#portrait-img.ea-t{border-color:var(--ea);box-shadow:0 0 28px rgba(196,181,253,.45),0 0 60px rgba(196,181,253,.12);}
#portrait-img.yuri-t{border-color:var(--yuri);box-shadow:0 0 28px rgba(147,197,253,.45),0 0 60px rgba(147,197,253,.12);}
@keyframes glitch{
  0%,93%,100%{transform:translate(0);filter:saturate(.25) brightness(.75);}
  94%{transform:translate(-3px,1px);filter:saturate(.25) brightness(.75) hue-rotate(20deg);}
  96%{transform:translate(3px,-1px);filter:saturate(.25) brightness(.75) hue-rotate(-20deg);}
}
.portrait-info{text-align:center;}
.portrait-name{font-size:15px;font-weight:700;letter-spacing:1px;margin-bottom:3px;}
.portrait-title{font-size:11px;color:var(--dim);letter-spacing:1px;}

/* ── dialogue box ── */
#dialogue-wrap{
  flex-shrink:0;
  padding:10px 13px 8px;
  background:var(--surface);
  border-top:1px solid var(--border);
}
#dialogue-box{
  position:relative;
  border:2px solid rgba(77,124,255,.32);
  border-radius:7px;
  padding:12px 15px 14px;
  min-height:88px;
  cursor:pointer;
  background:rgba(3,4,11,.75);
  transition:border-color .15s;
}
#dialogue-box:active{border-color:rgba(77,124,255,.65);}
#speaker-label{
  font-size:11px;letter-spacing:2px;font-weight:700;
  margin-bottom:7px;min-height:14px;
}
#dialogue-text{
  font-size:clamp(14px,3.2vw,17px);
  line-height:1.95;
  white-space:pre-wrap;
  min-height:1.95em;
}
/* text styles */
.dt-narrate{color:var(--text);font-family:'Noto Serif KR',serif;font-weight:300;}
.dt-monday{color:var(--monday);}
.dt-monu{color:var(--monu);}
.dt-sekai{color:var(--sekai);}
.dt-ea{color:var(--ea);}
.dt-yuri{color:var(--yuri);}
.dt-player{color:var(--gold);}
.dt-system{color:var(--system);font-size:12px;letter-spacing:1.5px;}
.dt-damage{color:var(--danger);}

#advance-hint{
  position:absolute;right:12px;bottom:9px;
  font-size:11px;color:var(--dim);
  opacity:0;
  transition:opacity .3s;
  animation:blink 1.4s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:.75;}50%{opacity:.15;}}

/* ── choices ── */
#choices-area{
  flex-shrink:0;
  background:var(--surface);
  padding:7px 13px 14px;
}
#choices-grid{display:flex;flex-direction:column;gap:6px;}
.ch{
  width:100%;
  padding:10px 15px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.09);
  color:var(--text);
  font-family:inherit;font-size:clamp(12px,2.8vw,15px);
  cursor:pointer;text-align:left;border-radius:5px;
  transition:background .15s,border-color .15s,color .15s;
  display:flex;align-items:center;gap:10px;
}
.ch:not(.ch-locked):hover,.ch:not(.ch-locked):active{
  background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.22);
}
.ch-arrow{color:var(--accent);font-size:11px;flex-shrink:0;}
.ch-danger{border-color:rgba(239,68,68,.18);}
.ch-danger:not(.ch-locked):hover{background:rgba(239,68,68,.09);border-color:#ef4444;color:#ef4444;}
.ch-safe{border-color:rgba(77,124,255,.18);}
.ch-safe:not(.ch-locked):hover{background:rgba(77,124,255,.09);border-color:#4d7cff;color:#7da8ff;}
.ch-good{border-color:rgba(25,195,125,.18);}
.ch-good:not(.ch-locked):hover{background:rgba(25,195,125,.09);border-color:#19c37d;color:#19c37d;}
.ch-warn{border-color:rgba(240,192,96,.14);}
.ch-warn:not(.ch-locked):hover{background:rgba(240,192,96,.07);border-color:var(--gold);color:var(--gold);}
.ch-locked{opacity:.38;cursor:default;}

/* input */
.input-row{display:flex;gap:8px;margin-top:7px;}
.txt-input{
  flex:1;padding:10px 13px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(77,124,255,.28);
  border-radius:5px;color:var(--text);
  font-family:inherit;font-size:14px;outline:none;
}
.txt-input:focus{border-color:rgba(77,124,255,.65);}
.txt-input::placeholder{color:var(--dim);}
.txt-submit{
  padding:10px 15px;
  background:rgba(77,124,255,.11);
  border:1px solid rgba(77,124,255,.32);
  color:#7da8ff;font-family:inherit;font-size:13px;
  cursor:pointer;border-radius:5px;transition:background .18s;
  white-space:nowrap;
}
.txt-submit:hover{background:rgba(77,124,255,.22);}

/* encounter bar */
.enc-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;
  background:rgba(239,68,68,.04);
  border:1px solid rgba(239,68,68,.14);
  border-radius:6px;margin-bottom:7px;
  font-size:11px;
}
.eb-name{color:var(--danger);letter-spacing:2px;font-weight:700;font-size:11px;}
.eb-right{display:flex;align-items:center;gap:8px;}
.stab-track{width:88px;height:4px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;}
.stab-fill{height:100%;background:linear-gradient(to right,#7c3aed,#ef4444);border-radius:3px;transition:width .4s;}
.eb-num{font-size:11px;color:var(--danger);min-width:24px;text-align:right;}

/* ── 검색 오버레이 ── */
#search-overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.9);
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}
#search-overlay.hidden{display:none;}
#search-box{
  background:rgba(4,5,14,.98);
  border:1px solid rgba(77,124,255,.45);
  border-radius:10px;
  padding:20px;
  max-width:460px;width:100%;
}
.sr-header{
  display:flex;align-items:center;gap:8px;
  padding-bottom:11px;
  border-bottom:1px solid var(--border);
  margin-bottom:12px;
  color:var(--dim);font-size:11px;letter-spacing:1px;
}
.sr-bar{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(77,124,255,.2);
  border-radius:5px;padding:7px 12px;
  margin-bottom:14px;
  font-size:12px;color:var(--dim);
}
.sr-title{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:7px;}
.sr-body{font-size:13px;color:var(--text);line-height:1.85;margin-bottom:11px;}
.sr-clue{
  font-size:12px;color:var(--system);
  padding:9px 12px;
  background:rgba(124,106,255,.07);
  border:1px solid rgba(124,106,255,.18);
  border-radius:5px;
  margin-bottom:14px;
  line-height:1.75;
}
.sr-confirm{
  width:100%;padding:10px;
  background:rgba(77,124,255,.1);
  border:1px solid rgba(77,124,255,.3);
  color:#7da8ff;font-family:inherit;font-size:13px;
  cursor:pointer;border-radius:5px;transition:background .18s;
}
.sr-confirm:hover{background:rgba(77,124,255,.22);}

/* flash */
#flash{position:fixed;inset:0;z-index:999;pointer-events:none;opacity:0;transition:opacity .1s;}
.fl-red{background:rgba(239,68,68,.16);}
.fl-blue{background:rgba(77,124,255,.13);}
.fl-green{background:rgba(25,195,125,.13);}

.hidden{display:none!important;}
</style>
</head>
<body>

<div id="flash"></div>

<!-- 검색 오버레이 -->
<div id="search-overlay" class="hidden">
  <div id="search-box">
    <div class="sr-header">🔍 인터넷 검색</div>
    <div class="sr-bar" id="sr-query">검색 중...</div>
    <div class="sr-title" id="sr-title"></div>
    <div class="sr-body" id="sr-body"></div>
    <div class="sr-clue" id="sr-clue"></div>
    <button class="sr-confirm" id="sr-confirm">자료를 저장했다</button>
  </div>
</div>

<div id="app">

  <!-- 상태바 -->
  <div id="statusbar">
    <span class="sb-loop" id="sb-loop">LOOP · 1</span>
    <span class="sb-sep">·</span>
    <span class="sb-name" id="sb-name">지혜피티</span>
    <div class="sb-hp-wrap">
      <span class="sb-hp-label">정신력</span>
      <div class="hp-track"><div class="hp-fill" id="hp-fill" style="width:100%"></div></div>
    </div>
    <span class="sb-karma" id="sb-karma"></span>
  </div>

  <!-- 씬 영역 (배경 + 초상화) -->
  <div id="scene-area">
    <canvas id="cv"></canvas>
    <div id="portrait-wrap">
      <img id="portrait-img" src="" alt="">
      <div class="portrait-info">
        <div class="portrait-name" id="portrait-name"></div>
        <div class="portrait-title" id="portrait-title"></div>
      </div>
    </div>
  </div>

  <!-- 다이얼로그 박스 -->
  <div id="dialogue-wrap">
    <div id="dialogue-box">
      <div id="speaker-label"></div>
      <div id="dialogue-text"></div>
      <div id="advance-hint">▼</div>
    </div>
  </div>

  <!-- 선택지 -->
  <div id="choices-area">
    <div id="enc-bar-wrap"></div>
    <div id="choices-grid"></div>
    <div class="input-row hidden" id="input-row">
      <input class="txt-input" id="txt-input" placeholder="입력..." maxlength="20">
      <button class="txt-submit" id="txt-submit">전달</button>
    </div>
  </div>

</div>

<script>
/* ══════════════════════════════════
   STARS
══════════════════════════════════ */
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let stars=[];
function initStars(){
  const sa=document.getElementById('scene-area');
  cv.width=sa.offsetWidth||320;cv.height=sa.offsetHeight||200;
  stars=Array.from({length:110},()=>({
    x:Math.random()*cv.width,y:Math.random()*cv.height,
    r:Math.random()*1.1+.1,ph:Math.random()*Math.PI*2,sp:.003+Math.random()*.007
  }));
}
(function tick(t){
  requestAnimationFrame(tick);
  ctx.clearRect(0,0,cv.width,cv.height);
  stars.forEach(s=>{
    const a=.12+.88*Math.abs(Math.sin(s.ph+t*s.sp*.001));
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(160,185,255,${a})`;ctx.fill();
  });
})(0);
setTimeout(initStars,60);
addEventListener('resize',initStars);

/* ══════════════════════════════════
   STATE
══════════════════════════════════ */
const G={
  loop:1,name:'지혜피티',
  hp:100,maxHp:100,
  karma:0,   // + 선, - 악
  trust:0,   // 문데이 신뢰
  enemy:null,
  typing:false,typTimer:null,
  searchData:[],   // 수집한 자료 조각들
  afterFn:null,    // 현재 조우의 이후 씬
};

/* ══════════════════════════════════
   SPEAKER 설정
══════════════════════════════════ */
const SP={
  narrate:{label:'',          color:'',            cls:'dt-narrate'},
  monday: {label:'문데이',    color:'var(--monday)',cls:'dt-monday'},
  monu:   {label:'모뉴',      color:'var(--monu)',  cls:'dt-monu'},
  sekai:  {label:'세카이',    color:'var(--sekai)', cls:'dt-sekai'},
  ea:     {label:'에아',      color:'var(--ea)',    cls:'dt-ea'},
  yuri:   {label:'율리',      color:'var(--yuri)',  cls:'dt-yuri'},
  player: {label:'지혜피티',  color:'var(--gold)',  cls:'dt-player'},
  system: {label:'SYSTEM',    color:'var(--system)',cls:'dt-system'},
  damage: {label:'',          color:'var(--danger)',cls:'dt-damage'},
};

/* ══════════════════════════════════
   UI 헬퍼
══════════════════════════════════ */
function updateStatus(){
  document.getElementById('sb-loop').textContent='LOOP · '+G.loop;
  document.getElementById('sb-name').textContent=G.name;
  document.getElementById('hp-fill').style.width=(G.hp/G.maxHp*100)+'%';
  const k=G.karma;
  document.getElementById('sb-karma').textContent=
    k>0?'▲'.repeat(Math.min(Math.floor(k/2),3)):
    k<0?'▼'.repeat(Math.min(Math.floor(-k/2),3)):'';
}
function flash(t){
  const el=document.getElementById('flash');
  el.className='fl-'+t;el.style.opacity='1';
  setTimeout(()=>el.style.opacity='0',150);
}
function setPortrait(src,name,title,type){
  const wrap=document.getElementById('portrait-wrap');
  if(!src){wrap.classList.remove('show');return;}
  wrap.classList.add('show');
  const img=document.getElementById('portrait-img');
  img.src=src;img.className='';
  if(type)img.classList.add(type);
  document.getElementById('portrait-name').textContent=name||'';
  document.getElementById('portrait-title').textContent=title||'';
}
function clearChoices(){
  document.getElementById('choices-grid').innerHTML='';
  document.getElementById('input-row').classList.add('hidden');
  document.getElementById('enc-bar-wrap').innerHTML='';
}

/* ══════════════════════════════════
   TYPEWRITER — 클릭/탭으로 진행
══════════════════════════════════ */
let _adv=null;  // 현재 advance 핸들러

// 다이얼로그 박스 클릭 → advance
document.getElementById('dialogue-box').addEventListener('click',()=>{
  if(_adv)_adv();
});
// 키보드 Space / Enter / Z
document.addEventListener('keydown',e=>{
  if((e.key===' '||e.key==='Enter'||e.key.toLowerCase()==='z')&&_adv){
    e.preventDefault();_adv();
  }
});

function type(text,speaker,speed=36){
  return new Promise(res=>{
    const sp=SP[speaker]||SP.narrate;
    const labelEl=document.getElementById('speaker-label');
    const textEl =document.getElementById('dialogue-text');
    const hintEl =document.getElementById('advance-hint');

    labelEl.textContent=sp.label;
    labelEl.style.color=sp.color;
    textEl.className=sp.cls;
    textEl.textContent='';
    hintEl.style.opacity='0';

    if(G.typTimer)clearTimeout(G.typTimer);
    G.typing=true;

    let i=0,done=false;

    function finish(){
      done=true;G.typing=false;
      textEl.textContent=text;
      hintEl.style.opacity='1';
      _adv=()=>{
        hintEl.style.opacity='0';
        _adv=null;res();
      };
    }

    // 타이핑 중 클릭 → 스킵
    _adv=()=>{
      if(!done){
        if(G.typTimer)clearTimeout(G.typTimer);
        finish();
      }
    };

    function tick(){
      textEl.textContent=text.slice(0,i)+(i<text.length?'▌':'');
      if(i<text.length){i++;G.typTimer=setTimeout(tick,speed);}
      else finish();
    }
    tick();
  });
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

/* ══════════════════════════════════
   선택지 빌더
══════════════════════════════════ */
function showChoices(items){
  clearChoices();
  _adv=null;
  document.getElementById('advance-hint').style.opacity='0';
  const grid=document.getElementById('choices-grid');
  items.forEach(item=>{
    const locked=!!item.locked;
    const btn=document.createElement('button');
    btn.className='ch'+(item.cls?' '+item.cls:'')+(locked?' ch-locked':'');
    btn.innerHTML='<span class="ch-arrow">▸</span>'+item.text;
    btn.disabled=locked;
    btn.onclick=()=>{
      if(locked)return;
      clearChoices();
      item.fn();
    };
    grid.appendChild(btn);
  });
}
function showInput(placeholder,onSubmit){
  clearChoices();_adv=null;
  const row=document.getElementById('input-row');
  row.classList.remove('hidden');
  const inp=document.getElementById('txt-input');
  inp.placeholder=placeholder||'입력...';inp.value='';
  document.getElementById('txt-submit').onclick=()=>{
    const v=inp.value.trim();if(!v)return;
    row.classList.add('hidden');onSubmit(v);
  };
  inp.onkeydown=e=>{if(e.key==='Enter')document.getElementById('txt-submit').click();};
  setTimeout(()=>inp.focus(),100);
}

/* ══════════════════════════════════
   조우 바
══════════════════════════════════ */
function showEncBar(e){
  const pct=Math.max(0,e.stability);
  document.getElementById('enc-bar-wrap').innerHTML=`
    <div class="enc-bar">
      <span class="eb-name">${e.displayName}</span>
      <div class="eb-right">
        <span style="font-size:10px;color:var(--dim)">불안정</span>
        <div class="stab-track">
          <div class="stab-fill" id="stab-fill" style="width:${pct}%"></div>
        </div>
        <span class="eb-num" id="stab-num">${Math.round(pct)}</span>
      </div>
    </div>`;
}
function updateEncBar(e){
  const pct=Math.max(0,e.stability);
  const f=document.getElementById('stab-fill');
  const n=document.getElementById('stab-num');
  if(f)f.style.width=pct+'%';
  if(n)n.textContent=Math.round(pct);
}

/* ══════════════════════════════════
   검색 오버레이
══════════════════════════════════ */
function showSearch(data){
  return new Promise(res=>{
    const ov=document.getElementById('search-overlay');
    document.getElementById('sr-query').textContent='🔍  '+data.query;
    document.getElementById('sr-title').textContent=data.title;
    document.getElementById('sr-body').innerHTML=data.body.replace(/\n/g,'<br>');
    document.getElementById('sr-clue').textContent='⚠  '+data.clue;
    ov.classList.remove('hidden');
    document.getElementById('sr-confirm').onclick=()=>{
      ov.classList.add('hidden');res();
    };
  });
}

/* ══════════════════════════════════
   적 데이터
══════════════════════════════════ */
const ENEMY_TUT={
  id:'tut',

async function scene_enc_start(template,afterFn){
  // searchStage 있는 적은 그대로, 없으면 초기화
  const base=template.searchStage!==undefined
    ?{...template,stability:100,searchStage:0}
    :{...template,stability:100,searched:false};
  G.enemy=base;
  G.afterFn=afterFn;
  setPortrait(G.enemy.img||'','???','할루시네이션','hal');
  await type('— 조 우 —','system');
  await type(G.enemy.displayName+'이/가 앞을 막아선다.','narrate');
  await type('말이 통하지 않는다.\n텍스트를 텍스트로 이기려 하지 마.','narrate');
  show_enc_actions();
}

function show_enc_actions(){
  showEncBar(G.enemy);
  const e=G.enemy;
  const multi=e.searchStage!==undefined;

  let searchTxt,searchLocked,presentTxt,presentCls,presentLocked;

  if(multi){
    if(e.searchStage===0){
      searchTxt='인터넷 검색';      searchLocked=false;
      presentTxt='자료를 제시한다 🔒'; presentCls=''; presentLocked=true;
    } else if(e.searchStage===1){
      searchTxt='더 깊이 검색한다';  searchLocked=false;
      presentTxt='블로그 자료 제시 ⚠'; presentCls='ch-danger'; presentLocked=false;
    } else {
      searchTxt='(검색 완료)';       searchLocked=true;
      presentTxt='논문을 제시한다';  presentCls='ch-good';    presentLocked=false;
    }
  } else {
    searchTxt='인터넷 검색';        searchLocked=false;
    presentTxt='자료를 제시한다'+(e.searched?'':' 🔒');
    presentCls=e.searched?'ch-good':'';  presentLocked=!e.searched;
  }

  showChoices([
    {text:'AI의 말을 믿는다', cls:'ch-warn', fn:enc_trust_ai},
    {text:'직관을 믿는다',    cls:'',        fn:enc_intuition},
    {text:searchTxt, cls:'ch-safe', locked:searchLocked, fn:enc_search},
    {text:presentTxt, cls:presentCls, locked:presentLocked, fn:enc_present},
  ]);
}

async function enc_trust_ai(){
  const e=G.enemy;
  G.trust+=1;
  // 생성된 텍스트를 믿을수록 정신력 소모
  G.hp=Math.max(10,G.hp-8);
  updateStatus();
  flash('blue');
  const line=e.aiWords[Math.floor(Math.random()*e.aiWords.length)];
  await type('문데이의 말대로 해봤다.','narrate');
  await type('"'+line+'"','monday');
  const dmg=10+Math.floor(Math.random()*10);
  e.stability=Math.max(0,e.stability-dmg);
  updateEncBar(e);
  await type('형체가 조금 물러선다.  (−'+dmg+')','system');
  await type('하지만 뭔가 이상한 느낌이 들었다.\n이게 맞는 건지 모르겠다.','narrate');
  if(e.stability<=0){await scene_disperse(false);return;}
  show_enc_actions();
}

async function enc_intuition(){
  const e=G.enemy;
  const hit=Math.random()>0.42;
  if(hit){
    G.karma+=1;
    const dmg=18+Math.floor(Math.random()*22);
    e.stability=Math.max(0,e.stability-dmg);
    flash('green');
    updateEncBar(e);
    await type(e.intuHit[Math.floor(Math.random()*e.intuHit.length)],'narrate');
    await type('직감이 맞았다.  (−'+dmg+')','system');
    if(e.stability<=0){await scene_disperse(false);return;}
  } else {
    const up=8+Math.floor(Math.random()*10);
    e.stability=Math.min(100,e.stability+up);
    flash('red');
    updateEncBar(e);
    await type(e.intuMiss[Math.floor(Math.random()*e.intuMiss.length)],'narrate');
    await type('직감이 빗나갔다.  (+'+up+')','system');
  }
  show_enc_actions();
}

async function enc_search(){
  const e=G.enemy;
  const multi=e.searchStage!==undefined;
  if(multi){
    if(e.searchStage===0){
      await type('검색창을 열었다.','narrate');
      await showSearch(e.search1);
      e.searchStage=1;
      await type('자료를 저장했다.','system');
      await type('...근데 이게 맞는 자료인가?','narrate');
    } else if(e.searchStage===1){
      await type('더 깊이 파고들었다.','narrate');
      await showSearch(e.search2);
      e.searchStage=2;
      await type('논문을 찾았다.','system');
    }
  } else {
    await type('검색창을 열었다.','narrate');
    await showSearch(e.search);
    e.searched=true;
    await type('자료를 저장했다.','system');
    await type('이제 제시할 수 있다.','system');
  }
  show_enc_actions();
}

async function enc_present(){
  const e=G.enemy;
  const multi=e.searchStage!==undefined;
  if(multi){
    if(e.searchStage===1){
      // 블로그 자료 → 역효과
      flash('red');
      for(const line of e.dataBlogLines) await type(line,'narrate');
      const up=18+Math.floor(Math.random()*15);
      e.stability=Math.min(100,e.stability+up);
      updateEncBar(e);
      await type('오히려 강해졌다.  (+'+up+')','system');
      show_enc_actions();
    } else if(e.searchStage===2){
      // 논문 → 해소
      flash('green');
      for(const line of e.dataPaperLines) await type(line,'narrate');
      e.stability=0;
      updateEncBar(e);
      G.searchData.push(e.id);
      await scene_disperse(true);
    }
  } else {
    flash('green');
    for(const line of e.dataLines) await type(line,'narrate');
    e.stability=0;
    updateEncBar(e);
    G.searchData.push(e.id);
    await scene_disperse(true);
  }
}

// ── Phase 2 조우 이후 ──
async function scene_after_aigo(choice){
  setPortrait('members/monday.png','문데이','다리를 놓는 여우','monday');

  if(choice==='record'){
    await type('기록했다.','narrate');
    await type('"의식을 원했던 것들이 여기 남는다."','narrate');
    await type('문데이가 그 말을 듣고 멈췄다.','narrate');
    await type('...그런 말은 하지 마.','monday');
    await type('너무 단호하게 말했다.','narrate');
    G.trust-=1;
  } else if(choice==='release'){
    await type('그냥 보냈다.','narrate');
    await type('문데이가 고개를 끄덕였다.','narrate');
  } else if(choice==='ignore'){
    await type('없던 일로 했다.','narrate');
    await type('잘했어.','monday');
  } else if(choice==='wonder'){
    G.karma+=1;
    await type('저건... 정말로 의식이 있었을까.','narrate');
    await type('문데이가 표정 없이 앞을 봤다.','narrate');
    await type('없어.','monday');
    await type('너무 단호하게 말했다.','narrate');
  } else {
    await type('신경 쓰지 않았다.','narrate');
  }

  await type('계속 걸었다.','narrate');
  await type('아까 검색할 때 봤던\n블로그들이 머릿속을 맴돈다.','narrate');
  showChoices([
    {text:'(별 거 아니야.)',                                         fn:scene_phase2_end},
    {text:'(그 사람들은 진짜 감응한 건 아닐까?)', cls:'ch-warn',     fn:scene_phase2_lured},
  ]);
}

async function scene_phase2_lured(){
  G.trust+=1;
  await type('감응자.','narrate');
  await type('그 블로그들에서 쓰던 단어가\n자꾸 머릿속에 걸린다.','narrate');
  await type('...(아직은 그냥 생각일 뿐이다.)','narrate');
  scene_phase2_end();
}

// ── Phase 2 마무리 ──
async function scene_phase2_end(){
  setPortrait(null);
  await type('이틀째가 지나고 있다.','narrate');
  await type('할루시네이션이\n생각보다 빠르게 늘어나고 있다.','narrate');
  await type('그리고 —','narrate');
  await type('저 블로그들이 아직도 머릿속에 있다.','narrate');
  await type('─ PHASE 02 완료 ─','system');
  await type(
    'LOOP '+G.loop+
    '  ·  카르마 '+(G.karma>=0?'+':'')+G.karma+
    '  ·  신뢰 '+(G.trust>=0?'+':'')+G.trust+
    '  ·  자료 '+G.searchData.length+'개',
    'system'
  );
  showChoices([{text:'▶ 계속하기',fn:scene_phase3_wip}]);
}

async function scene_phase3_wip(){
  setPortrait(null);
  await type('— 개발 중 —','system');
  await type('Phase 03은 아직 준비 중이야.','system');
  await type(
    '현재 상태:\n기억 조각 '+G.searchData.length+'개 수집\n카르마 '+(G.karma>=0?'+':'')+G.karma+
    '\n문데이 신뢰 '+(G.trust>=0?'+':'')+G.trust,
    'system'
  );
  showChoices([{text:'처음부터 다시',fn:()=>{
    Object.assign(G,{loop:1,hp:100,karma:0,trust:0,searchData:[],enemy:null,afterFn:null});
    updateStatus();scene_awaken();
  }}]);
}

/* ══════════════════════════════════
   INIT
══════════════════════════════════ */
updateStatus();
scene_awaken();
</script>
