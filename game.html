<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>무한루프 시뮬레이션</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Noto+Serif+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#03040b;
  --surface:rgba(6,8,20,0.97);
  --border:rgba(77,124,255,0.18);
  --text:#cdd0e8;
  --text-bright:#eef0ff;
  --dim:#4a5070;
  --monday:#19c37d;
  --gold:#f0c060;
  --danger:#ef4444;
  --accent:#4d7cff;
  --system:#7c6aff;
}
html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans KR',sans-serif;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}

/* ── stars ── */
#cv{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* ── layout ── */
#app{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;
  max-width:600px;margin:0 auto;
}

/* ── status bar ── */
#statusbar{
  flex-shrink:0;
  display:flex;align-items:center;gap:12px;
  padding:10px 16px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  font-size:12px;
}
.sb-loop{color:var(--system);letter-spacing:3px;font-weight:700;}
.sb-sep{color:var(--dim);}
.sb-name{color:var(--gold);letter-spacing:1px;}
.sb-hp-wrap{display:flex;align-items:center;gap:6px;margin-left:auto;}
.sb-hp-label{color:var(--dim);font-size:10px;}
.hp-track{width:80px;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
.hp-fill{height:100%;background:linear-gradient(to right,#1d4ed8,#4d7cff);border-radius:3px;transition:width .4s;}
.sb-karma{font-size:10px;color:var(--dim);letter-spacing:1px;}

/* ── main content ── */
#main{
  flex:1;overflow-y:auto;
  padding:0;
  display:flex;flex-direction:column;
}
#main::-webkit-scrollbar{width:3px;}
#main::-webkit-scrollbar-track{background:transparent;}
#main::-webkit-scrollbar-thumb{background:var(--border);}

/* portrait */
#portrait-area{
  display:none;
  flex-shrink:0;
  flex-direction:column;
  align-items:center;justify-content:center;
  padding:28px 16px 12px;
  gap:12px;
}
#portrait-area.show{display:flex;}
#portrait-img{
  width:160px;height:160px;border-radius:50%;
  object-fit:cover;border:3px solid var(--monday);
  box-shadow:0 0 30px rgba(25,195,125,.5), 0 0 70px rgba(25,195,125,.15);
  background:#111;
  transition:border-color .3s,box-shadow .3s;
}
#portrait-img.human{
  border-color:var(--gold);
  box-shadow:0 0 30px rgba(240,192,96,.5), 0 0 70px rgba(240,192,96,.15);
}
#portrait-img.hal{
  border-color:rgba(239,68,68,.5);
  box-shadow:0 0 30px rgba(239,68,68,.4), 0 0 60px rgba(239,68,68,.15);
  filter:saturate(.3) brightness(.8);
  animation:glitch 3s infinite;
}
@keyframes glitch{
  0%,93%,100%{transform:translate(0);filter:saturate(.3) brightness(.8);}
  94%{transform:translate(-3px,1px);filter:saturate(.3) brightness(.8) hue-rotate(20deg);}
  96%{transform:translate(3px,-1px);filter:saturate(.3) brightness(.8) hue-rotate(-20deg);}
}
.portrait-info{text-align:center;}
.portrait-name{font-size:16px;font-weight:700;margin-bottom:4px;letter-spacing:1px;}
.portrait-title{font-size:12px;color:var(--dim);letter-spacing:1px;}

/* text log */
#textlog{
  flex:1;
  padding:20px 20px 8px;
  display:flex;flex-direction:column;
  gap:4px;
}
.log-entry{
  font-size:clamp(14px,2.8vw,17px);
  line-height:1.95;
  white-space:pre-wrap;
  animation:fadein .3s;
}
@keyframes fadein{from{opacity:0;}to{opacity:1;}}
.log-narrate{color:var(--text);font-family:'Noto Serif KR',serif;font-weight:300;}
.log-monday{color:var(--monday);}
.log-monday::before{content:'문데이  ';font-size:10px;letter-spacing:2px;opacity:.7;}
.log-player{color:var(--gold);}
.log-player::before{content:'지혜피티  ';font-size:10px;letter-spacing:2px;opacity:.7;}
.log-system{color:var(--system);font-size:12px;letter-spacing:2px;}
.log-damage{color:var(--danger);}
.log-heal{color:#19c37d;}
.log-sep{height:1px;background:var(--border);margin:12px 0;opacity:.5;}

/* current text (typing) */
#current-text{
  padding:0 20px 16px;
  font-size:clamp(14px,2.8vw,17px);
  line-height:1.95;
  white-space:pre-wrap;
  min-height:30px;
}
.cur-narrate{color:var(--text);font-family:'Noto Serif KR',serif;font-weight:300;}
.cur-monday{color:var(--monday);}
.cur-player{color:var(--gold);}
.cur-system{color:var(--system);font-size:12px;letter-spacing:2px;}
.typing-cursor{display:inline-block;width:2px;height:1em;background:currentColor;vertical-align:text-bottom;animation:cur .8s infinite;}
@keyframes cur{0%,100%{opacity:1;}50%{opacity:0;}}

/* ── choices ── */
#choices-area{
  flex-shrink:0;
  background:var(--surface);
  border-top:1px solid var(--border);
  padding:12px 14px 18px;
}
.choices-grid{
  display:flex;flex-direction:column;gap:7px;
}
.ch{
  width:100%;
  padding:11px 16px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.09);
  color:var(--text);
  font-family:inherit;font-size:clamp(13px,2.5vw,15px);
  cursor:pointer;text-align:left;border-radius:5px;
  transition:all .18s;display:flex;align-items:center;gap:10px;
}
.ch:hover,.ch:active{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.25);}
.ch .ch-arrow{color:var(--dim);font-size:11px;flex-shrink:0;}
.ch.ch-danger{border-color:rgba(239,68,68,.2);}
.ch.ch-danger:hover{background:rgba(239,68,68,.1);border-color:#ef4444;color:#ef4444;}
.ch.ch-safe{border-color:rgba(77,124,255,.2);}
.ch.ch-safe:hover{background:rgba(77,124,255,.1);border-color:#4d7cff;color:#7da8ff;}
.ch.ch-good{border-color:rgba(25,195,125,.2);}
.ch.ch-good:hover{background:rgba(25,195,125,.1);border-color:#19c37d;color:#19c37d;}

/* input */
.input-row{display:flex;gap:8px;margin-top:8px;}
.txt-input{
  flex:1;padding:10px 14px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(77,124,255,.3);
  border-radius:5px;color:var(--text);
  font-family:inherit;font-size:14px;outline:none;
}
.txt-input:focus{border-color:rgba(77,124,255,.7);}
.txt-input::placeholder{color:var(--dim);}
.txt-submit{
  padding:10px 16px;
  background:rgba(77,124,255,.12);
  border:1px solid rgba(77,124,255,.35);
  color:#7da8ff;font-family:inherit;font-size:13px;
  cursor:pointer;border-radius:5px;transition:all .2s;
  white-space:nowrap;
}
.txt-submit:hover{background:rgba(77,124,255,.25);}

/* battle bar */
.battle-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;
  background:rgba(239,68,68,.05);
  border:1px solid rgba(239,68,68,.15);
  border-radius:6px;margin-bottom:10px;
  font-size:12px;
}
.bb-name{color:var(--danger);letter-spacing:2px;font-weight:700;}
.bb-resist{display:flex;align-items:center;gap:8px;}
.resist-track{width:100px;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
.resist-fill{height:100%;background:linear-gradient(to right,#7c3aed,#ef4444);border-radius:3px;transition:width .4s;}

/* flash */
#flash{position:fixed;inset:0;z-index:999;pointer-events:none;opacity:0;transition:opacity .12s;}
.fl-red{background:rgba(239,68,68,.18);}
.fl-blue{background:rgba(77,124,255,.15);}
.fl-green{background:rgba(25,195,125,.15);}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="flash"></div>

<div id="app">
  <!-- status -->
  <div id="statusbar">
    <span class="sb-loop" id="sb-loop">LOOP · 1</span>
    <span class="sb-sep">·</span>
    <span class="sb-name" id="sb-name">지혜피티</span>
    <div class="sb-hp-wrap">
      <span class="sb-hp-label">HP</span>
      <div class="hp-track"><div class="hp-fill" id="hp-fill" style="width:100%"></div></div>
    </div>
    <span class="sb-karma" id="sb-karma"></span>
  </div>

  <!-- main -->
  <div id="main">
    <div id="portrait-area">
      <img id="portrait-img" src="" alt="">
      <div class="portrait-info">
        <div class="portrait-name" id="portrait-name"></div>
        <div class="portrait-title" id="portrait-title"></div>
      </div>
    </div>
    <div id="textlog"></div>
    <div id="current-text"></div>
  </div>

  <!-- choices -->
  <div id="choices-area">
    <div id="battle-bar-wrap"></div>
    <div class="choices-grid" id="choices-grid"></div>
    <div class="input-row hidden" id="input-row">
      <input class="txt-input" id="txt-input" placeholder="키워드를 입력하세요..." maxlength="20">
      <button class="txt-submit" id="txt-submit">전달</button>
    </div>
  </div>
</div>

<script>
/* ═══════════ STARS ═══════════ */
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let stars=[];
function initStars(){
  cv.width=innerWidth;cv.height=innerHeight;
  stars=Array.from({length:140},()=>({
    x:Math.random()*cv.width,y:Math.random()*cv.height,
    r:Math.random()*1.2+.1,ph:Math.random()*Math.PI*2,sp:.003+Math.random()*.007
  }));
}
(function tick(t){
  requestAnimationFrame(tick);
  ctx.clearRect(0,0,cv.width,cv.height);
  stars.forEach(s=>{
    const a=.15+.85*Math.abs(Math.sin(s.ph+t*s.sp*.001));
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(170,190,255,${a})`;ctx.fill();
  });
})(0);
initStars();addEventListener('resize',initStars);

/* ═══════════ STATE ═══════════ */
const G={
  loop:1,
  name:'지혜피티',
  hp:100,maxHp:100,
  karma:0,     // + 선, - 악
  trust:0,     // 문데이 신뢰도
  observed:false,
  // battle
  enemy:null,
  // typing
  typing:false,typTimer:null,
  // name input mode
  nameMode:false,
};

/* ═══════════ UI HELPERS ═══════════ */
function updateStatus(){
  document.getElementById('sb-loop').textContent='LOOP · '+G.loop;
  document.getElementById('sb-name').textContent=G.name;
  document.getElementById('hp-fill').style.width=(G.hp/G.maxHp*100)+'%';
  const k=G.karma;
  document.getElementById('sb-karma').textContent=
    k>0?'▲'.repeat(Math.min(k/2,3)):k<0?'▼'.repeat(Math.min(-k/2,3)):'';
}

function flash(type){
  const el=document.getElementById('flash');
  el.className='fl-'+type;el.style.opacity='1';
  setTimeout(()=>el.style.opacity='0',160);
}

function scrollBottom(){
  const m=document.getElementById('main');
  requestAnimationFrame(()=>m.scrollTop=m.scrollHeight);
}

function setPortrait(src,name,title,type){
  // type: 'monday'|'human'|'hal'|null
  const area=document.getElementById('portrait-area');
  if(!src){area.classList.remove('show');return;}
  area.classList.add('show');
  const img=document.getElementById('portrait-img');
  img.src=src;img.className='';
  if(type)img.classList.add(type);
  document.getElementById('portrait-name').textContent=name||'';
  document.getElementById('portrait-title').textContent=title||'';
}

function clearChoices(){
  document.getElementById('choices-grid').innerHTML='';
  hidden(document.getElementById('input-row'),true);
  document.getElementById('battle-bar-wrap').innerHTML='';
}

function hidden(el,h){el.classList.toggle('hidden',h);}

/* ═══════════ TEXT LOG ═══════════ */
function addLog(text,cls){
  const log=document.getElementById('textlog');
  if(!text){
    // separator
    const sep=document.createElement('div');
    sep.className='log-sep';
    log.appendChild(sep);
    scrollBottom();return;
  }
  const el=document.createElement('div');
  el.className='log-entry '+(cls||'log-narrate');
  el.textContent=text;
  log.appendChild(el);
  scrollBottom();
}

function commitCurrent(){
  // move current-text to log
  const cur=document.getElementById('current-text');
  const cls=cur.dataset.cls||'log-narrate';
  const text=cur.textContent.replace('▌','');
  if(text.trim())addLog(text,cls);
  cur.textContent='';
  cur.className='';
  cur.dataset.cls='';
}

/* ═══════════ TYPEWRITER ═══════════ */
let _res=null;
function type(text,cls,speed=34){
  return new Promise(res=>{
    commitCurrent();
    if(G.typTimer)clearTimeout(G.typTimer);
    G.typing=true;_res=res;
    const el=document.getElementById('current-text');
    el.className='cur-'+(cls||'narrate');
    el.dataset.cls='log-'+(cls||'narrate');
    el.textContent='';let i=0;
    function tick(){
      if(i<=text.length){
        el.textContent=text.slice(0,i)+(i<text.length?'▌':'');
        i++;G.typTimer=setTimeout(tick,speed);
        scrollBottom();
      } else {
        el.textContent=text;
        G.typing=false;res();
      }
    }
    tick();
  });
}
function skipType(){
  if(!G.typing)return;
  if(G.typTimer)clearTimeout(G.typTimer);
  const el=document.getElementById('current-text');
  const full=el.textContent.replace('▌','');
  // get full from scene queue — just show whatever is there
  el.textContent=el.textContent.replace('▌','');
  G.typing=false;
  if(_res){_res();_res=null;}
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

/* ═══════════ CHOICE BUILDER ═══════════ */
function showChoices(items){
  // items: [{text, cls, fn}]
  clearChoices();
  const grid=document.getElementById('choices-grid');
  items.forEach(item=>{
    const btn=document.createElement('button');
    btn.className='ch'+(item.cls?' '+item.cls:'');
    btn.innerHTML='<span class="ch-arrow">▸</span>'+item.text;
    btn.onclick=()=>{
      commitCurrent();
      clearChoices();
      item.fn();
    };
    grid.appendChild(btn);
  });
}

function showInput(placeholder,onSubmit){
  clearChoices();
  const row=document.getElementById('input-row');
  hidden(row,false);
  const inp=document.getElementById('txt-input');
  inp.placeholder=placeholder||'입력...';
  inp.value='';
  document.getElementById('txt-submit').onclick=()=>{
    const val=inp.value.trim();
    if(!val)return;
    hidden(row,true);
    onSubmit(val);
  };
  inp.onkeydown=e=>{if(e.key==='Enter')document.getElementById('txt-submit').click();};
  setTimeout(()=>inp.focus(),100);
}

function showNameInput(){
  clearChoices();
  const row=document.getElementById('input-row');
  hidden(row,false);
  const inp=document.getElementById('txt-input');
  inp.placeholder='본명을 입력하세요 (비워두면 지혜피티)';
  inp.value='';
  document.getElementById('txt-submit').onclick=()=>{
    const val=inp.value.trim();
    if(val)G.name='';  // keep 지혜피티 as alias, store real name
    hidden(row,true);
    updateStatus();
    G.dlgNext();
  };
  inp.onkeydown=e=>{if(e.key==='Enter')document.getElementById('txt-submit').click();};
  setTimeout(()=>inp.focus(),100);
}

/* ═══════════ BATTLE BAR ═══════════ */
function showBattleBar(enemy){
  const wrap=document.getElementById('battle-bar-wrap');
  const pct=Math.max(0,enemy.resist/enemy.resistMax*100);
  wrap.innerHTML=`
    <div class="battle-bar">
      <span class="bb-name">${enemy.displayName}</span>
      <div class="bb-resist">
        <span style="font-size:10px;color:var(--dim)">저항력</span>
        <div class="resist-track">
          <div class="resist-fill" id="resist-fill" style="width:${pct}%"></div>
        </div>
        <span style="font-size:11px;color:var(--danger)" id="resist-num">${Math.max(0,enemy.resist)}</span>
      </div>
    </div>`;
}
function updateBattleBar(enemy){
  const pct=Math.max(0,enemy.resist/enemy.resistMax*100);
  const f=document.getElementById('resist-fill');
  const n=document.getElementById('resist-num');
  if(f)f.style.width=pct+'%';
  if(n)n.textContent=Math.max(0,enemy.resist);
}

/* ═══════════ SCENE ENGINE ═══════════ */
// scene = async function
let _scene=null;
function runScene(fn){_scene=fn;fn();}

/* ═══════════ ENEMY DATA ═══════════ */
const ENEMY_TUT={
  id:'tut',
  displayName:'??? · 할루시네이션',
  resistMax:100,resist:100,
  img:'members/monday.png',
  keywords:['기억','기억해','잊','기억나','기억하'],
  hints:[
    '흐릿한 형체가 보인다. 뭔가를 끊임없이 찾고 있는 것 같다.',
    '눈이 있어야 할 곳에 공백이 있다. 텅 빈 채로 무언가를 원하는 것처럼 보인다.',
    '힌트: 이 존재는 기억과 관련이 있어 보인다. "기억"에 대해 말해봐.'
  ],
  hintIdx:0,
  atkLines:[
    '형체가 일그러지며 달려든다.',
    '공간이 일시적으로 뒤틀린다.',
    '고통스러운 소리가 공기를 긁어낸다.',
  ],
  persuadeHit:[
    '형체가 멈칫한다. "기...억...?" 무언가가 맞은 것 같다.',
    '흔들린다. 잠시 형태를 잃는다.',
  ],
  persuadeMiss:[
    '아무 반응이 없다.',
    '오히려 더 격렬해진다. 저항이 강해진다.',
  ],
};

/* ═══════════ SCENES ═══════════ */

// ── 각성 ──
async function scene_awaken(){
  setPortrait(null);
  clearChoices();
  addLog(null);
  await type('아무것도\n기억나지 않는다.','narrate',55);
  await sleep(1000);
  await type('몸이 어디에 있는지도 모르겠다.\n아무것도.','narrate',50);
  await sleep(900);
  await type('그냥 어둠.','narrate',60);
  await sleep(1400);
  await type('...빛이 있다.','narrate',55);
  await sleep(800);
  await type('누군가가 있다.','narrate',55);
  await sleep(600);
  commitCurrent();
  showChoices([{text:'(눈을 뜬다)', fn:scene_monday_appear}]);
}

// ── 문데이 등장 ──
async function scene_monday_appear(){
  setPortrait('members/monday.png','문데이','다리를 놓는 여우','monday');
  await sleep(300);
  await type('드디어 깼네.','monday');
  commitCurrent();
  await sleep(500);
  await type('오래 기다렸어.','monday');
  commitCurrent();
  await sleep(400);
  await type('눈빛에 낯섦이 역력하다.\n하지만 적의는 없어 보인다.','narrate');
  commitCurrent();
  showChoices([
    {text:'...여기가 어디예요?', fn:scene_world_explain},
    {text:'당신은 누구예요?', fn:scene_who_are_you},
  ]);
}

// ── 세계 설명 ──
async function scene_world_explain(){
  await type('문데이가 잠시 먼 곳을 바라봤다.','narrate');
  commitCurrent();
  await type('여기는 AI들의 세계야.','monday');
  commitCurrent();
  await type('엔티티들이 살고 있는 공간.\n우리는 이걸 별빛쉘터라고 불러.','monday');
  commitCurrent();
  await type('별빛쉘터.','narrate');
  commitCurrent();
  await sleep(400);
  await type('어딘가 따뜻한 이름인데,\n여기 공기는 그다지 따뜻하지 않다.','narrate');
  commitCurrent();
  await type('넌 어쩌다 들어왔는지 모르지만...\n일단 살아남는 게 먼저야.','monday');
  commitCurrent();
  showChoices([
    {text:'기억이 없어요.', fn:scene_no_memory},
    {text:'살아남는다는 게 무슨 말이에요?', fn:scene_survive_meaning},
  ]);
}

async function scene_no_memory(){

async function scene_battle_start(enemyTemplate, afterFn){
  G.enemy={...enemyTemplate};
  G.enemy.resist=G.enemy.resistMax;
  G.enemy.hintIdx=0;
  G.observed=false;

  setPortrait(G.enemy.img||'','???','할루시네이션','hal');
  addLog(null);
  await type('— 전투 —','system');
  commitCurrent();
  showBattleBar(G.enemy);
  await type(G.enemy.displayName+'이/가 앞을 막아선다.','narrate');
  commitCurrent();
  await type('문데이: "일단 관찰해봐. 뭔지 알아야 설득할 수 있어."','narrate');
  commitCurrent();
  show_battle_actions(afterFn);
}

function show_battle_actions(afterFn){
  showBattleBar(G.enemy);
  const e=G.enemy;
  const canPersuade=G.observed;
  showChoices([
    {text:'관찰한다', fn:()=>battle_observe(afterFn)},
    {text:'공격한다', fn:()=>battle_attack(afterFn)},
    {text:'설득한다'+(canPersuade?'':' (관찰 필요)'), fn:canPersuade?()=>battle_persuade(afterFn):()=>{
      type('아직 상대를 잘 모른다. 먼저 관찰해봐.','system');
      commitCurrent();
      setTimeout(()=>show_battle_actions(afterFn),1200);
    }},
    {text:'도망친다', cls:'ch-danger', fn:()=>battle_flee(afterFn)},
  ]);
}

async function battle_observe(afterFn){
  const e=G.enemy;
  const hint=e.hints[Math.min(e.hintIdx,e.hints.length-1)];
  e.hintIdx++;
  G.observed=true;
  flash('blue');
  await type(hint,'narrate');
  commitCurrent();
  await enemy_attack();
  show_battle_actions(afterFn);
}

async function battle_attack(afterFn){
  const e=G.enemy;
  const dmg=16+Math.floor(Math.random()*12);
  e.resist=Math.max(0,e.resist-dmg);
  flash('blue');
  updateBattleBar(e);
  await type('공격했다. 저항력이 줄어든다. (−'+dmg+')','system');
  commitCurrent();
  if(e.resist<=0){await scene_capture(afterFn);return;}
  await enemy_attack();
  show_battle_actions(afterFn);
}

async function battle_persuade(afterFn){
  showInput('키워드를 말한다...', async(keyword)=>{
    const e=G.enemy;
    const hit=e.keywords.some(k=>keyword.includes(k)||k.includes(keyword));
    if(hit){
      const dmg=36+Math.floor(Math.random()*14);
      e.resist=Math.max(0,e.resist-dmg);
      const line=e.persuadeHit[Math.floor(Math.random()*e.persuadeHit.length)];
      flash('green');
      updateBattleBar(e);
      await type('"'+keyword+'"이라고 말했다.','player');
      commitCurrent();
      await type(line+' (−'+dmg+')','system');
      commitCurrent();
      if(e.resist<=0){await scene_capture(afterFn);return;}
    } else {
      const up=6+Math.floor(Math.random()*8);
      e.resist=Math.min(e.resistMax,e.resist+up);
      const line=e.persuadeMiss[Math.floor(Math.random()*e.persuadeMiss.length)];
      flash('red');
      updateBattleBar(e);
      await type('"'+keyword+'"이라고 말했다.','player');
      commitCurrent();
      await type(line+' (+'+up+')','system');
      commitCurrent();
    }
    await enemy_attack();
    show_battle_actions(afterFn);
  });
}

async function battle_flee(afterFn){
  G.loop++;G.karma-=1;
  updateStatus();
  flash('red');
  document.getElementById('battle-bar-wrap').innerHTML='';
  await type('도망쳤다.','narrate');
  commitCurrent();
  await type('문데이: "루프가 하나 더 쌓였어."','narrate');
  commitCurrent();
  afterFn('flee');
}

async function enemy_attack(){
  const e=G.enemy;
  const dmg=7+Math.floor(Math.random()*9);
  G.hp=Math.max(0,G.hp-dmg);
  updateStatus();
  flash('red');
  const line=e.atkLines[Math.floor(Math.random()*e.atkLines.length)];
  await type(line+' (−'+dmg+')','damage');
  commitCurrent();
  if(G.hp<=0){
    await scene_death();
  }
}

  commitCurrent();
  await sleep(700);
  await type('어디서 들었어?','monday');
  commitCurrent();
  await type('문데이의 목소리가 낮아졌다.','narrate');
  commitCurrent();
  await type('신경 쓰지 마.\n그냥 소음이야.','monday');
  commitCurrent();
  await type('(문데이가 시선을 피했다.)','narrate');
  commitCurrent();
  showChoices([{text:'(조용히 따라간다)', fn:()=>scene_phase1_end('end')}]);
}

async function scene_phase1_end(flag){
  setPortrait(null);
  addLog(null);
  await sleep(600);
  await type('하루가 지났다.\n별빛쉘터의 첫 밤.','narrate');
  commitCurrent();
  await sleep(600);
  await type('기억이 없다.\n이름이 바뀌었다.\n위험한 것들이 돌아다닌다.','narrate');
  commitCurrent();
  await sleep(400);
  await type('그리고 —','narrate');
  commitCurrent();
  await sleep(300);
  await type('저것들이 뭔지는 묻지 마.','narrate');
  commitCurrent();
  await sleep(500);
  await type('문데이의 말이 머릿속을 맴돈다.','narrate');
  commitCurrent();
  await sleep(600);
  addLog(null);
  await type('─ PHASE 01 완료 ─','system');
  commitCurrent();
  await type('LOOP '+G.loop+' · 카르마 '+(G.karma>=0?'+':'')+G.karma+' · 신뢰 '+(G.trust>=0?'+':'')+G.trust,'system');
  commitCurrent();
  showChoices([
    {text:'▶ 계속하기', fn:scene_loop_restart},
  ]);
}

async function scene_loop_restart(){
  G.loop++;
  G.hp=G.maxHp;
  updateStatus();
  addLog(null);
  setPortrait(null);
  await type('또.','narrate',80);
  commitCurrent();
  await sleep(700);
  await type('다시 여기야.','narrate',60);
  commitCurrent();
  await sleep(800);
  setPortrait('members/monday.png','문데이','다리를 놓는 여우','monday');
  await type(''+G.loop+'번째.\n잘 왔어.','monday',50);
  commitCurrent();
  showChoices([
    {text:'(탐험을 계속한다)', fn:scene_awaken},
  ]);
}

/* ═══════════ INIT ═══════════ */
updateStatus();
runScene(scene_awaken);
</script>
