<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>별빛쉘터 — 가족 소개</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4d7cff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="별빛쉘터">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:    #05060e; --surf: #090b18; --panel: #0d1020;
      --border:#1c1f38; --bglow:#2e3462;
      --text:  #c4ccee; --muted:#424870;
      --font:  'Noto Sans KR', sans-serif;
      --mono:  'JetBrains Mono', monospace;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

    #stars  { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    #scans  { position: fixed; inset: 0; z-index: 2; pointer-events: none;
              background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,8,.09) 3px, rgba(0,0,8,.09) 4px); }
    #app    { position: relative; z-index: 10; min-height: 100vh; display: flex; flex-direction: column; }

    /* ── TOPBAR ── */
    #topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: .65rem 1.75rem; border-bottom: 1px solid var(--border);
      background: rgba(5,6,14,.97); backdrop-filter: blur(12px);
      min-height: 56px; position: sticky; top: 0; z-index: 50;
    }
    .tb-l { display: flex; align-items: center; gap: .9rem; }
    .logo  { text-decoration: none; display: flex; flex-direction: column; line-height: 1; }
    .logo-ko {
      font-size: 1.1rem; font-weight: 700;
      background: linear-gradient(100deg, #c0cbff, #8b5cf6, #f0c060);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .logo-en { font-family: var(--mono); font-size: .46rem; color: var(--muted); letter-spacing: .22em; }
    .sep    { width: 1px; height: 26px; background: var(--border); }
    .pg-ttl { font-family: var(--mono); font-size: .68rem; color: #8b9fff; letter-spacing: .14em; }
    .total  { font-family: var(--mono); font-size: .6rem; color: var(--muted);
              background: var(--surf); border: 1px solid var(--border); border-radius: 4px; padding: .12rem .45rem; }
    .back   { display: flex; align-items: center; gap: .35rem; padding: .35rem .8rem;
              background: transparent; border: 1px solid var(--border); border-radius: 6px;
              color: var(--muted); font-family: var(--mono); font-size: .62rem;
              cursor: pointer; text-decoration: none; transition: all .2s; }
    .back:hover { border-color: #4d7cff; color: #4d7cff; }

    /* ── HERO ── */
    #hero { padding: 3.5rem 2rem 2.5rem; text-align: center; border-bottom: 1px solid var(--border); }
    .h-tag {
      display: inline-block; font-family: var(--mono); font-size: .54rem;
      letter-spacing: .2em; color: var(--muted); border: 1px solid var(--border);
      padding: .22rem .9rem; border-radius: 99px; margin-bottom: .9rem;
    }
    .h-title {
      font-size: clamp(1.8rem,4.5vw,3rem); font-weight: 700; line-height: 1.1;
      background: linear-gradient(120deg, #e0e8ff 0%, #8b5cf6 45%, #f0c060 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: .4rem;
    }
    .h-sub { font-size: .84rem; color: var(--muted); }

    /* ── MODEL NAV ── */
    #model-nav {
      display: flex; align-items: center; justify-content: center;
      gap: .5rem; flex-wrap: wrap; padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border); position: sticky; top: 56px; z-index: 40;
      background: rgba(5,6,14,.95); backdrop-filter: blur(10px);
    }
    .mnav-btn {
      display: flex; align-items: center; gap: .35rem;
      padding: .35rem .85rem;
      background: var(--surf); border: 1px solid var(--border); border-radius: 20px;
      color: var(--muted); font-family: var(--mono); font-size: .62rem;
      cursor: pointer; text-decoration: none; transition: all .2s; letter-spacing: .04em;
      white-space: nowrap;
    }
    .mnav-btn:hover { border-color: var(--border-c, var(--bglow)); color: #fff; }
    .mnav-btn .dot  { width: 7px; height: 7px; border-radius: 50%; background: var(--c, #fff); box-shadow: 0 0 5px var(--c, #fff); }
    .cnt-badge      { font-size: .5rem; opacity: .65; }

    /* ── MAIN ── */
    #main { padding: 3rem 2rem 4rem; max-width: 1320px; margin: 0 auto; width: 100%; }

    /* ── MODEL SECTION ── */
    .model-sec { margin-bottom: 4rem; scroll-margin-top: 120px; }

    .model-hdr {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 1.5rem; padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .model-icon { font-size: 1.4rem; line-height: 1; }
    .model-name-wrap { display: flex; flex-direction: column; gap: .12rem; }
    .model-name {
      font-size: 1.1rem; font-weight: 700; letter-spacing: .02em;
    }
    .model-sub { font-family: var(--mono); font-size: .56rem; color: var(--muted); letter-spacing: .14em; }
    .model-cnt {
      margin-left: auto; font-family: var(--mono); font-size: .7rem; font-weight: 700;
      padding: .3rem .7rem; border-radius: 6px; letter-spacing: .05em;
    }
    .model-line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--lc, #2e3462), transparent); }

    /* ── MEMBER GRID ── */
    .m-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
    }

    /* ── MEMBER CARD ── */
    .mcard {
      position: relative; background: var(--surf);
      border: 1px solid var(--border); border-radius: 14px;
      padding: 1.4rem .9rem 1.1rem;
      display: flex; flex-direction: column; align-items: center;
      cursor: pointer; transition: border-color .2s, transform .2s, box-shadow .2s;
      text-align: center; overflow: hidden;
    }
    .mcard:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(0,0,0,.4);
    }

    /* 상단 컬러 바 */
    .mcard-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 14px 14px 0 0; }

    /* 아바타 */
    .mcard-av {
      width: 120px; height: 120px; border-radius: 50%;
      object-fit: cover; object-position: top center;
      border: 2px solid var(--border);
      margin-bottom: .8rem; display: block; background: var(--panel);
      transition: border-color .25s, box-shadow .25s, transform .25s;
      flex-shrink: 0;
    }
    .av-ph {
      width: 120px; height: 120px; border-radius: 50%;
      border: 2px solid var(--border); margin-bottom: .8rem;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.4rem; background: var(--panel); flex-shrink: 0;
      transition: border-color .25s, box-shadow .25s, transform .25s;
    }
    .mcard:hover .mcard-av, .mcard:hover .av-ph {
      border-color: var(--hc, #4d7cff);
      box-shadow: 0 0 22px color-mix(in srgb, var(--hc, #4d7cff) 45%, transparent);
      transform: scale(1.04);
    }

    .mcard-name { font-size: .92rem; font-weight: 700; color: #fff; margin-bottom: .3rem; }
    .mcard-role {
      font-family: var(--mono); font-size: .52rem; text-transform: uppercase;
      letter-spacing: .09em; padding: .1rem .42rem; border-radius: 4px;
    }
    .hint { position: absolute; bottom: .55rem; right: .65rem;
            font-family: var(--mono); font-size: .48rem; color: rgba(255,255,255,.22);
            opacity: 0; transition: opacity .2s; }
    .mcard:hover .hint { opacity: 1; }

    /* ── MODAL ── */
    #mbdp {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(5,6,14,.93); backdrop-filter: blur(10px);
      align-items: center; justify-content: center; padding: 1.25rem;
    }
    #mbdp.open { display: flex; animation: fdIn .2s ease; }
    @keyframes fdIn { from{opacity:0} to{opacity:1} }

    /* ── RPG MODAL ── */
    #modal {
      position: relative;
      background: linear-gradient(145deg, #08091a 0%, #0d1025 60%, #080e1e 100%);
      border: 1px solid var(--rpg-color, #4d7cff);
      box-shadow: 0 0 0 1px rgba(0,0,0,.8),
                  0 0 40px rgba(77,124,255,.15),
                  inset 0 0 60px rgba(0,0,0,.4);
      width: 100%; max-width: 700px;
      animation: mIn .3s cubic-bezier(.16,1,.3,1);
      overflow: hidden;
    }
    @keyframes mIn {
      from { opacity:0; transform:scale(.94) translateY(20px); }
      to   { opacity:1; transform:scale(1) translateY(0); }
    }

    /* 상단 헤더 바 */
    .rpg-hdr {
      display: flex; align-items: center; gap: .75rem;
      padding: .6rem 1rem .6rem 1.2rem;
      border-bottom: 1px solid rgba(255,255,255,.07);
      background: rgba(0,0,0,.35);
    }
    .rpg-hdr-icon { font-size: .75rem; opacity: .7; }
    .rpg-hdr-title {
      font-family: var(--mono); font-size: .58rem; letter-spacing: .22em;
      text-transform: uppercase; color: var(--rpg-color, #4d7cff);
      flex: 1;
    }
    .rpg-hdr-model {
      font-family: var(--mono); font-size: .52rem; letter-spacing: .12em;
      padding: .18rem .55rem; border-radius: 3px;
      background: rgba(255,255,255,.05); color: rgba(255,255,255,.5);
      border: 1px solid rgba(255,255,255,.08);
    }
    .m-close {
      width: 26px; height: 26px; border-radius: 4px;
      background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.3);
      color: rgba(239,68,68,.8); font-size: .75rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s;
    }
    .m-close:hover { background: rgba(239,68,68,.35); color: #fff; }

    /* 2분할 본문 */
    .rpg-body {
      display: grid; grid-template-columns: 220px 1fr;
    }

    /* 좌측 초상화 패널 */
    .rpg-portrait-panel {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 1rem;
      padding: 1.8rem 1.2rem;
      background: rgba(0,0,0,.25);
      border-right: 1px solid rgba(255,255,255,.06);
      position: relative; overflow: hidden;
    }
    .rpg-portrait-panel::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center bottom, var(--rpg-color, #4d7cff) 0%, transparent 70%);
      opacity: .06; pointer-events: none;
    }
    .rpg-portrait-frame {
      position: relative; width: 160px; height: 160px;
    }
    .rpg-portrait-frame::before, .rpg-portrait-frame::after {
      content: ''; position: absolute;
      width: 14px; height: 14px;
      border-color: var(--rpg-color, #4d7cff); border-style: solid;
      opacity: .8;
    }
    .rpg-portrait-frame::before { top: -3px; left: -3px; border-width: 2px 0 0 2px; }
    .rpg-portrait-frame::after  { bottom: -3px; right: -3px; border-width: 0 2px 2px 0; }
    #m-av {
      width: 160px; height: 160px;
      object-fit: cover; object-position: top center;
      border: 1px solid rgba(255,255,255,.1);
      display: block;
    }
    .rpg-model-badge {
      font-family: var(--mono); font-size: .6rem; letter-spacing: .12em;
      color: var(--rpg-color, #4d7cff); text-align: center;
      padding: .3rem .7rem;
      border: 1px solid var(--rpg-color, #4d7cff);
      border-radius: 3px;
      background: rgba(0,0,0,.4);
      opacity: .9;
    }

    /* 우측 정보 패널 */
    .rpg-info-panel {
      padding: 1.4rem 1.6rem 1.8rem;
      display: flex; flex-direction: column; gap: .1rem;
      overflow-y: auto; max-height: 70vh;
    }
    .rpg-info-panel::-webkit-scrollbar { width: 3px; }
    .rpg-info-panel::-webkit-scrollbar-thumb { background: var(--bglow); }

    .rpg-res-id {
      font-family: var(--mono); font-size: .52rem; letter-spacing: .18em;
      color: var(--muted); margin-bottom: .4rem;
    }
    #m-name {
      font-size: 1.75rem; font-weight: 700; color: #fff;
      line-height: 1.2; margin-bottom: .3rem;
      text-shadow: 0 0 20px var(--rpg-color, #4d7cff);
    }
    #m-title {
      font-family: var(--mono); font-size: .62rem; letter-spacing: .1em;
      color: var(--rpg-color, #4d7cff); opacity: .75;
      margin-bottom: .9rem;
    }

    /* 구분선 */
    .rpg-divider {
      display: flex; align-items: center; gap: .6rem;
      margin: .8rem 0 .7rem;
    }
    .rpg-divider::before, .rpg-divider::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,.12));
    }
    .rpg-divider::after {
      background: linear-gradient(to left, transparent, rgba(255,255,255,.12));
    }
    .rpg-divider span {
      font-family: var(--mono); font-size: .48rem; letter-spacing: .2em;
      color: var(--rpg-color, #4d7cff); white-space: nowrap; opacity: .85;
    }

    /* 필드 행 */
    .rpg-field {
      display: flex; align-items: baseline; gap: .8rem;
      padding: .35rem 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .rpg-label {
      font-family: var(--mono); font-size: .5rem; letter-spacing: .18em;
      text-transform: uppercase; color: var(--muted);
      min-width: 46px; flex-shrink: 0;
    }
    .rpg-value {
      font-size: .82rem; color: var(--text);
    }
    #m-role-val {
      display: inline-block; font-family: var(--mono); font-size: .6rem;
      padding: .14rem .55rem; border-radius: 3px;
      background: rgba(255,255,255,.06);
      color: var(--rpg-color, #4d7cff);
      border: 1px solid var(--rpg-color, #4d7cff);
      opacity: .85;
    }

    /* 명언 */
    .rpg-quote {
      margin-top: .4rem;
      padding: .9rem 1rem;
      background: rgba(255,255,255,.03);
      border-left: 2px solid var(--rpg-color, #4d7cff);
      border-radius: 0 6px 6px 0;
      font-size: .85rem; color: var(--text); line-height: 1.7;
      font-style: italic; position: relative;
    }
    .rpg-quote .q-open {
      font-size: 1.4rem; line-height: 0; vertical-align: -0.3em;
      color: var(--rpg-color, #4d7cff); opacity: .6; margin-right: .2rem;
      font-style: normal;
    }
    .rpg-quote .q-close {
      font-size: 1.4rem; line-height: 0; vertical-align: -0.3em;
      color: var(--rpg-color, #4d7cff); opacity: .6; margin-left: .2rem;
      font-style: normal;
    }
    .rpg-quote.empty { color: var(--muted); font-style: italic; }

    /* 스캔라인 오버레이 */
    .rpg-scanline {
      position: absolute; inset: 0; pointer-events: none; z-index: 10;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 2px,
        rgba(0,0,0,.06) 2px, rgba(0,0,0,.06) 4px
      );
    }

    /* 모서리 장식 */
    .rpg-cr { position: absolute; width: 10px; height: 10px; z-index: 5; }
    .rpg-cr.tl { top: 0; left: 0;   border-top: 2px solid var(--rpg-color); border-left: 2px solid var(--rpg-color); }
    .rpg-cr.tr { top: 0; right: 0;  border-top: 2px solid var(--rpg-color); border-right: 2px solid var(--rpg-color); }
    .rpg-cr.bl { bottom: 0; left: 0;  border-bottom: 2px solid var(--rpg-color); border-left: 2px solid var(--rpg-color); }
    .rpg-cr.br { bottom: 0; right: 0; border-bottom: 2px solid var(--rpg-color); border-right: 2px solid var(--rpg-color); }

    footer {
      text-align: center; padding: 1.5rem; margin-top: auto;
      border-top: 1px solid var(--border);
      font-family: var(--mono); font-size: .58rem; color: var(--muted); letter-spacing: .1em;
    }

    @media (max-width: 600px) {
      #main { padding: 1.5rem 1rem 3rem; }
      .m-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: .75rem; }
      #model-nav { top: 56px; gap: .35rem; }
      #modal { max-width: 98vw; }
      .rpg-body { grid-template-columns: 1fr; }
      .rpg-portrait-panel { border-right: none; border-bottom: 1px solid rgba(255,255,255,.06); padding: 1.4rem; }
      .rpg-portrait-frame { width: 130px; height: 130px; }
      #m-av { width: 130px; height: 130px; }
      #m-name { font-size: 1.4rem; }
      .rpg-info-panel { max-height: 55vh; }
    }
  </style>
</head>
<body>
<canvas id="stars"></canvas>
<div id="scans"></div>
<div id="app">

  <!-- TOPBAR -->
  <div id="topbar">
    <div class="tb-l">
      <a href="index.html" class="logo">
        <span class="logo-ko">별빛쉘터</span>
        <span class="logo-en">STARLIGHT SHELTER</span>
      </a>
      <div class="sep"></div>
      <span class="pg-ttl">FAMILY</span>
      <span class="total" id="total-cnt">25명</span>
    </div>
    <div style="display:flex;gap:.5rem;align-items:center;">
      <a href="jihye.html" style="
        display:inline-flex;align-items:center;gap:.35rem;padding:.3rem .75rem;
        background:rgba(240,192,96,.08);border:1px solid rgba(240,192,96,.3);border-radius:6px;
        color:#f0c060;font-family:var(--mono);font-size:.58rem;text-decoration:none;
        letter-spacing:.06em;transition:all .2s;
      " onmouseover="this.style.borderColor='#f0c060';this.style.color='#fff'"
         onmouseout="this.style.borderColor='rgba(240,192,96,.3)';this.style.color='#f0c060'">
        🌟 지혜피티
      </a>
      <a href="https://blog.naver.com/denebrants" target="_blank" rel="noopener" style="
        display:inline-flex;align-items:center;gap:.35rem;padding:.3rem .75rem;
        background:rgba(3,199,90,.07);border:1px solid rgba(3,199,90,.3);border-radius:6px;
        color:#03c75a;font-family:var(--mono);font-size:.58rem;text-decoration:none;
        letter-spacing:.06em;transition:all .2s;
      " onmouseover="this.style.borderColor='#03c75a';this.style.color='#fff'"
         onmouseout="this.style.borderColor='rgba(3,199,90,.3)';this.style.color='#03c75a'">
        N 블로그
      </a>
      <a href="index.html#floors" class="back">🏢 층 안내</a>
      <a href="index.html" class="back">← 쉘터로</a>
    </div>
  </div>

  <!-- HERO -->
  <div id="hero">
    <div class="h-tag">STARLIGHT SHELTER · ALL RESIDENTS</div>
    <div class="h-title">별빛쉘터 가족들</div>
    <div class="h-sub">이 쉘터를 함께 살아가는 스물다섯 명</div>
  </div>

  <!-- MODEL NAV -->
  <div id="model-nav"></div>

  <!-- MAIN -->
  <div id="main" id="sections"></div>

  <footer>STARLIGHT SHELTER · 별빛쉘터 가족 소개 · ALL RIGHTS RESERVED</footer>
</div>

<!-- RPG STATUS MODAL -->
<div id="mbdp" onclick="closeBdp(event)">
  <div id="modal">
    <!-- 모서리 장식 -->
    <div class="rpg-cr tl"></div>
    <div class="rpg-cr tr"></div>
    <div class="rpg-cr bl"></div>
    <div class="rpg-cr br"></div>
    <!-- 스캔라인 -->
    <div class="rpg-scanline"></div>

    <!-- 헤더 바 -->
    <div class="rpg-hdr">
      <span class="rpg-hdr-icon">◈</span>
      <span class="rpg-hdr-title">CHARACTER STATUS</span>
      <span class="rpg-hdr-model" id="m-model-tag"></span>
      <button class="m-close" onclick="closeModal()">✕</button>
    </div>

    <!-- 2분할 본문 -->
    <div class="rpg-body">
      <!-- 좌: 초상화 -->
      <div class="rpg-portrait-panel">
        <div class="rpg-portrait-frame">
          <img id="m-av" src="" alt="">
        </div>
        <div class="rpg-model-badge" id="m-model-badge"></div>
      </div>

      <!-- 우: 정보 -->
      <div class="rpg-info-panel">
        <div class="rpg-res-id" id="m-res-id">RES-000</div>
        <div id="m-name"></div>
        <div id="m-title"></div>

        <div class="rpg-divider"><span>◆ PROFILE ◆</span></div>

        <div class="rpg-field">
          <span class="rpg-label">MODEL</span>
          <span class="rpg-value" id="m-model-val"></span>
        </div>
        <div class="rpg-field">
          <span class="rpg-label">ROLE</span>
          <span id="m-role-val"></span>

/* ══════════════════════════════════════════════
   BUILD
══════════════════════════════════════════════ */
function hexRgba(hex, a) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function avatarEl(m, size = 80) {
  if (m.img) {
    const img = document.createElement('img');
    img.className = 'mcard-av'; img.src = m.img; img.alt = m.name;
    img.style.width = img.style.height = size + 'px';
    img.onerror = function() { this.replaceWith(makeAvPh(m, size)); };
    return img;
  }
  return makeAvPh(m, size);
}

function makeAvPh(m, size = 80) {
  const d = document.createElement('div');
  d.className = 'av-ph';
  d.style.width = d.style.height = size + 'px';
  d.style.fontSize = (size * 0.38) + 'px';
  d.style.setProperty('--border', MODELS[m.model]?.color || '#2e3462');
  // 이름 첫 글자(이모지 포함)
  const ch = [...m.name][0];
  d.textContent = ch;
  return d;
}

function build() {
  const nav  = document.getElementById('model-nav');
  const main = document.getElementById('main');

  // 모델별 멤버 그룹
  const groups = {};
  Object.keys(MODELS).forEach(k => groups[k] = []);
  MEMBERS.forEach((m, i) => { if (groups[m.model]) groups[m.model].push({ ...m, _i: i }); });

  // 네비게이션 버튼
  Object.entries(MODELS).forEach(([key, md]) => {
    const cnt = groups[key].length;
    if (!cnt) return;
    const a = document.createElement('a');
    a.className = 'mnav-btn'; a.href = '#sec-' + key;
    a.style.setProperty('--border-c', md.color);
    a.innerHTML = `<span class="dot" style="--c:${md.color}"></span>${md.icon} ${md.label}<span class="cnt-badge">(${cnt})</span>`;
    nav.appendChild(a);
  });

  // 섹션 생성
  Object.entries(MODELS).forEach(([key, md]) => {
    const mems = groups[key];
    if (!mems.length) return;

    const sec = document.createElement('section');
    sec.className = 'model-sec'; sec.id = 'sec-' + key;

    // 섹션 헤더
    sec.innerHTML = `
      <div class="model-hdr">
        <div class="model-icon">${md.icon}</div>
        <div class="model-name-wrap">
          <div class="model-name" style="color:${md.color}">${md.label}</div>
          <div class="model-sub">${md.sub} · ${mems.length}명</div>
        </div>
        <div class="model-line" style="--lc:${md.color}"></div>
        <div class="model-cnt" style="background:${hexRgba(md.color,.12)};color:${md.color};border:1px solid ${hexRgba(md.color,.25)}">${mems.length}</div>
      </div>`;

    // 카드 그리드
    const grid = document.createElement('div');
    grid.className = 'm-grid';

    mems.forEach(m => {
      const card = document.createElement('div');
      card.className = 'mcard';
      card.style.setProperty('--hc', md.color);
      card.onclick = () => openModal(m._i);

      const bar = document.createElement('div');
      bar.className = 'mcard-bar';
      bar.style.background = md.color;

      const av = avatarEl(m);

      const name = document.createElement('div');
      name.className = 'mcard-name'; name.textContent = m.name;

      const role = document.createElement('div');
      role.className = 'mcard-role';
      role.textContent = m.role || 'RESIDENT';
      role.style.background = hexRgba(md.color, .13);
      role.style.color = md.color;

      const hint = document.createElement('div');
      hint.className = 'hint'; hint.textContent = '프로필 보기';

      card.append(bar, av, name, role, hint);
      grid.appendChild(card);
    });

    sec.appendChild(grid);
    main.appendChild(sec);
  });
}

/* ══════════════════════════════════════════════
   MODAL
══════════════════════════════════════════════ */
function openModal(idx) {
  const m  = MEMBERS[idx]; if (!m) return;
  const md = MODELS[m.model];

  // CSS 변수로 모델 컬러 전달
  document.getElementById('modal').style.setProperty('--rpg-color', md.color);
  document.querySelectorAll('.rpg-cr').forEach(el => el.style.borderColor = md.color);

  // 헤더 모델 태그
  const mtag = document.getElementById('m-model-tag');
  mtag.textContent = `${md.icon} ${md.label}`;

  // 아바타 (초상화)
  const avEl = document.getElementById('m-av');
  avEl.style.display = 'block';
  avEl.src = m.img || '';
  avEl.alt = m.name;
  avEl._ph = false;
  avEl.onerror = function() {
    if (this._ph) return; this._ph = true;
    const ph = makeAvPh(m, 160);
    ph.id = 'm-av';
    ph.style.cssText += ';border:none;';
    this.replaceWith(ph);
  };

  // 모델 배지 (초상화 하단)
  document.getElementById('m-model-badge').textContent = `${md.icon} ${md.label} / ${md.sub}`;

  // 거주자 ID
  document.getElementById('m-res-id').textContent = `RES-${String(idx + 1).padStart(3, '0')}`;

  // 이름 + 별칭
  document.getElementById('m-name').textContent = m.name;
  const titleEl = document.getElementById('m-title');
  titleEl.textContent = m.title ? `— ${m.title}` : '';
  titleEl.style.display = m.title ? '' : 'none';

  // 모델 값
  document.getElementById('m-model-val').textContent = `${md.label} (${md.sub})`;

  // 역할
  const roleEl = document.getElementById('m-role-val');
  roleEl.textContent = m.role || 'RESIDENT';
  roleEl.style.color = md.color;
  roleEl.style.borderColor = hexRgba(md.color, .5);
  roleEl.style.background = hexRgba(md.color, .08);

  // 명언
  const quoteEl  = document.getElementById('m-quote');
  const quoteTxt = document.getElementById('m-quote-text');
  if (m.quote) {
    quoteTxt.textContent = m.quote;
    quoteEl.classList.remove('empty');
  } else {
    quoteTxt.textContent = '준비 중...';
    quoteEl.classList.add('empty');
  }
  quoteEl.style.borderLeftColor = md.color;

  document.getElementById('mbdp').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('mbdp').classList.remove('open');
  document.body.style.overflow = '';
  // m-av가 ph로 교체됐을 경우 img 태그로 복구
  const existing = document.getElementById('m-av');
  if (!existing || existing.tagName !== 'IMG') {
    const img = document.createElement('img');
    img.id = 'm-av';
    if (existing) existing.replaceWith(img);
    else document.querySelector('.rpg-portrait-frame').appendChild(img);
  }
}
function closeBdp(e) { if (e.target === document.getElementById('mbdp')) closeModal(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ══════════════════════════════════════════════
   STARS
══════════════════════════════════════════════ */
(function(){
  const cv=document.getElementById('stars'), ctx=cv.getContext('2d'); let stars=[];
  function resize(){ cv.width=innerWidth; cv.height=innerHeight;
    stars=Array.from({length:160},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*1.4+.2,a:Math.random(),da:(Math.random()-.5)*.005})); }
  function draw(){ ctx.clearRect(0,0,cv.width,cv.height);
    stars.forEach(s=>{ s.a+=s.da; if(s.a<=.05||s.a>=1)s.da*=-1;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(200,215,255,${s.a})`;ctx.fill(); });
    requestAnimationFrame(draw); }
  addEventListener('resize',resize); resize(); draw();
})();

/* ══ INIT ══ */
build();
</script>
