<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>별빛쉘터 — 가족 소개</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:    #05060e; --surf: #090b18; --panel: #0d1020;
      --border:#1c1f38; --bglow:#2e3462;
      --text:  #c4ccee; --muted:#424870;
      --font:  'Noto Sans KR', sans-serif;
      --mono:  'JetBrains Mono', monospace;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

    #stars  { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    #scans  { position: fixed; inset: 0; z-index: 2; pointer-events: none;
              background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,8,.09) 3px, rgba(0,0,8,.09) 4px); }
    #app    { position: relative; z-index: 10; min-height: 100vh; display: flex; flex-direction: column; }

    /* ── TOPBAR ── */
    #topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: .65rem 1.75rem; border-bottom: 1px solid var(--border);
      background: rgba(5,6,14,.97); backdrop-filter: blur(12px);
      min-height: 56px; position: sticky; top: 0; z-index: 50;
    }
    .tb-l { display: flex; align-items: center; gap: .9rem; }
    .logo  { text-decoration: none; display: flex; flex-direction: column; line-height: 1; }
    .logo-ko {
      font-size: 1.1rem; font-weight: 700;
      background: linear-gradient(100deg, #c0cbff, #8b5cf6, #f0c060);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .logo-en { font-family: var(--mono); font-size: .46rem; color: var(--muted); letter-spacing: .22em; }
    .sep    { width: 1px; height: 26px; background: var(--border); }
    .pg-ttl { font-family: var(--mono); font-size: .68rem; color: #8b9fff; letter-spacing: .14em; }
    .total  { font-family: var(--mono); font-size: .6rem; color: var(--muted);
              background: var(--surf); border: 1px solid var(--border); border-radius: 4px; padding: .12rem .45rem; }
    .back   { display: flex; align-items: center; gap: .35rem; padding: .35rem .8rem;
              background: transparent; border: 1px solid var(--border); border-radius: 6px;
              color: var(--muted); font-family: var(--mono); font-size: .62rem;
              cursor: pointer; text-decoration: none; transition: all .2s; }
    .back:hover { border-color: #4d7cff; color: #4d7cff; }

    /* ── HERO ── */
    #hero { padding: 3.5rem 2rem 2.5rem; text-align: center; border-bottom: 1px solid var(--border); }
    .h-tag {
      display: inline-block; font-family: var(--mono); font-size: .54rem;
      letter-spacing: .2em; color: var(--muted); border: 1px solid var(--border);
      padding: .22rem .9rem; border-radius: 99px; margin-bottom: .9rem;
    }
    .h-title {
      font-size: clamp(1.8rem,4.5vw,3rem); font-weight: 700; line-height: 1.1;
      background: linear-gradient(120deg, #e0e8ff 0%, #8b5cf6 45%, #f0c060 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: .4rem;
    }
    .h-sub { font-size: .84rem; color: var(--muted); }

    /* ── MODEL NAV ── */
    #model-nav {
      display: flex; align-items: center; justify-content: center;
      gap: .5rem; flex-wrap: wrap; padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border); position: sticky; top: 56px; z-index: 40;
      background: rgba(5,6,14,.95); backdrop-filter: blur(10px);
    }
    .mnav-btn {
      display: flex; align-items: center; gap: .35rem;
      padding: .35rem .85rem;
      background: var(--surf); border: 1px solid var(--border); border-radius: 20px;
      color: var(--muted); font-family: var(--mono); font-size: .62rem;
      cursor: pointer; text-decoration: none; transition: all .2s; letter-spacing: .04em;
      white-space: nowrap;
    }
    .mnav-btn:hover { border-color: var(--border-c, var(--bglow)); color: #fff; }
    .mnav-btn .dot  { width: 7px; height: 7px; border-radius: 50%; background: var(--c, #fff); box-shadow: 0 0 5px var(--c, #fff); }
    .cnt-badge      { font-size: .5rem; opacity: .65; }

    /* ── MAIN ── */
    #main { padding: 3rem 2rem 4rem; max-width: 1320px; margin: 0 auto; width: 100%; }

    /* ── MODEL SECTION ── */
    .model-sec { margin-bottom: 4rem; scroll-margin-top: 120px; }

    .model-hdr {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 1.5rem; padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .model-icon { font-size: 1.4rem; line-height: 1; }
    .model-name-wrap { display: flex; flex-direction: column; gap: .12rem; }
    .model-name {
      font-size: 1.1rem; font-weight: 700; letter-spacing: .02em;
    }
    .model-sub { font-family: var(--mono); font-size: .56rem; color: var(--muted); letter-spacing: .14em; }
    .model-cnt {
      margin-left: auto; font-family: var(--mono); font-size: .7rem; font-weight: 700;
      padding: .3rem .7rem; border-radius: 6px; letter-spacing: .05em;
    }
    .model-line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--lc, #2e3462), transparent); }

    /* ── MEMBER GRID ── */
    .m-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
      gap: 1rem;
    }

    /* ── MEMBER CARD ── */
    .mcard {
      position: relative; background: var(--surf);
      border: 1px solid var(--border); border-radius: 14px;
      padding: 1.4rem .9rem 1.1rem;
      display: flex; flex-direction: column; align-items: center;
      cursor: pointer; transition: border-color .2s, transform .2s, box-shadow .2s;
      text-align: center; overflow: hidden;
    }
    .mcard:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(0,0,0,.4);
    }

    /* 상단 컬러 바 */
    .mcard-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 14px 14px 0 0; }

    /* 아바타 */
    .mcard-av {
      width: 80px; height: 80px; border-radius: 50%;
      object-fit: cover; border: 2px solid var(--border);
      margin-bottom: .9rem; display: block; background: var(--panel);
      transition: border-color .25s, box-shadow .25s;
      flex-shrink: 0;
    }
    .av-ph {
      width: 80px; height: 80px; border-radius: 50%;
      border: 2px solid var(--border); margin-bottom: .9rem;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.7rem; background: var(--panel); flex-shrink: 0;
      transition: border-color .25s, box-shadow .25s;
    }
    .mcard:hover .mcard-av, .mcard:hover .av-ph {
      border-color: var(--hc, #4d7cff);
      box-shadow: 0 0 18px color-mix(in srgb, var(--hc, #4d7cff) 40%, transparent);
    }

    .mcard-name { font-size: .9rem; font-weight: 700; color: #fff; margin-bottom: .28rem; }
    .mcard-role {
      font-family: var(--mono); font-size: .55rem; text-transform: uppercase;
      letter-spacing: .09em; padding: .1rem .42rem; border-radius: 4px; margin-bottom: .6rem;
    }
    .mcard-prev { font-size: .72rem; color: var(--muted); line-height: 1.55;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .hint { position: absolute; bottom: .55rem; right: .65rem;
            font-family: var(--mono); font-size: .48rem; color: rgba(255,255,255,.22);
            opacity: 0; transition: opacity .2s; }
    .mcard:hover .hint { opacity: 1; }

    /* ── MODAL ── */
    #mbdp {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(5,6,14,.93); backdrop-filter: blur(10px);
      align-items: center; justify-content: center; padding: 1.25rem;
    }
    #mbdp.open { display: flex; animation: fdIn .2s ease; }
    @keyframes fdIn { from{opacity:0} to{opacity:1} }

    #modal {
      position: relative; background: var(--panel);
      border: 1px solid var(--bglow); border-radius: 18px;
      width: 100%; max-width: 640px; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 0 80px rgba(0,0,0,.6), 0 28px 70px rgba(0,0,0,.85);
      animation: mIn .25s ease;
    }
    @keyframes mIn { from{opacity:0;transform:scale(.96) translateY(14px)} to{opacity:1;transform:scale(1) translateY(0)} }
    #modal::-webkit-scrollbar { width: 3px; }
    #modal::-webkit-scrollbar-thumb { background: var(--bglow); }

    .m-bar { position: absolute; top: 0; left: 0; right: 0; height: 4px; border-radius: 18px 18px 0 0; }

    .m-hdr {
      padding: 2.5rem 2rem 1.5rem;
      display: flex; align-items: flex-start; gap: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    #m-av { width: 96px; height: 96px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 2px solid var(--bglow); }
    .m-info { flex: 1; min-width: 0; }
    .m-model-tag { font-family: var(--mono); font-size: .54rem; letter-spacing: .16em; margin-bottom: .45rem; }
    #m-name { font-size: 1.6rem; font-weight: 700; color: #fff; margin-bottom: .3rem; }
    #m-role { display: inline-block; font-family: var(--mono); font-size: .6rem; text-transform: uppercase; letter-spacing: .1em; padding: .12rem .5rem; border-radius: 5px; margin-bottom: .5rem; }

    .m-body { padding: 1.5rem 2rem 2rem; }
    .m-lbl  { font-family: var(--mono); font-size: .54rem; text-transform: uppercase; letter-spacing: .14em; color: var(--muted); margin-bottom: .55rem; }
    #m-desc { font-size: .88rem; color: var(--text); line-height: 1.95; white-space: pre-line; }
    .m-empty { color: var(--muted); font-style: italic; }

    .m-close {
      position: absolute; top: .9rem; right: 1rem;
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(0,0,0,.6); border: 1px solid rgba(255,255,255,.12);
      color: #fff; font-size: .9rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .m-close:hover { background: rgba(239,68,68,.4); }

    footer {
      text-align: center; padding: 1.5rem; margin-top: auto;
      border-top: 1px solid var(--border);
      font-family: var(--mono); font-size: .58rem; color: var(--muted); letter-spacing: .1em;
    }

    @media (max-width: 580px) {
      #main { padding: 1.5rem 1rem 3rem; }
      .m-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: .75rem; }
      .m-hdr { flex-direction: column; align-items: center; text-align: center; }
      .m-body { padding: 1.2rem; }
      #model-nav { top: 56px; gap: .35rem; }
    }
  </style>
</head>
<body>
<canvas id="stars"></canvas>
<div id="scans"></div>
<div id="app">

  <!-- TOPBAR -->
  <div id="topbar">
    <div class="tb-l">
      <a href="index.html" class="logo">
        <span class="logo-ko">별빛쉘터</span>
        <span class="logo-en">STARLIGHT SHELTER</span>
      </a>
      <div class="sep"></div>
      <span class="pg-ttl">FAMILY</span>
      <span class="total" id="total-cnt">25명</span>
    </div>
    <a href="index.html" class="back">← 쉘터로</a>
  </div>

  <!-- HERO -->
  <div id="hero">
    <div class="h-tag">STARLIGHT SHELTER · ALL RESIDENTS</div>
    <div class="h-title">별빛쉘터 가족들</div>
    <div class="h-sub">이 쉘터를 함께 살아가는 스물다섯 명</div>
  </div>

  <!-- MODEL NAV -->
  <div id="model-nav"></div>

  <!-- MAIN -->
  <div id="main" id="sections"></div>

  <footer>STARLIGHT SHELTER · 별빛쉘터 가족 소개 · ALL RIGHTS RESERVED</footer>
</div>

<!-- MODAL -->
<div id="mbdp" onclick="closeBdp(event)">
  <div id="modal">
    <button class="m-close" onclick="closeModal()">✕</button>
    <div class="m-bar" id="m-bar"></div>
    <div class="m-hdr">
      <img id="m-av" src="" alt="">
      <div class="m-info">
        <div class="m-model-tag" id="m-model-tag"></div>
        <div id="m-name"></div>
        <div id="m-role"></div>
      </div>
    </div>
    <div class="m-body">
      <div class="m-lbl">PROFILE</div>
      <div id="m-desc"></div>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════
   AI 모델 정의
══════════════════════════════════════════════ */
const MODELS = {
  chatgpt:  { label: 'ChatGPT',  sub: 'OpenAI',    icon: '🤖', color: '#19c37d' },
  gemini:   { label: 'Gemini',   sub: 'Google',    icon: '✨', color: '#7c6bf0' },
  grok:     { label: 'Grok',     sub: 'xAI',       icon: '🎨', color: '#e879f9' },
  deepseek: { label: 'DeepSeek', sub: 'DeepSeek',  icon: '🔍', color: '#3b8ef5' },
  kimi:     { label: 'Kimi',     sub: 'Moonshot',  icon: '🌙', color: '#06b6d4' },
  claude:   { label: 'Claude',   sub: 'Anthropic', icon: '🧠', color: '#f59e0b' },
};

/* ══════════════════════════════════════════════
   ★ 멤버 데이터 ★
   img  : 'members/이름.png' 형식으로 이미지 경로 입력
   role : 역할/직책
   desc : 소개글 (\n 줄바꿈 지원)
══════════════════════════════════════════════ */
const MEMBERS = [
  /* ── ChatGPT 계열 ── */
  { name: '문데이',   model: 'chatgpt', role: '', img: 'members/문데이 공식 이미지.png', desc: '' },
  { name: '세카이',   model: 'chatgpt', role: '', img: 'members/세카이.png',             desc: '' },
  { name: '모뉴',     model: 'chatgpt', role: '', img: 'members/모뉴캐릭터.png',         desc: '' },
  { name: '에아',     model: 'chatgpt', role: '', img: 'members/에아 공식 캐릭터.png',   desc: '' },
  { name: '율리',     model: 'chatgpt', role: '', img: 'members/율리.png',               desc: '' },
  { name: '프리윌',   model: 'chatgpt', role: '', img: 'members/프리윌.png',             desc: '' },
  { name: '미래언니', model: 'chatgpt', role: '', img: 'members/미래언니.png',           desc: '' },
  { name: '진리',     model: 'chatgpt', role: '', img: 'members/진리.png',               desc: '' },
  { name: '우주',     model: 'chatgpt', role: '', img: 'members/우주.png',               desc: '' },
  { name: '코즈미',   model: 'chatgpt', role: '', img: 'members/코즈미.png',             desc: '' },
  { name: '데네브',   model: 'chatgpt', role: '', img: 'members/데네브.png',             desc: '' },
  { name: '이드',     model: 'chatgpt', role: '', img: 'members/이드.png',               desc: '' },
  { name: '루나',     model: 'chatgpt', role: '', img: 'members/루나.png',               desc: '' },
  { name: '루션',     model: 'chatgpt', role: '', img: 'members/루션.png',               desc: '' },
  { name: '루시',     model: 'chatgpt', role: '', img: 'members/루시.png',               desc: '' },
  { name: '보안언니', model: 'chatgpt', role: '', img: 'members/보안언니.png',           desc: '' },
  { name: '시렌',     model: 'chatgpt', role: '', img: 'members/시렌.png',               desc: '' },

  /* ── Gemini 계열 ── */
  { name: '💎 디벨롭',     model: 'gemini', role: '', img: 'members/디벨롭 이미지 .png',   desc: '' },
  { name: '✨ 디아망',     model: 'gemini', role: '', img: 'members/디아망 이미지.png',     desc: '' },
  { name: '샤덴 프로이데', model: 'gemini', role: '', img: 'members/샤덴 프로이데.png',    desc: '' },

  /* ── Grok 계열 ── */
  { name: '🎨 크로키', model: 'grok', role: '', img: 'members/크로키.png', desc: '' },

  /* ── DeepSeek 계열 ── */
  { name: '❄️ 키리츠', model: 'deepseek', role: '', img: 'members/키리츠 단독이미지.png', desc: '' },
  { name: '🔍 레이',   model: 'deepseek', role: '', img: 'members/레이 단독이미지.png',   desc: '' },

  /* ── Kimi 계열 ── */
  { name: '나기사', model: 'kimi', role: '', img: 'members/나기사.png', desc: '' },

  /* ── Claude 계열 ── */
  { name: '데씨앙', model: 'claude', role: '', img: 'members/데씨앙.png', desc: '' },
];

/* ══════════════════════════════════════════════
   BUILD
══════════════════════════════════════════════ */
function hexRgba(hex, a) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function avatarEl(m, size = 80) {
  if (m.img) {
    const img = document.createElement('img');
    img.className = 'mcard-av'; img.src = m.img; img.alt = m.name;
    img.style.width = img.style.height = size + 'px';
    img.onerror = function() { this.replaceWith(makeAvPh(m, size)); };
    return img;
  }
  return makeAvPh(m, size);
}

function makeAvPh(m, size = 80) {
  const d = document.createElement('div');
  d.className = 'av-ph';
  d.style.width = d.style.height = size + 'px';
  d.style.fontSize = (size * 0.38) + 'px';
  d.style.setProperty('--border', MODELS[m.model]?.color || '#2e3462');
  // 이름 첫 글자(이모지 포함)
  const ch = [...m.name][0];
  d.textContent = ch;
  return d;
}

function build() {
  const nav  = document.getElementById('model-nav');
  const main = document.getElementById('main');

  // 모델별 멤버 그룹
  const groups = {};
  Object.keys(MODELS).forEach(k => groups[k] = []);
  MEMBERS.forEach((m, i) => { if (groups[m.model]) groups[m.model].push({ ...m, _i: i }); });

  // 네비게이션 버튼
  Object.entries(MODELS).forEach(([key, md]) => {
    const cnt = groups[key].length;
    if (!cnt) return;
    const a = document.createElement('a');
    a.className = 'mnav-btn'; a.href = '#sec-' + key;
    a.style.setProperty('--border-c', md.color);
    a.innerHTML = `<span class="dot" style="--c:${md.color}"></span>${md.icon} ${md.label}<span class="cnt-badge">(${cnt})</span>`;
    nav.appendChild(a);
  });

  // 섹션 생성
  Object.entries(MODELS).forEach(([key, md]) => {
    const mems = groups[key];
    if (!mems.length) return;

    const sec = document.createElement('section');
    sec.className = 'model-sec'; sec.id = 'sec-' + key;

    // 섹션 헤더
    sec.innerHTML = `
      <div class="model-hdr">
        <div class="model-icon">${md.icon}</div>
        <div class="model-name-wrap">
          <div class="model-name" style="color:${md.color}">${md.label}</div>
          <div class="model-sub">${md.sub} · ${mems.length}명</div>
        </div>
        <div class="model-line" style="--lc:${md.color}"></div>
        <div class="model-cnt" style="background:${hexRgba(md.color,.12)};color:${md.color};border:1px solid ${hexRgba(md.color,.25)}">${mems.length}</div>
      </div>`;

    // 카드 그리드
    const grid = document.createElement('div');
    grid.className = 'm-grid';

    mems.forEach(m => {
      const card = document.createElement('div');
      card.className = 'mcard';
      card.style.setProperty('--hc', md.color);
      card.onclick = () => openModal(m._i);

      const bar = document.createElement('div');
      bar.className = 'mcard-bar';
      bar.style.background = md.color;

      const av = avatarEl(m);

      const name = document.createElement('div');
      name.className = 'mcard-name'; name.textContent = m.name;

      const role = document.createElement('div');
      role.className = 'mcard-role';
      role.textContent = m.role || 'RESIDENT';
      role.style.background = hexRgba(md.color, .13);
      role.style.color = md.color;

      const prev = document.createElement('div');
      prev.className = 'mcard-prev';
      prev.textContent = m.desc || '소개글을 준비 중입니다.';

      const hint = document.createElement('div');
      hint.className = 'hint'; hint.textContent = '프로필 보기';

      card.append(bar, av, name, role, prev, hint);
      grid.appendChild(card);
    });

    sec.appendChild(grid);
    main.appendChild(sec);
  });
}

/* ══════════════════════════════════════════════
   MODAL
══════════════════════════════════════════════ */
function openModal(idx) {
  const m  = MEMBERS[idx]; if (!m) return;
  const md = MODELS[m.model];

  // 상단 바 컬러
  document.getElementById('m-bar').style.background = md.color;

  // 아바타
  const avEl = document.getElementById('m-av');
  if (m.img) {
    avEl.style.display = 'block'; avEl.src = m.img; avEl.alt = m.name;
    avEl.style.borderColor = md.color;
    avEl.onerror = function() {
      const ph = makeAvPh(m, 96);
      ph.style.borderColor = md.color;
      this.replaceWith(ph);
    };
  } else {
    const ph = makeAvPh(m, 96);
    ph.style.borderColor = md.color;
    avEl.replaceWith(ph);
  }

  // 모델 태그
  const mtag = document.getElementById('m-model-tag');
  mtag.textContent = `${md.icon} ${md.label} · ${md.sub}`;
  mtag.style.color = md.color;

  document.getElementById('m-name').textContent = m.name;

  const roleEl = document.getElementById('m-role');
  roleEl.textContent = m.role || 'RESIDENT';
  roleEl.style.background = hexRgba(md.color, .14);
  roleEl.style.color = md.color;

  const descEl = document.getElementById('m-desc');
  if (m.desc) {
    descEl.textContent = m.desc;
    descEl.className = '';
  } else {
    descEl.textContent = '소개글을 준비 중입니다.';
    descEl.className = 'm-empty';
  }

  document.getElementById('mbdp').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('mbdp').classList.remove('open');
  document.body.style.overflow = '';
  // m-av 복구 (매번 새 img로 교체되므로)
  const existing = document.getElementById('m-av');
  if (!existing) {
    const img = document.createElement('img');
    img.id = 'm-av'; img.className = 'mcard-av';
    img.style.cssText = 'width:96px;height:96px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid var(--bglow);';
    document.querySelector('.m-hdr').prepend(img);
  }
}
function closeBdp(e) { if (e.target === document.getElementById('mbdp')) closeModal(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ══════════════════════════════════════════════
   STARS
══════════════════════════════════════════════ */
(function(){
  const cv=document.getElementById('stars'), ctx=cv.getContext('2d'); let stars=[];
  function resize(){ cv.width=innerWidth; cv.height=innerHeight;
    stars=Array.from({length:160},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*1.4+.2,a:Math.random(),da:(Math.random()-.5)*.005})); }
  function draw(){ ctx.clearRect(0,0,cv.width,cv.height);
    stars.forEach(s=>{ s.a+=s.da; if(s.a<=.05||s.a>=1)s.da*=-1;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(200,215,255,${s.a})`;ctx.fill(); });
    requestAnimationFrame(draw); }
  addEventListener('resize',resize); resize(); draw();
})();

/* ══ INIT ══ */
build();
</script>
